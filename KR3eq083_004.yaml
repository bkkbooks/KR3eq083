body:
  text: 卷三證治類冬傷於寒春必病溫冬不藏精春必病溫冬不按蹺春不病溫義不同冬傷於寒是感受冬時閉藏之令太過也不藏精與按蹺是疏泄之太早冬行春令而奉生者少也判然兩義王好古混而同之張景嶽喻嘉言從而和之一若冬時只有疏泄太早之病而無閉藏太過之病是不通也且內經冬不藏精冬不按蹺不與四時遞言何者此但主陽舒陰斂之義對夏暑汗不出而言不合四時五行循環之氣也冬傷於寒是與春傷於風夏傷於暑秋傷於濕遞言皆各因其時令本氣之太過也夫冬傷於寒者寒氣外逼則衛氣內陷而榮氣為所灼耗也冬日皮膚宜溫夏日皮膚宜涼若冬日薄衣露處皮膚皆寒則腠理致密衛氣略無伸舒而內積於榮分津液隱為所銷內熱有太盛欲焚之慮矣人身八萬四千毛孔皆氣所出入之道也氣不出入則必內郁西醫謂人身有炭氣有養氣之分養氣即平氣也炭氣即郁濁之毒氣也冬傷於寒束住衛氣鬱而不舒則為炭氣其發病為溫熱不亦宜乎不藏精者榮氣外泄與此異矣然二者病機雖各不同而多出於貧苦何者力食則汗泄非時而不藏精遊手則薄衣露處而傷於寒其病也一由宣泄之太早一由閉遏之太過雖同為溫病而治法又有不同矣不藏精者宜固本而養陰傷於寒者宜宣鬱而解表也諉曰不藏精即傷於寒也以虛為實其治法有不誤而殺人者乎燥濕同形同病燥濕同形者燥極似濕濕極似燥也內經以痿躄為肺熱葉焦以諸痙強直皆屬於濕其義最可思故治法有發汗利水以通津液者有養陰滋水以祛痰涎者張石頑曰常有一種燥證反似濕痹遍身疼煩手足痿弱無力脈來細澀而微重按則芤以陰虛也此陰血為火熱所傷不能榮養百骸慎勿誤認濕痹而用風藥則火益熾而燥熱轉甚矣宜甘寒滋潤之劑補養陰血兼連柏以堅之又曰凡脈浮取軟大而按之滑者濕並在胃之痰也按之澀者濕傷營經之血也夫內經云濕流關節又云地之濕氣感則害人皮肉筋脈如此則血液不得流通而燥結之證見矣故濕之證有筋急內經因於濕大筋軟短也口渴有欲飲有不欲飲者大便祕結肺中濁氣不降小便赤澀太陽經腑氣皆鬱滯燥之證有肢痿胸滿溏瀉微溏而瀉不多痰堅黏結胸中力咯不出咳嗽濕咳夜甚臥甚燥咳晝甚勞甚更有病濕脈澀以氣滯也必兼弦緊病燥脈滑以陰虛也必兼芤弱按之即無此皆同形而異實也宜求其本而委曲以治之按風寒暑濕燥火六淫之邪亢甚皆見火化郁甚皆見濕化鬱極則由濕而轉見燥化何者亢甚則濁氣干犯清道有升無降故見火化也鬱則津液不得流通而有所聚聚則見濕矣積久不能生新則燥化見矣故吾嘗說六氣之中皆有正化惟燥是從轉化而生前人謂燥不為病非無燥病也謂無正感於燥之病也凡轉筋疔瘡陰疽心腹絞痛皆燥化之極致也皆從濕寒風熱轉來燥濕同病者燥中有濕濕中有燥二氣同為實病不似同形者之互見虛象也張石頑曰每有脾濕肺燥之人陰中之火易於上升上升則咽喉作痛而乾咳須用貝母之潤以代半夏之燥煨姜之柔以易乾薑之剛更加薑汁竹瀝以行其滯又有素稟濕熱而挾陰虛者在膏粱輩少壯時每多患此較之中年以後觸發者更劇又與尋常濕熱治法迥異當推東垣河間類中風例庶或近之原文云素稟濕熱而挾陰虛者以其平時嬌養未慣馳驅稍有憂勞或縱恣酒色或暑濕氣交即虛火挾痰飲上升輕則胸脅痞滿四肢乏力重則周身疼痛痰嗽喘逆亦有血溢便祕面赤足寒者甚則痿厥癱廢不起矣大抵體肥痰盛之人則外盛中空加以陰虛則上實下虛所以少壯犯此最多若用風藥勝濕虛火易於僭上淡滲利水陰津易於脫亡專於燥濕必致真陰耗竭純用滋陰反助痰濕上壅務使潤燥合宜剛柔協濟始克有賴如清燥湯虎潛丸等方皆為合劑復有陰陽兩虛真元下衰濕熱上盛者若乘於內則不時喘滿眩暈溢於外則肢體疼重麻瞀見此即當從下真寒上假熱例治之否則防有類中之虞即此痰厥昏僕舌強語澀或口角流涎或口眼喎斜或半肢偏廢非內熱招風之患乎歷觀昔人治法惟守真地黃飲子多加竹瀝薑汁送下黑錫丹差堪對證服後半日許乘其氣息稍平急進大劑人參入竹瀝薑汁童便啐時中分三次服之喘滿多汗者生脈散以收攝之若過此時藥力不逮火氣復升補氣之藥又難突入重圍矣服後元氣稍充喘息稍定更以濟生腎氣丸雜以黑錫丹一分緩圖收功可也至於但屬陽虛而陰不虧者斷無是理雖邪濕干之亦隨寒化不能為熱也即使更感客邪自有仲景風濕寒濕治法可推不似陰虛濕熱之動輒扼腕也按此論義理精微治法確鑿真不厭百回讀云按上所論乃脾濕熱而腎虛燥之事也嘗考金匱黑疸亦即脾胃濕熱流積於腎之所致也折肱漫録云脾胃濕熱盛則克傷腎水內經云腎者胃之關也水之入胃其精微灑陳於臟腑經脈而為津液其渣滓下出於膀胱而為小便皆賴腎中真陽有以運化之腎陽不足則水之清濁不分積而為飲泛而為腫此脾腎濕寒之證也若脾胃濕熱腎陰又虛則濕熱下陷於腎而為黑疸何者腎惡燥者也腎燥而適脾濕有餘遂吸引之不暇矣遂不覺並其熱而亦吸之矣濕熱膠固菀結濁氣不得宣泄熏蒸漸漬久郁下焦致血液之中久不得引受清氣而色為濁暗矣故為黑疸也若早治得法腎陰早復則陽氣有所助而力足以運濁不出矣若其始腎陰不虧則本無借於脾之濕而不致吸受其毒矣故黑疸發原於腎燥也故治法往往有滋陰與利水並用者此之謂也按腎氣丸即滋陰利水之劑內澤瀉茯苓桂枝即五苓之法也地黃薯蕷山萸滋陰之藥也丹皮附子所以行經通絡也寒熱同形同病寒熱同形者寒極似熱陰寒逼其微陽外越也熱極似寒所謂熱深厥深也更有久服溫補清濁混處畏寒異常攻以寒下之劑而陽達寒退者前人之名論治案夥矣同病者真寒真熱二氣並見也如傷寒大青龍證是寒束於外衛陷於內而化熱也其人必胃熱素盛者太陽中暍是先傷於暑後傷冷水乃寒熱兩感之病也內經論瘧義亦如此此表寒裡熱也須辨其淺深輕重氣分血分而分治之表熱裡寒則有內傷生冷外傷烈日發為霍亂者瓜果酒肉雜然並食發為痢疾者至於上熱下寒是肺熱腎寒內虛之病也亦有下受寒濕逼陽上升者前人皆有名論獨有上寒下熱真陽怫鬱之證近日極多其脈沉之見滑或兼大浮之見弦或兼細其病因或由久受濕寒陽氣不得流通或因微熱過服清肅之劑每怪前賢絶無論及及讀許叔微破陰丹一案乃深嘆其獨具隻眼也又有氣寒血熱血寒氣熱之辨即仲景榮寒衛熱衛寒榮熱之事也血熱則脈形緩大氣寒則起伏不大而無力血寒則脈形緊小氣熱則來勢盛大而有力矣此亦前人之所未及也惟葉天士通絡之說於此等病治法甚合吾每竊取而用之其效殊捷又有其人本寒而傷於熱及本熱而傷於寒日久往往與之俱化若初起未化與邪盛而不化者其治法須仿內經治勝安伏之義恐得藥後復化也許案附鄉人李信道得疾六脈沉不見深按至骨則若有力按周本若字作弦緊頭痛身溫煩躁指末皆冷中滿噁心兩更醫矣醫皆不識止供調氣藥豫因診視曰此陰中伏陽也仲景法中無此證世人患此者多若用熱藥以助之則為陰邪隔絶不能導引真陽反生客熱若用冷藥則所伏真火愈見消爍須用破散陰氣導達真火之藥使火升水降然後得汗而解授破陰丹二百粒作一服冷鹽湯下不半時煩躁狂熱手足躁擾按周本躁作燥其家大驚豫曰此俗所謂換陽也無恐須臾稍定略睡已中汗矣自昏達旦方止身涼而病除硫黃水銀陳皮青皮四味面丸冷湯下名破陰丹陰盛陰虛脈證辨篇中所援諸論並出張石頑醫通內經云陰盛生內寒陰虛生內熱其證候不同矣陰虛之脈數散而澀陰盛之脈遲緊而澀其脈象不同矣陰虛宜甘潤填陰陰盛宜辛溫振陽其治法更不同矣況陰盛格陽於外與陰虛陽越於外其機括尤不同也陰踞於內升降不調陽欲內返而不得此陰力之能格陽也陰虛不能維陽無根之陽不能內返遊弋於外此微陽之自外越也而前賢每以脈浮而大按之無力為陰寒內盛之脈以面熱戴陽煩躁不安為陰寒內盛之證喻嘉言所譏為傳派不清者也殊不知此正陰虛陽越之事其治宜溫潤填陰以安陽無大熱溫經以回陽也至於脈沉細而疾渴欲飲水煩躁悶亂此陰痼於外陽怫於內之象也而曰陰盛格陽水極似火不亦誤乎即用熱劑如許氏之破陰亦徹外陰以透伏陽豈驅逐伏陰之謂乎若夫所謂內外有熱其脈沉伏不洪不數但指下沉澀而小急此為伏熱不可誤認虛寒以溫熱治之是益其熱也此又陰虛而陽氣下陷入於陰中所謂榮竭衛降者也與上文陰盛陽郁之證又自霄壤大抵陰盛於內為內實其脈象決無按之反芤者非牢即堅即細緊耳惟陰虛者精血內空陽氣外迫其脈則浮大而芤矣第陰盛之人有陽虛有陽不虛陰虛之人有陽盛有陽不盛從陰引陽從陽引陰喻嘉言有三分七分晝服夜服之論矣此專就虛勞一病言之也若尋常雜病只於本病對治劑中用藥略有偏寒偏熱兼升兼降重散重斂之不同耳即如陰盛之人陽虛者直用溫經回陽矣陽不虛者用溫化之藥加以微苦微酸清肅浮陽使之內合也陰虛之人陽盛者是內熱也宜甘潤咸潤以填陰佐以參耆升柴補氣建中之品提挈陽氣出返陽位也陽不盛者即浮陽外越也宜溫潤兼補脾腎酸辛並用可矣此內傷治法之大略也總宜審察脈象以決病機無惑於重按全無是為伏陰之說庶不致寒熱攻補之倒施耳東垣治一人腳漆痿弱下尻臀皆冷陰汗臊臭精滑不固脈沉數有力是火鬱於內逼陰於外也精不固者髓中混以濕熱也小柴胡去參加茯苓膽草黃柏苦寒瀉之而愈節庵治一壯年夏間勞役後食冷物夜臥遺精遂發熱痞悶至晚頭額時痛火熱上乘也兩足不溫脾氣不下也醫謂外感夾陰以五積散汗之煩躁口渴目赤便祕明日以承氣下之但有黃水身強如痙煩躁更劇腹脹喘急舌苔黃黑已六七日矣診其脈六七至而弦徑急以黃龍湯下黑物甚多腹脹頓寬煩躁頓減但夜間仍熱舌苔未盡更與解毒湯合生脈散加地黃二劑熱除平調月餘而安瘟疫脈沉近日時疫之病有所謂喉痧者初起脈俱沉細三部以兩尺為甚兩尺又以左手為甚其初至數尚清應指有力一二日後漸見躁疾模糊伏匿按之即散舊謂瘟病邪從中道起於陽明其脈右大於左竊謂此乃熱濁之毒氣熏蒸肺胃脈形必是緩長洪大渾渾不清為氣濁而中焦濕熱也近時病情乃邪伏少陰或冬暖不寒陽氣不潛陰精消散或膏粱無節脾胃濁熱下流克傷腎水或房室無度陰精下奪至春陽氣欲升陰精不能載陽上達故虛陽之已升者中道而止於咽喉不能達於大表也其毒氣之未能全升者下陷於腎中熏蒸燔灼陰盡而死所謂逆冬氣則少陰不藏腎氣獨沉也治法嘗擬用豬膚湯麻辛附子湯二方並用減麻黃附子改用生者並重加黨參以達其毒毒散陰可存矣世每泥於喉證發於肺胃之成法用苦寒清降以清肺胃故熱毒愈無由達也張石頑曰傷寒以尺寸俱沉為少陰少陰一經死證最多為其邪氣深入正氣無由自振也若夫春夏溫病熱病而見沉小微弱短澀者此伏熱之毒滯於少陰不能撐出陽分所以身大熱而足不熱者皆不救也惟沉而實見陽明腑實證者急以承氣下之不可拘於陽證陰脈例也凡時行疫癘而見沉脈均為毒邪內陷設無下證萬無生理此論可謂詳矣至謂脈沉無下證必死者為其不可下也下之亦必死然則於萬死之中而求一生宜何道之從曰不從下奪而從上重填其陰以舉其陽庶有幾乎何者此人金水並虛木火併實實者散之虛者滋之金復則自上而挈之水復則自下而托之如此而不生可告無罪矣近有自負明醫專用桂附椒姜燥陰耗血謬稱托邪外出引火歸原應手輒斃其罪與用苦寒清上者等血熱血乾傷寒陽明病有熱入血室證婦人傷寒經水適來適斷血室空虛邪易陷入有熱入血室證其證皆譫言妄語甚或狂走見鬼午前明瞭午後昏瞀入夜尤甚倦臥不知飲食不能轉側其病之輕重固由熱之微甚而亦有血虛血實之分血實則邪熱之濁氣有所聚而見重血虛則津枯神散邪不得聚反能略知人事其治法亦有偏重攻血偏重養津之殊矣趙晴初曰凡外感之病涉心者皆在心包絡與血脈也邪入包絡則神昏邪入血脈亦神昏但所入之邪有淺深所現之證有輕重如邪入包絡包絡離心較近故神昏全然不知人事如入血脈血脈離心較遠故呼之能覺與之言亦知人事若任其自睡而心放即昏沉矣有邪在血脈因失治而漸入包絡者此由淺而入深也有邪在包絡因治得其法而漸歸血脈者此由深而出淺也又有邪盛勢鋭不從氣分轉入不由血脈漸入而直入心包絡者陡然昏厥其證緩則不過一日速則不及一時告斃以其直入包絡而內犯心也此論血脈心包邪有淺深證有微甚也李東垣曰傷寒傳至五六日間漸變神昏不語或睡中獨語一二日目赤唇焦舌乾不飲水稀粥與之則咽不與則不思六脈細數而不洪大心下不痞腹中不滿大小便如常或傳至十日以來形貌如醉人狀虛見神昏不得已用承氣下之誤矣不知此熱邪傳手少陰經也導赤瀉心湯主之與食則咽者邪不在胃也不與則不思以其神昏也既不在胃誤與承氣下之必死傷寒溫熱傳變多有此證不可不察也張石頑曰有一種舌苔中黑而枯或略有微刺色雖黑而無積苔舌形枯瘦而不甚赤其證煩渴耳聾身熱不止大便五六日或十餘日不行腹不硬滿按之不痛神識不昏晝夜不得睡稍睡或呢喃一二句或帶笑或嘆息此為津枯血燥之候急宜炙甘草湯或生料六味丸換生地合生脈散加桂滋其化源庶或可生誤與承氣必死誤與四逆亦死此與上條皆論血乾之證也溫熱發斑其人反清附虛勞將死其人反清凡人周身百脈之血發源於心亦歸宿於心循環不已熱入血脈必致遺毒於心故神昏譫妄也前論患溫熱者津枯血少則神明不昏晝夜不寐何也蓋血實則濁聚血虛則神散也更有津血全無神明全散溫毒之極至於發斑而人清反異於平日者此為不治前人未道獨車質中曰溫病發斑獨有陽證人清者見洪滑之脈宜細心參酌勿可輕許妄治又曰發斑證神氣清楚仰臥不能屈伸者不治神氣昏沉者可生張石頑曰溫熱之病外感與正氣相搏則神氣昏瞀內傷正氣本虛則神志清明至死不惑此皆閲歷深到之言昔賢所未齒及也曾憶某年秋月天津盛疫溫毒發斑患者身如釜蟹鼻準獨白其人倦臥難動神清語朗臨死猶委婉言談起病即屬不治且專在幼童傳染至速其死在五六日之間不過一月死者數千真奇慘也夫邪攻包絡或入血脈與夫血液燔灼乾澀神機既息清氣全無自應昏昧反見精靈能知門外之事與人言皆曲盡情理甚於平日總由血虛津枯菁華已竭元神離根而外越不較之元氣離根而上越者更危乎故凡病傷寒溫熱痘疹斑痧癰疽為日稍久轉見神氣清明長臥難動者即為心絶是命盡也每見讀書苦思之士一病溫熱陽明未實血室未熱即見譫妄者心虛氣怯望風先靡也又見孤臣寡婦憂愁鬱結飲食不甘夜不成眠漸見肌肉消瘦毛髮面色轉見鮮美目光外射直視不瞬及至臨死談論欷歔拱謝而逝觀者莫不異之此皆元神離根而外越也自齧狂走是氣血熱極非祟也靈樞口問人之自齧舌者何氣使然曰此厥逆上走脈氣輩甲乙作皆至也少陰氣至則自齧舌少陽氣至則自齧頰陽明氣至則自齧唇矣素問陽明脈解陽明主肉其脈血氣盛邪客之則熱熱甚則棄衣而走登高而呼或至不食數日反能逾垣上屋者四肢為諸陽之本陽盛則四肢實實則能登高也熱盛於身故棄衣而走也陽盛則使人妄言罵詈不避親疏而不欲食故狂走也二者證見於氣而病本於血何者凡血熱極津枯而燥則肉癢難忍雖抓搔至血流猶不能止恨不刀割而針刺也熱勢稍殺則痛作矣夫人身之血如胭脂然有色有質可粉可淖人血亦可粉可淖者也其淖者津液為之合和也津液為火灼竭則血行愈滯火熱既盛則氣行愈悍血滯於前氣悍於後凡氣之行也前者往後者續以是循環無已今則前氣滯而未往後氣悍而湧至氣氣相擠而迫於血脈之中於是血脈之中逼迫不通脹悶萬狀其餘氣旁溢於細絡更與脈外之氣相逆則皮膚之下又隱隱作癢遂不自覺其自齧破肉環形而不可止矣仲景亦謂持強擊實以手把刃坐作瘡也故病有嚼舌而死者有遍身抓搔皮破血流寸無完膚展轉床蓐氣盡而死者世皆指為冤業孰知傷寒時病此類極多實為心脾血熱之所致耶此固由邪熱太亢而由誤服熱藥溫中發汗者尤衆本承氣白虎證而妄用四逆理中勢必至此矣醫者指為鬼祟以文其過病家認為夙業以誣死人豈不枉哉事已至此無策可施矣若先於勢未盛時重用石膏大黃生地丹皮梔子之屬大劑溫涼服之猶可救也凡患時氣熱病初宜清熱養液如白芍二冬茅根竹葉石膏知母之類以掣出熱邪若大便不利證顯陽明即防熱入血分三承氣不可緩也夫血猶舟也津液水也醫者於此當知增水行舟之意葉天士所謂救陰不在補血而在養津即此義也苟不知此妄行溫補或妄發散則血燥而氣盛氣盛則壅壅於小絡則為齧壅於大經則為狂走其輕者壅於肌腠亦變為癮疹欲出不出而同歸於死經曰脈氣輩至者駢至也駢至故陽盛氣實脈脹自破也痰飲分治說繆仲淳柯韻韻伯俱有此說而未暢未確今為伸其說如下飲者水也清而不黏化汗化小便而未成者也痰者稠而極黏化液化血而未成者也飲之生也由於三焦氣化之失運三焦之失運由於命火之不足經曰三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣蓋水入於胃脾氣散精上輸於肺此即津也其渣滓注於三焦為熱氣蒸動則不待傳為小便即外泄而為汗故汗多則小便少也下行入於膀胱而膀胱有上口無下口仍借三焦之氣化始能下出故曰氣化則能出矣其在三焦則曰水在膀胱則曰津液者水在三焦質清味淡外泄為汗則味鹹下泄為溺則氣臊皆受人氣之變化而非復清淡之本質矣故汗與小便皆可謂之津液其實皆水也火力不運水停中焦上射於肺治之之法補火理氣是治本也發汗利小便是治標也痰則無論為燥痰為濕痰皆由於脾氣之不足不能健運而成者也蓋水穀精微由脾氣傳化達於肌肉而為血以潤其枯燥達於筋骨而為液以利其屈伸今脾氣不足土不生金膻中怯弱則力不能達於肌肉而停於腸胃蘊而成痰矣已達於皮膜者又或力不能運達於筋骨故有皮裡膜外之痰也又多痰者血必少而骨屬屈伸時或不利此其故也治之之法健脾仍兼疏理三焦以助其氣之升降運化是治本也宣郁破瘀是治標也燥痰則兼清熱生津痰乃有所載而出矣所以必用破瘀者痰為血類停痰與瘀血同治也治痰不得補火更不得利水補水利火即濕痰亦因火熱鬱蒸愈見膠固滋長而不可拔矣此痰飲分治之大義也至於患飲之人必兼有痰患痰之人亦或有飲二證每每錯出此古人治法所以不別也不知病各有所本證各有所重患飲兼痰者治其飲而痰自消痰重者即兼用治痰法可也因痰生飲者治其痰而飲自去飲重者即兼用治飲法可也論咳嗽前人每以有聲無痰有痰無聲細分咳嗽二字今概不取無聲即不得為咳嗽矣且亦安能無痰但多少厚薄難出易出有不同耳素問咳論分五臟六腑四時以決其病之吉凶凡百病皆以自腑入臟者為漸深而咳病獨以由臟出腑者為日久蓋百病是邪氣內侵咳是真氣外脫耳咳之為病也五臟皆為之振動內氣不寧漸離其根矣今條析其證之輕重如左卒然咳嗽連聲不可暫止者此冷風隨呼吸而襲肺也此風襲肺則咳嗽襲胃則吐逆吐逆更厲於咳嗽殺人更速故小兒當風飲食最所忌也急宜溫散以桂枝為君力制風木猖獗之勢故凡風勢之來其風之頭最厲急入戶避之即卒無可避亦宜謹護口鼻為佳外感風寒惡寒發熱亦多有咳嗽者此風寒由經入肺也宜先表散久則兼清降其咳聲清響而晝夜相等經曰形寒寒飲則傷肺咳逆而上氣然飲冷是由胃絡入肺也其聲略重宜溫胃略兼利濕有清晨咳嗽數十聲吐出濃痰碗許而始安者此胃中濕熱蒸肺也聲如在甕中者經所謂聲如從室中言是中氣之濕也其咳聲沉重治宜宣郁流濕亦有寒濕致此者但其痰較清其聲略急治宜溫健脾土也有咳嗽甚重入夜尤甚不可伏枕者此腎水上泛土弱不能行水水氣衝肺也聲重而又急連連不絶逼迫萬狀氣不能續治用仲景小青龍法真武湯法分有無外感而治之若水氣重甚目下腫如新臥起者十棗湯以瀉之輕則葶藶大棗湯但必以附子白朮湯善其後乃無餘患也有停食噯腐吞酸而作咳者其證喉癢而天明與日晡嗆咳較甚此亦挾風濕而然也治宜滲濕化食溫化大腸其病在胃與大腸之氣滯而水停也宿食不盡咳必不止有因燥而咳者聲干無痰斷續不勻如為煙所嗆亦無定時時吐涎沫治宜降氣養液此多由時氣亢旱燥氣所傷也過食爆炙者亦有之靜臥則安勞動則劇與水飲晝平夜劇者相反有陰火爍肺而咳嗽者此勞氣也其咳五更黎明連連不絶聲干少痰喉中燥癢由於腎竭肝虛火升液耗肺不能自潤也喉中常覺有一點乾結如樹皮草葉咳咯不出者是少陰少精不上潮而脈絡燥結者非肺燥也急宜滋潤肝腎清宣肺胃開結行瘀殺蟲凡風寒咳嗽亦喉中作癢但旋癢即咳癢甚咳急勞瘵咳嗽漸癢始咳咳緩癢微此為異也有喉中吤吤然似有物以梗之頗礙呼吸呼吸觸之即偶咳一兩聲言語發聲多不能暢必先咳一兩聲乃能出言此脾濕不運濁氣上蒸也治宜健脾行滯疏利大腸使濁氣下降即愈矣更有咽中如炙臠如桃李核者其病根亦如此而甚焉者也內經及中藏經脈經多論此病或以為腎或以為膽或以為肺或以為大腸或以為脾有氣橫逆有氣鬱結橫逆即濕濁不降鬱結者憂思莫解大便必祕經所謂二陽之病發心脾者也喉中吤吤一證素問咳論以此為心咳之證又曰心脈大甚為喉吤金匱五水篇論此為寒結關元腎氣上衝若夫肺癰肺痿則由肺家燥熱太盛實由脾家濕熱熏蒸太久濁氣日增清氣不復漸致液竭血沸而腐敗矣初起可治宜清熱宣郁養液行瘀三消五隔諸證亦是如此此血熱之所致也陳修園謂久咳肺燥可用人參生津此必病起風熱素無水飲日久風去熱存故也若風寒久咳肺氣不降水道不調愈久而水邪愈盛不能伏枕夜無寧刻矣水飲上射浮熱逆升俗每自謂熱咳求用涼藥醫亦以肅肺自求速效遂令風寒永無出路而成勞損矣故吾謂今日咳勞皆小青龍證也論喘附哮喘之為病也其類有四曰氣急曰氣逆曰氣短曰氣脫其因有寒有熱有虛有實縷析於下氣急者寒也氣之呼吸取道肺脘而胃脘附之二脘者氣之所並行也或風寒從毛竅從背脊入於肺絡侵及肺脘或飲食寒冷太過傷於胃脘二脘相附其氣相通有寒則彼此相移二脘俱縮而不展不展則氣之道窄寒微但嗆咳而已甚則肺中諸竅皆緊氣出不利逼迫膻中不得上達風寒與水飲相搏夜不安枕漸致搖肩仰息矣經曰形寒寒飲則傷肺氣逆而上行非逆而上也乃伏而不得上也近時醫見嗆咳即投清降以致二脘得藥愈緊陽氣愈下結愈上促病者煩悗不堪如有捉其咽喉縛其胸膈者是也故近時患小青龍證無不終致勞損者徐靈胎謂為風寒不醒成勞病也氣逆者痰也有濕寒有濕熱病屬在裡非由外感肥人多有此證凡人之氣由口鼻呼吸出入者其大孔也其實周身八萬四千毛孔亦莫不從而噓吸痰阻經隧則氣之呼吸不得旁達而聚於膻中只能直上咽喉出於口鼻已覺沖激矣更有時痰涎壅盛橫格膻中而氣道愈狹矣此濕寒濕熱成痰成飲者所常有也此人若感風寒即近哮證矣氣短者熱也亦有水氣射肺非風寒之外束非痰證之有形乍覺呼吸至膈而止不能下達非全不達也入遲出疾不能久留於內也所以然者肝腎血熱陰氣不斂也又有感受風熱肺中津液為亢氣所耗不得柔潤膻中乾燥孔竅生煙是氣管因津液而燥急氣行不能開闔勻布也傷暑者必有此證凡氣之流行必有津以潤之始能開闔滑利燥則陰虛陽亢覺開而不得闔矣水氣射肺者或因渴飲乍多或因汗出乍閉濕逼熱氣上衝如火得水以沃之非真有膠固之水飲也更有略無所因而脾胃不運大便久祕腸中濁氣上蒸於肺以致升降不利呼吸短促者仲景曰平人無寒熱短氣不足以息者實也注謂實為飲邪非也大便祕結之故也溫病有燥屎沖膈氣喘舌黑齒枯者不治氣脫者乃真喘也真氣離根呼吸至胸而還不能下達丹田自覺氣無所依張皇失措搖肩俯仰煩躁不寧無力下吸出多入少此或因久咳或因大汗吐下亡血失精陰脫而陽無所戀矣急則危在頃刻緩亦不過數日仲景曰少陰病下利止息高者是也亦有下焦肝腎久受寒濕漸逼命火上越肺氣不能下納者其他自覺氣少下陷呼吸不足不利而不見喘促低昂抬肩撼胸外形者或稟賦不足或脾胃有濕或大病初愈或過泄傷氣不可枚舉然病因大略如此但有微甚而已夫氣急者氣不得出也哮之微者非喘也氣逆者氣不得散也近於嘔噦而非嘔噦亦非喘也氣短者氣不得聚呼吸不續近於喘矣以其乍見無他證故無傷於根本也三者皆病在於肺而兼在胃氣脫者散而不聚升而不降病獨在腎與前證情形迥別本最易辨惟夫氣急之人氣逆之甚漸至於脫者其形想象然病至此真氣已孤直謂之脫亦可矣嘗診一婦自冬病喘至春不愈始延豫診至則見其形狀非喘也乃哮也寒氣束肺氣塞不出日久邪深真氣內陷便溏下氣肺中寒涎注滿真氣已不能到其脈兩關以下洪大滑數兩關以上細微如絲其膚外涼內熱重撫如焚病人自覺頭上胸中不知何處缺少一件本體是肺中已無生氣矣夜靜晝劇陽氣孤危其哮逼苦狀實不忍見豫謝不敏延後一月始歿故知邪氣逼塞非正氣自脫者雖至極危猶可稍延時日云又按喘有三焦之辨經云邪氣在上此風寒傷肺氣之不得升也濁氣在中此濕熱痰飲聚於胃氣之滯於升降也清氣在下此寒濕之地氣從下焦腳膝之筋骨上入肝腎直搗命門命火不得安其宮肺氣不得歸其窟有呼無吸此氣之不得降也是真喘也其上二焦之病非喘也乃哮也然哮亦有二皆風寒與痰飲相結但互有輕重耳凡不分四時受寒即發發即氣閉迫塞欲死滴水不入徹夜無眠者此上焦之風寒重於痰飲者也數日即愈復如常人矣凡春暖即愈秋涼即發發即呼吸短促晝夜相等飲食減少或如常者此中焦痰飲因天寒肺氣不舒而激發者也若不新感風寒其病勢未至逼急欲死也治之之法上焦之治從小青龍中焦之治從平胃散各隨輕重而互參之此即太陽陽明之別也太陽者風寒由肺俞內侵肺絡入傷肺脘是病起於氣分致太陽之氣化不行而後水邪上泛也陽明者是胃中本有濕痰肺中久為濁氣所據天寒呼吸寒氣而肺中濁氣遂結矣一由俞絡一由呼吸故治異也若夫正氣離根氣上不下及胸而還稍動即汗出久臥又氣阻僅能伏几危坐者命火熄水邪肆陰風慘淡日色無光是何等象耶治之惟黑錫丹一法差堪嘗試不敢必效也經曰喘喘連屬其中微曲此言脈也而摩繪喘病亦自逼真謂其氣連連直上微有反曲耳然則喘之為氣升不降也豈可與氣塞而不得出者同稱耶傷寒傷風俱有戴陽附黃汗發熱惡寒無汗脈緊為傷寒發熱惡風有汗脈緩為中風中風者津液為風所鼓動而外泄外雖潤而內實燥也若加之以溫邪或誤用麻辛發散便有鼻乾氣促唇紅舌燥面赤如醉孔竅生煙之患矣傷寒者腠理為寒所緊束而不得泄外雖燥而內實潤也惟久而化熱衛氣不得泄越而內灼以耗其榮乃有鼻燥氣迫之事喻嘉言謂傷風小恙亦有戴陽總由真陰素虧一經風熱熏灼遂致津液不能上騰而呼吸逼迫乾燥萬狀耳故知治傷寒者亦有時不可徑用辛溫而治傷風者斷不可不佐以清潤傷寒傷風汗之太過或為亡陽或傳為陽明內實昔人論之詳矣汗之不徹身膚作癢面色正赤仲景有二一各半湯之治矣更有津液素充者傷寒發熱日久不退往往面色正黃皮膚胕腫有時作癢甚且搔之破而流汁余每仿二一各半法汗之其汗染衣皆黃汁流如涎著手皆黏氣味腥臭此乃津液菀蒸日久所化也此汁若再熱久不退必為灼干或過用涼藥清熱熱退汁凝阻塞玄府衛氣不通營氣不行將成血痹骨蒸而入勞瘵之途矣故仲景以二一各半湯助生新津而峻汗之其意深矣舊解以二湯為緩汗法者非也痙厥癲癇奔豚痙厥癲癇四者皆有猝倒無知之證而病名各異者其病機病體有不同也痙之病成於燥也屬於太陽故項背必強甚者角弓而反張矣此筋病也內經仲景謂痙屬於濕者推其原也無論濕寒濕熱必化燥而後痙是津液凝結也厥亦有寒熱之分而身不強是衛氣逆亂之病也病在脈外皆屬於實其虛而厥者直脫而已雖曰有寒有熱究竟統歸於熱但有外寒逼熱而然者總是榮氣消耗衛氣無所繫戀而奔逸迫塞於心包也癲無寒熱之分而有久暴之別是營氣窒閉之病也病在脈中經曰心營肺衛又心主知覺心包絡之脈為痰血所阻塞則心之機神停滯而無知矣是營氣壅實而衛氣力不足以推蕩之蓄積以致此也又心與小腸脈絡相通小腸脈中有凝痰瘀血阻窒心氣亦發為癲也厥之病氣實而血虛癲之病血實而氣虛其邪皆實其正皆虛若夫癇者由於血熱發於肝風手足抽掣五獸同鳴昔人以五獸分五臟而總歸於肝者肝藏血熱生風風性動也此臟病外連經絡蓋氣血俱實者也而其本必由於寒錢仲陽以小兒急慢驚風為陰陽癇乃別一證名同而實異也急驚由於肝熱生風化燥其證尚介癇痙之間其異乎痙者手足拘攣而不必反張異乎癇者手足抽掣而絶無獸鳴也慢驚則全屬脾臟陰陽兩虛故陰邪內拒虛陽上迫氣機乍窒卒然無知也虛則易脫故稱難治方中行作痙書以小兒驚風屬之亦只可指為痙之類不可徑指為此即是痙也千金方曰溫病熱入腎中亦為痙小兒病癇熱甚亦為痙其意是以癇為驚風而以痙專屬之拘攣縮急之證也金匱云奔豚病從少腹起上衝咽喉發作欲死復還止此從驚恐得之素問曰人有生而病癲者此得之在母腹中時有所大驚氣上而不下精氣並居故令子發為癲也是奔豚與癲皆生於驚金匱遍論雜病而無癲癇竊疑奔豚即癇也癇作豬聲者最多豕水蓄屬腎奔豚發於腎也千金方第十四捲風眩門小續命湯方前引徐嗣伯曰痰熱相感而動風風心相亂則悶瞀故謂之風眩大人曰癲小兒為癇其實是一此方為治萬無不愈而奔豚為患發多氣急死不可救故此一湯是輕重之宜觀此是以奔豚為癲癇之重者私嘗論之痙厥暴病也其因皆津耗血乾而氣悍脈管迫塞之所致也治之重以涼潤生津辛香泄氣而佐以行血豁痰之品病可即愈矣癲癇痼疾也有得寒即發者有得怒得勞即發者其機不外內經氣上不下之一語其所以不下之故必由寒濕從下上犯從脛足腰髀之經脈內侵瀰漫先使腎陽不得下通邪氣漸漸入於脊膂上逼心胃陽氣不得下降故癲癇之人即未發病目多不能下視兩足行動隱隱不便腎丸時或隱痛如㿉疝之狀二便不能調暢推此以求治法必須用辛溫如細辛羌活藁本威靈仙生附子吳茱萸小茴香以通經脈之寒而以牛膝抑之下行更以破血如虻蟲䗪蟲蠐螬延胡索五靈脂當歸鬚穿山甲硇砂雄黃枯礬溫化之品以通小腸膂脊血脈之瘀而以二醜導之下出作為丸散緩服久服庶可漸瘳又有寒濕自肺胃撲滅心陽使心氣乍抑而熄昏厥如死者此寒濕傷於腦氣所謂陽中霧露之邪也與中寒相類用辛溫發散使水氣從上揚出與寒濕從下上逆者不同此多見於暴病而痼疾亦間有之其人常俯視不抑目胞下垂如睡面色自額至顴深黑者是也夫天下病有熱而不可清虛而不可補者其惟癲癇乎論臟無他病時發熱自汗出而不愈以桂枝湯先其時發汗則愈夫時汗出而不愈是邪不以汗解其邪必非可汗解矣乃曰先其時發汗則愈何也按原文云此衛氣不和也桂枝湯是從榮通衛衛為風邪所擾不能內和於榮發其汗者是助榮之力以出而和於衛榮衛之氣相合邪無地自客矣其自汗不愈者衛與榮乖正氣不能固護於外津液泄於其隙而不與邪相值也發其汗則漐漐蒸遍真氣充周矣風邪鼓衛氣於外今更從邪氣之後壯榮氣以逐風邪也榮行脈中衛行脈外俱日夜五十度周於身若或遲速互有參差即病矣衛傷於風則衛行速而榮不能應之榮不能應則衛力亦有不繼而腠理豁疏矣故時汗出也桂枝湯是鼓榮之液以潤衛之燥俾開合利而機關密也榮傷寒脈緊無汗之麻黃證是榮衛俱傷於寒也前人謂寒傷榮不傷衛者誤矣其專榮傷於寒者是寒濕下受不從皮毛而直竄經脈內入筋骨血液凝聚其行漸遲不與衛應而寒熱病作矣近時寒瘧多是寒濕下受治宜仿九味羌活湯法重溫下焦開通少陰太陽之表裡經氣非桂枝柴胡所能勝任也桂枝湯止汗之力勝於發汗故欲發汗者必啜熱粥溫覆以助之藥對證而增劇千金方曰凡服止痢藥初服皆劇愚人不解即止其藥不服此特不可但使藥與病源的相主對雖劇但服不過再三服漸漸自知惟非其主對者本勿服也慎柔五書謂久服寒涼陽氣鬱陷者改用四君保元溫脾理肺陽氣升舉邪氣漸漸退出於表退至陽明則有嘔吐便溏水泄之事矣退至少陽則有頭痛寒熱往來之事矣退至太陽則有發熱惡風寒項脊強痛之事矣此時正宜加力輔正隨證施治以收全功不得疑為新受外感更不得疑為藥誤改用他法再誤即難治矣竊謂今人最慮肝陽每於傷風頭痛即曰肝陽上升即以清涼澆灌及至真火下陷陰霾瀰漫頭重顱脹仍曰肝陽太亢明者用宣陽逐陰之劑以挽之稍見陽氣上達口乾微渴即斥為藥誤助動肝陽必求滅陽而死可慨也如治外感外證雖減而內證轉劇此即邪氣之內陷也外邪內陷治之能使漸透於表表證日增而內證日減此即正氣之充而漸復也先見惡寒發熱治之但使寒熱稍輕而增見胸滿嘔吐不食是風寒內陷矣先見胸腹膨脹治之但使膨脹不見而轉見大便滑泄不禁是正氣下脫矣故有外證見增而實為醫之功外證見減而轉為醫之過者醫家病家於此皆須有定識定力不為搖惑方能臨變不改亦能臨變知改矣周慎齊曰脾氣虛而脈弦者服補中益氣湯後必發瘧脾氣虛而濕勝者服補中益氣湯後必患痢此邪尋出路也仍服前湯自愈此與慎柔五書意同朱丹溪治一虛人患痢先用六君多服久服病證日增略不為動正氣既充以治痢藥一劑迅掃之而病除矣此絶頂識力也又凡寒濕內伏必先用溫藥使化濕熱其化熱時痞滿昏倦反不如初時之神氣清爽也更有猝然變證可駭者尤須有定識以鎮之如許叔微治李信道伏陽肢冷與破陰丹不半時煩躁狂擾曰此換陽也逾時果汗出而定此即仲景所謂其人大煩口噤躁擾為欲解也又趙晴初謂治某傷寒日久失下與四物承氣加減片晌腹中刺痛欲死口噤目瞪不省人事至天明下黑糞纍纍而解
