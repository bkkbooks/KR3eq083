body:
  text: 卷五方藥類石膏性用石膏性寒理直體重而氣清最清肺胃氣分之熱而自仲景青龍越婢方中用之後世釋本草者遂謂力能發表其說謂石膏理直故能疏表穿鑿極矣竊嘗深體此物必能利濕仲景方意蓋取其清熱利小便也後讀洄溪醫案又謂石膏能降胃中逆氣吳鞠通又以石膏半夏治痰喘其性用不皎然乎但生用則清熱之力勝熟用則利濕之力勝潔古增損柴胡湯用石膏治産後中風是又培土鎮風之藥矣陳修園金匱歌括中水氣篇杏子湯方下亦極論石膏質重性寒只能清肺胃鎮逆氣去內蘊之熱不能發外感之汗即或溫病有時熱氣亢逆肺葉焦滿不得運轉以石膏清之降之而肺氣遂滋潤而汗出者此亦非發散之功乃清滋之效也又療小兒急驚用生石膏十兩加辰砂五錢研極細末每服一歲至三歲一錢四歲至七歲一錢五分是石膏確為重鎮清痰之品少加辰砂借引導以達於心也又仲景薯蕷丸下云欲肥者加燉煌石膏是又能令人肥壯也何者以其合山藥大棗能清養脾胃故也丹皮不涼並桔梗張石頑曰牡丹皮雖涼不礙發散也竊嘗丹皮辛膻異常能通行血分非性涼之藥蓋平而近溫者功用在歸芎之間而其氣沉降不致不僭故為良品王孟英曰丹皮雖涼血而氣香走泄能發汗惟血熱有瘀者宜之又善動嘔胃弱者勿用此論已略能不汩於舊說矣動嘔一層亦實有之但物性終非上升者丹皮之苦不敵其辛桔梗之辛不敵其苦故二藥皆以降為用而斂散不同矣論遠志石菖蒲秦艽柴胡昔人謂讀書須從對面看此語最有意味遠志菖蒲書謂開心氣世遂凡於心虛之證皆避之如砒毒矣殊不知書謂開心氣者以其味微辛而力緩止能內開心氣不能外通膚表也不然如麻黃細辛桂枝者豈不大開心氣而何以書絶不言之以其力不止於此也若以此開心氣是病在心而藥力直致之膚表矣是不可也惟遠志菖蒲馴靜力緩者足當開心氣耳且心虛之病又各不同如陰虛心燥是心氣已不得陰以養之其開散已不可支豈可復以此開之如陽虛心氣為痰水所凌以致怔忡恍惚者非以此開散痰水心氣何由得舒若亦以棗仁五味滋之不益之閉乎秦艽柴胡退無汗之骨蒸此語出於東垣本不足據然揆其義亦不過以其苦能入骨辛涼微散能清泄鬱熱耳世遂謂其能發骨中之汗夫發骨中之汗者惟細辛獨活可以任之麻黃桂枝力迅氣浮尚且不能沉搜入骨而謂秦艽柴胡之苦辛涼降能透發骨氣致之於表而為汗其誰欺乎斂降並用凡治痢疾用白芍檳榔木香黃連者此數藥皆味極苦澀性極沉降者也因痢疾是濕熱邪毒旁漬腸胃細絡夾膜之中苦澀之味能吸而出之隨渣滓而俱下矣故里急後重用此等藥攻下穢涎而病愈者腸胃絡膜之濁氣泄盡也若用大黃芒硝傷正留邪每至不救若用粟殼烏梅固脫留邪多成休息得其一而遺其一也錢仲陽治小兒驚癇輕粉巴豆牽牛並用一斂一泄即攝取痰涎而驅下之也古方此類甚多斂散並用凡欲發汗須養汗源非但慮其傷陰亦以津液不充則邪無所載仍不得出也故桂枝湯中用芍藥或更加黃芩麻黃湯中用杏仁或更加石膏匪但意清內熱以為胃汁充盈邪乃有所附而聚聚乃可驅之使盡耳故傷寒論有發熱自汗而病不愈以桂枝湯先其時發汗則愈者充其榮則衛不能藏奸也張石頑曰凡患溫熱煩渴不解往往得水或服黃芩石膏等寒藥浹然汗出而解者腸胃燥熱力不勝邪寒清助胃生津故也凡辛散之劑佐用甘酸皆此義也小青龍之五味子大青龍之石膏桂枝湯之白芍最可玩味桂枝正治吐血桂枝是溫通血脈之為寒閉者吐血病中有一種腎寒而元陽虛者胃寒而中氣怯者皆令血脈不能通暢遂旁溢而妄行內經所謂血泄者是脈急血無所行也其證得節即動遲速有定期如婦人月信者脈既不暢血盈即傾之而出也每以桂枝為君治之應手輒效章虛谷亦盛稱桂枝能通血脈之寒閉也若咳嗽見血不因吐出者尤屬寒閉無疑而世人每謂桂能動血一見血證輒循例概禁用桂誤哉暴病忌術傷寒論霍亂條理中丸後有臍上築築有動氣者去朮加桂金匱水氣篇苓桂朮甘湯下有少腹有氣上衝胸者去朮加五味子世謂動氣忌術以術能閉氣也蓋動氣上衝者氣之不能四達也寒水四塞腎中真氣不得旁敷而逼使直上故氣動也桂枝細辛所以散水而通絡使氣旁達也五味子所以斂肺而降逆使氣歸根也若白朮能利腰臍結氣似於證無甚相違而不知腰臍無結而忽利之是欲虛其地以受邪邪將固結腰臍上下格拒腎陽因之撲滅矣且甘苦能堅能升津液不得流通氣機為之升提即有礙於桂枝細辛之功用也故吾以為凡遇上吐下瀉以及以腹急痛痧脹轉筋暈眩顛仆之急病又或乾嘔噎隔噦厄之危病皆以慎用白朮為宜前人謂動氣難診於脈當問而知之亦不盡然其脈當是圓疾如豆丸丸不去時上馳如矢也按動氣皆因氣行有阻沖激而然其動有微有甚總是中熱下寒腎寒肝熱加以上有寒閉其情更急凡痰飲停積以及素患疝瘕時時衝動者只是升氣相礙也若誤汗誤下誤吐致氣從少腹上衝者則防暴脫矣若久病陽微腎氣上越者其勢更難挽回前人指為肝腎氣絶陰邪上犯故動氣之暴發而危者總由腎陽驟熄水精不能四布寒極化燥如水成冰其氣上逆直欲凌犯君火之位故也人身亦如六合此時地與四維氣皆閉塞只得一線直上辛能開腠理通氣致津液故重用桂枝細辛以開之白朮之忌蓋惡其澀津升氣也汗吐下之禁蓋惡其傷津損氣也又按齒暴長為髓溢濃飲術汁即消魏玉橫謂此即術消腎氣之證非也齒暴長者肝腎濕熱太盛火鬱風生故靜者動也術能收攝濕邪培土鎮風風定故齒復其堅靜之本體矣是鎮肝也非消腎也調經安胎同藥之誤世傳佛手散一方即當歸川芎二味謂專治胎動不安生胎能安死胎能下將産又能催生妊婦常服可免半産餘十年前即疑其理無如世醫莫不信用即名醫如陳修園書中亦盛稱之且間有用之得效者然余究只敢用以催生屢施有驗未嘗肯用以安胎也嗣讀某名家書極論世以調經之藥安胎之謬為禍甚烈乃私幸先得我心矣近日目睹其禍爰取而論之夫安胎本無定藥亦視其婦之體質而已既孕之後體質無非血氣之寒熱虛實兩途故丹溪謂白朮黃芩為安胎之聖藥者亦舉此以明虛寒實熱之兩大端耳然寒亦有實熱亦有虛總須辨明氣血為要若氣寒血實附子桂枝可並用以溫氣而行血氣氣寒血虛當歸川芎可並用以行氣而補血也若氣熱血實則不免有脹滿沖激之虞矣而可復以芎歸助熱而增實乎氣虛血熱更不免騰沸躁擾緩縱不任而下墮矣而可復以芎歸耗氣而溫血乎故氣虛血熱胎動下漏者急用甘寒苦寒助以補氣生津使血定而筋堅力能兜舉其勢漸緩再看有無凝血於補氣清熱劑中略佐行瘀便萬全矣蓋人之子宮萬筋所細結也筋熱則縱弛寒則堅強太寒則筋急而兜裹不密氣散血漏太熱則筋弛而兜裹無力亦氣散血漏今人之體虛熱居多故孕後脈多洪滑數疾若太滑或按之即芤者多墮以其氣熱而血虛也余於婦科經産深佩孫真人之訓頗切講求用藥不拘成例總從氣血寒熱虛實六字上著想而於脈象上定其真假故病無遁情治未或誤也古人以桂枝湯為妊娠主方今人以四物湯為妊娠主方真古今人識力不相及也至謂胎産百病均以四物加味極謬之談而百口稱述殊不可解余見妊婦産婦外感致成勞損者皆此方加味之所致也桔梗不能升散李東垣謂桔梗為藥中舟楫能載諸藥上浮於至高之分當時未曾分明甘苦而推其功用則當屬於甘者若苦梗泄肺是能泄至高之氣不能升氣於至高也近日著本草者列其說於苦桔梗條內謬矣甜桔梗味甘而靜能升發胃氣故能解百藥毒與葛根相近後人又謂桔梗能開肺發表此則甘苦皆無此功且諸書並明言咳嗽以苦梗開之何也彼蓋見苦梗中挾辛膻之氣也而孰知其辛不敵苦耶故徐靈胎謂外感作咳用桔梗麥冬清肺便成勞損可稱偉論仲景抵當湯丸大黃䗪蟲丸時醫無術不議病而議藥無問病之輕重但見藥力之稍峻者遂避之如虎而不察其所為峻者果何在也故病之當用攻者輕則桃仁桑皮重則大黃芒硝再重則寧用牽牛巴豆而所謂䗪蟲虻蟲水蛭蠐螬則斷斷乎不敢一試何者其認病認藥皆不真故但取輕者以模稜了事也誤人性命豈淺鮮耶夫牽牛巴豆等藥直行而破氣能推蕩腸胃有形之渣滓而不能從容旁滲於經絡曲折之區以疏其瘀塞也故血痹之在經絡臟腑深曲之處者非抵當輩斷不為功而誤用硝黃牽牛巴豆直行破氣是誅伐無過矣且血痹而破其氣氣虛而血不愈痹耶世之樂彼而惡此者亦曰虻蟲水蛭有毒耳牽牛巴豆獨無毒耶竊以狂夫一得為天下正告之曰牽牛巴豆破氣而兼能破血者也其行直而速病在腸胃直道之中而未及四滲則以此下之愈矣若血絡屈曲俱有瘀滯非虻蛭之橫行而緩者不能達也虻蛭止攻血略無傷於氣且其體為蠕動之物是本具天地之生氣者當更能略有益於人氣也有氣則靈故能屈曲而旁達也海藏云妊娠蓄血忌抵當桃仁只以大黃合四物服之則母子俱可無損而病愈以胎倚血養故不得以虻蛭破血太急也然胎亦借大氣舉之若氣虛者又不如抵當桃仁加補氣藥之為穩矣大黃瀉心湯是實則瀉子法難經云虛則補母實則瀉子此亦互文見義以明補瀉有活法不必專執本臟也故常有實瀉母而虛補子者仲景瀉心湯中用大黃卻確是實則瀉子之義是火為土壅濕熱菀結胸中致火氣不能遂其升降之用發為喘滿痞結者也補瀉母子是因本臟不可直補直瀉而委曲求全之法也凡病須補瀉兼到者不能一臟而兩施補瀉也則權母子而分施之燥屎與宿食用藥不同燥屎為津液耗虛腸胃枯結而屎不得下是陽之有餘陰之不足也宿食為胃有寒濕水穀久停不化是陰之有餘陽之不足也故仲景用承氣治燥屎以芒硝清熱大黃潤燥而以枳朴推其氣使之下行若宿食不得熟腐必以乾薑豆蔻山楂麥芽溫而化之矣近醫燥屎宿食不分每以山楂麥芽治燥屎致愈堅而不得下以大黃芒硝下宿食每致洞泄完穀陽脫而死此等淺證尚不能辨治何以醫為東垣以大便祕結為血中伏火此指常祕者言又有卒祕於春分前後者亦多因肝陽初升伏火乍動所致若卒祕於秋分前後或夏月久旱暑盛之時則多屬肺氣虛燥之故暑燥既已開泄肺氣而汗多又傷津液加以口鼻呼吸亢氣遂致肺氣不足以下降津液不足以濡潤大腸是為肺移燥於大腸與血中伏火無涉吾每以沙參蔞根各用兩許投之其效甚捷不待用血藥也小兒乳食停滯小兒乳滯或夾食或夾風寒乳為血質非尋常藥力所能攻古人用硇砂巴豆其意深矣今人不敢用吾每重用桃仁山楂於劑中取效甚捷甚者加檳榔牽牛無不應手乃有不但不敢用檳榔牽牛並譏山楂桃仁之峻非小兒弱質所能勝者然則吾以山楂桃仁殺人之小兒不亦多矣乎有面滯者加杏仁且吾家小兒一遇夾食即用京都萬應散此乃錢氏方內有牽牛巴豆輕粉硃砂每用輒效未見有損嗚呼小兒元氣幾何若不認證真切峻藥急治而畏怯嘗試遷延日久元氣漓矣即神丹其能救耶人謂小兒臟腑弱不堪峻藥之攻刷吾亦謂小兒臟腑弱不堪久病之蹂躪也只在認證真而已認證不真無論峻藥平藥皆能殺人金銀薄荷湯下金銀花薄荷湯下金銀箔錢仲陽小兒直訣方中涼驚丸五色丸後有金銀薄荷湯下之文他書引此每於金銀下加花字絳雪園古方選注真珍圓下有金銀花薄荷湯下此方出許叔微本事方原書並無花字是花字之為妄增無疑矣凡此等方皆治小兒驚癇與大人痰厥諸病金銀之氣能鎮肝逆薄荷之氣辛散通絡義本昭然於花何與耶又顱囟經治驚牛黃丸方下有云加金銀箔五片考箔薄古通用故敗脈之象有如懸薄即謂寬散如簾箔之懸也況金銀箔更因其形體之薄而立名其通用更不僅音之相近矣竊恐錢許方中不但花字衍文即荷字亦恐後人附會妄增耳第相沿已久不敢定斥為誤姑論而存之後閲一年得讀全幼心鑑書中極論金銀入藥之誤謂薄荷家園葉小者名金銀薄荷銀字誤也此說雖異而用意正與豫同是讀書細心者也存以參考娑羅果近有以娑羅果治心胃痛甚效其形如栗外有粗皮故俗或名天師栗此物來自西域古方少用本草不載惟近人趙恕軒本草綱目拾遺載之亦僅言治胃痛心疾而已嗣讀肘後方藥子一物方所言形象製法主治一一皆與娑羅果合且言婆羅門胡名那疏樹子是字音正相近矣其主治於心腹痛外更治宿食不消癰疽疔腫毒箭蛇螫射工諸毒入腹難産及惡露不止不下帶下齲齒各證外敷內服均無不效中國謂之藥子去外粗皮取中仁研細末用千金方第九卷治瘟疫以藥子二枚研末水服是皆前人之所未考也娑羅樹今京都西山臥佛寺有之小柴胡非治瘧正方世莫不以柴胡為治瘧正藥者以小柴胡湯能治寒熱往來之證也豫嘗深思此方乃治寒熱往來之方非治瘧之正方也金匱以此方去半夏加栝蔞以治瘧發而渴者又曰亦治勞瘧其大旨可見矣蓋瘧之正病乃寒濕傷於太陽暑熱傷於太陰二氣交爭於脊膂膜原之間而發也其治宜九味羌活加味又有疸瘧經謂陰氣獨絶陽氣孤行此暑盛於內微寒束於外津液耗竭而作也治宜白虎湯加味二者一寒一熱皆邪盛之正瘧也小柴胡方中藥味是滋榮以舉衛必榮氣不足衛氣內陷榮衛不和寒熱往來之虛證始得用之人參甘草黃芩以益榮清熱柴胡半夏以提衛出榮薑棗以兩和之故人之勞倦傷氣中氣內陷津液耗竭衛氣滯於榮分而不得達者得之其效如神故曰治勞瘧也若近日正瘧皆是寒濕下受隨太陽之經上入脊膂內犯心包暑氣上受入太陰之臟而內伏膜原外再新感微寒暑氣益下寒氣益上遂交爭而病作矣小柴胡慮其助寒不可用也若用於疸瘧又嫌其助燥矣近有見柴胡無效或病轉增劇不得其故妄謂用之太早引邪入里又謂升散太過有傷正氣皆未得柴胡之性者也神農本經柴胡功用等於大黃是清解之品其疏散之力甚微性情當在秦艽桔梗之間能泄肝中逆氣清膽中熱氣濁氣自唐以前無用柴胡作散劑者宋以後乃升柴並稱矣傷寒邪至少陽是大氣橫結而漸化熱矣故以此兼開兼降之劑緩疏之豈發散之謂耶仲景方當分四派昔人謂仲景傷寒方分三大綱曰桂枝曰麻黃曰青龍是也然此三方皆隸太陽何得以該全書之旨耶竊嘗反復傷寒一部其方當分四派桂枝麻黃葛根青龍細辛為一派是發表之法也理中四逆白通真武為一派是溫里之法也柴胡瀉心白虎梔鼓為一派是清氣分無形虛熱之法也承氣陷胸抵當化瘀為一派是攻血分有形實邪之法也其中參伍錯綜發表之劑有兼溫中有兼清氣有兼攻血清裡之劑有兼攻血有兼發表更有夾有溫里者變化無方萬法具備故學者但熟讀傷寒金匱方而深思之有得於心如自己出自能動中規矩肆應無窮矣阿片體性阿片味苦性斂苦屬火而燥走骨走血斂屬金而急行肺行膚清中含濁能束人之氣縮人之血氣初得束則勢激而鼓動有力血初得縮則脈松而周運無滯筋節亦借其束力縮力頓覺堅強故為之神清氣爽而體健也其能止痛亦以其能束氣而縮血故也其性陰險中有所伏其毒力能變化人之血性使血脈骨髓臟腑之中化生一種怪氣其形如蟲能使人之性情俱變蓋性情隨氣血而變者也蟲即血中之靈氣也氣血久束久縮反被困而乏生機故日久則氣短而音粗血變而色壞其常苦燥結者以血氣之勢力為煙力所束縮不得宣發而內積也脫癮則氣馳而汗出血散而身寒筋骨亦為之緩縱而不收甚至喘咳不止者以氣血慣受束縮一經鬆懈遂渙散頽唐無以溫里而衛表也治之必用苦燥斂急之品合行血固氣之品並能搜入骨脈深隱之處抉其伏氣使其伏氣遂漸外泄正氣日漸內充吐故納新漸復常度乃真斷癮也常須謹慎稍有忽略即易生病而癮象復見矣若氣血本虛癮又深久更難斷戒是終身之苦也當歸當歸辛甘香膻大溫入肝通行氣血開結散郁壯肝膽陽氣化血脈寒痹凡寒濕凝滯筋骨疼痛拘急不能得汗者以此溫通之性雖能潤而血分虛燥肝胃火沖暈眩嘔吐多汗者忌與以其溫升開散也秦産甘潤川産辛劣亦能通督脈達巔頂以升陽氣而闢陰邪鬼魅青蒿桔梗柴胡澤瀉龍骨青蒿苦微辛微寒清而能散入肝膽清濕熱開結氣宣氣之滯於血分者凡芳香而寒者皆能疏化濕盛氣壅之濁熱及血滯氣虛之鬱熱不宜血虛氣亢之燥熱也即茵陳夏枯苦梗柴胡秦艽之屬皆是苦桔梗大苦甘辛而涼能降能開入肺清熱散風風火菀亢於上焦故神農主兩脅脹痛本草主咽痛化斑疹止咳解溫毒癰疽排膿皆火邪菀結之病宜用苦者甜梗生津益氣攻近黃耆而力較薄柴胡苦寒清降之品也入肝膽清結熱降逆氣疏理腸胃濕熱止暈眩嘔吐除脅脹堅痿緩並無宣發升騰之性但氣清能燥不能潤燥則近於升散故溫熱菀結者宜之陰虛火亢未合也其主寒熱往來是疏理濕熱結氣之功能清疏營分之結熱不能開發衛分之表邪而世以治寒濕瘧失之澤瀉辛麻苦寒入三焦膀胱迅逐水邪其辛麻能使三焦膀胱之細絡為之開疏而水得暢下故滲竅之力甚猛若無水邪即傷津液尤能泄命門真火下焦元氣夫陽虛水蓄合桂附用陰虛火熾合地黃用而桂附地黃不能敵其滲泄之力每用一錢且合山萸五味木瓜之酸收至三四劑即中氣不續下焦如開古謂過服損目正以腎津竭而肝氣陷也暫用少許以為導水導火之引子龍骨土也而形色象木其味甘澀能收斂木氣清利土氣故主肝氣犯胃木土相激氣逆不和諸證其鎮水邪安心氣皆平肝逆之功也健脾澀大腸皆益土製水之功也燥澀無潤大致水濕上泛者宜之
