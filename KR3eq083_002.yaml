body:
  text: 卷一證治總論氣血精神論醫者道之流也道家以精氣神謂之三寶不言血者賅於精也是故氣有三曰宗氣也榮氣也衛氣也精有四曰精也血也津也液也神有五曰神也魂也魄也意與智也志也是五臟所藏也凡此十二者為之大綱而其變則通於天地萬物而不可以數紀內經邪客曰五穀入於胃也其糟粕津液宗氣分為三隧故宗氣積於胸中出於喉嚨以貫心肺而行呼吸焉營氣者泌其津液注之於脈化而為血以榮四末內注五臟六腑以應刻數焉衛氣者出其悍氣之慓疾而先行於四末分肉皮膚之間而不休者也五味曰谷入於胃其精微者先出於胃之兩焦以溉五臟別出兩行營衛之道其大氣之轉而不行者積於胸中命曰氣海出於肺循喉嚨呼則出吸則入營衛生會曰谷入於胃以傳與肺五臟六腑皆以受氣其清者為營濁者為衛營在脈中衛在脈外營周不息陰陽相貫如環無端營出中焦衛出下焦中焦受氣泌糟粕蒸津液化其精微上注於肺脈乃化而為血以奉生身莫貴於此故獨得行於經隧命曰營氣營衛者精氣也血者神氣也上焦如霧中焦如漚下焦如瀆刺節真邪曰氣積於胃以通營衛各行其道宗氣留於海其下者注於氣街其上者走於息道決氣曰兩神相搏合而成形常先身生是謂精上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣腠理發泄汗出溱溱是謂津谷入氣滿淖澤注於骨骨屬曲伸泄澤補益腦髓皮膚潤澤是謂液中焦受氣取汁變化而赤是謂血壅遏營氣令無所避是謂脈五癃津液別曰水穀入口輸於腸胃其味有五各注其海其液別為五各走其道故三焦出氣以溫肌肉充皮膚為其津其流而不行者為液天暑衣厚則腠理開故汗出天寒衣薄腠理閉氣濕不行水下溜於膀胱則為溺與氣非哀氣並則為泣中熱胃緩則為唾本神曰天之在我者德也地之在我者氣也德流氣薄而生者也故生之來謂之精兩精相搏謂之神隨神往來謂之魂並精出入謂之魄所以任物謂之心心有所憶謂之意意有所存謂之志因志而存變謂之思因思而遠慕謂之慮因慮而處物謂之智天年曰血所已和營衛已通五臟已成神氣舍心魂魄畢具乃成為人本臟曰人之血氣精神者所以奉生而周於性命者也經脈者所以行血氣而營陰陽濡筋骨利關節者也衛氣者所以溫分肉充皮膚肥腠理司開合者也志意者所以御精神收魂魄適寒溫和喜怒者也是故血和則經脈流行營復陰陽筋骨徑強關節清利矣衛氣和則分肉解利皮膚調柔腠理致密矣志意和則精神專直魂魄不散恚怒不起五臟不受邪矣寒溫和則六腑化谷風痹不作經脈通利肢節得安矣此人之常平也五臟者所以藏精神血氣魂魄者也六腑者所以化水穀而行津液者也此人之所以具受於天者無智愚賢不肖不能相倚也偉哉論也美矣備矣其合之於五臟則有肝木心火脾土肺金腎水五行之氣之不同也有肝淚心汗脾涎肺涕腎唾五液之精之各足也有肝魂心神脾意肺魄腎志五蘊之神之至靈也其為變也氣之亂則為五脹出靈樞脹論為癲厥精之亂則為五水為淋濁血之亂則為癰疽為積聚為鼽衄為咯血神之亂也精神虛而相併並於心則喜並於肺則悲並於肝則憂並於脾則畏並於腎則恐紛紜糾錯蓋有不可以數計而口辨者而茲乃括之以三氣四精五神者何也道其常而已矣其常奈何氣者無形而有機者也以其機之所動有三焦之分出也精者有形者也有形則有質以其質之所別有四等之不同也神者無形無機而有用者也以其用之所成故推見五性之大本也衛氣者本於命門達於三焦以溫肌肉筋骨皮膚慓悍滑疾而無所束者也營氣者出於脾胃以濡筋骨肌肉皮膚充滿推移於血脈之中而不動者也宗氣者營衛之所合也出於肺積於氣海行於氣脈之中動而以息往來者也是故衛氣者熱氣也凡肌肉之所以能溫水穀之所以能化者衛氣之功用也虛則病寒實則病熱營氣者濕氣也凡經隧之所以滑利髮膚之所以充潤者營氣之功用也虛則皴揭稿澀實則淖澤胕腫光浮於外衛氣失常曰營氣沛然者病在血脈宗氣者動氣也凡呼吸言語聲音以及肢體運動筋力強弱者宗氣之功用也虛則短促少氣實則喘喝脹滿凡人之身衛氣不到則冷榮氣不到則宗氣不到則痿痹而不用此三者內經謂之肉苛謂其枯稿縮瑟而光彩不發也故衛氣有寒熱病營氣有濕病燥病宗氣有鬱結病有勞倦病三氣互為體用有兩得而無兩離者也秦景明曰氣猶火也水穀猶薪也火大則能化薪薪多則益能生火此先天后天還相為質者也故熱氣蒸則濕氣生濕熱盛則動氣疾而熱亢則孔竅生煙濕勝則水精不布世謂補火即是補氣又謂降氣即是降火是止言衛氣而已柯韻伯曰水穀之精氣行於脈中者為營氣其悍氣行於脈外者為衛氣大氣之積於胸中而司呼吸者為宗氣是分後天運用之元氣而為三也又外應皮毛協營衛而主一身之表者為太陽膀胱之氣內通五臟司治節而主一身之裡者為太陰肺金之氣通行內外應腠理而主一身之半表半里者為少陽三焦之氣是分先天運行之元氣而為三也是有六氣矣謬立名義顯悖經旨試思所謂先天三氣何嘗越於衛出下焦之外耶後世言氣者遺宗氣而言衛出上焦其説始於華他中藏經蓋誤會難經心營肺衛之義也難經言心營肺衛者氣行之機非氣出之本也是故三氣者各有其本各行其道而不可相干失常則變矣壽夭剛柔曰營之生病也寒熱少氣血上下行衛之生病也氣痛時來時去怫愾賁響風寒客於腸胃之中寒痹之為病也留而不去時痛而皮不仁平人氣象曰胃之大絡名曰虛里貫膈絡肺出左乳下其動應脈宗氣也其動應衣宗氣泄也此三氣之自敝也五亂曰氣亂於心則煩心密默俯首靜伏亂於肺則俯仰喘喝接手以呼亂於腸胃則為霍亂亂於脛臂則為四厥亂於頭則為厥逆頭重眩僕病能曰有病怒狂者病名曰陽厥陽氣者因暴折而難決故善怒也何以知之陽明者常動巨陽少陽不動不動而動大疾此其候也癲狂曰厥逆為病也足暴清胸若將裂腸若將以刀切之著至教曰三陽獨至者是三陽並至並至如風雨上為巔疾下為漏澼口問曰人之自齧舌者此厥逆上走脈氣輩至也少陰氣至則齧舌少陽氣至則齧頰陽明氣至則齧唇矣調經曰氣血以並陰陽相傾氣亂於衛血逆於經血氣離居一實一虛血並於陰氣並於陽故為驚狂血並於陽氣並於陰乃為炅中血並於上氣並於下心煩惋善怒血並於下氣並於上亂而善忘氣之所併為血虛血之所併為氣虛血氣相失故為虛焉血與氣並故為實焉此數病者是三氣之並而相亂也調經曰陽虛生外寒者陽受氣於上焦以溫皮膚分肉之間今寒氣在外則上焦不通上焦不通則寒氣獨留於外故寒栗陰虛生內熱者有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熏胸中故內熱言勞倦傷氣不能鼓動穀氣精微達於周身是以上下不通而胃中水穀氣熱僅能熏積於胸中也此隔病之所起也生氣通天曰陽蓄積則當隔隔者當瀉陽盛生外熱者上焦不通利則皮膚緻密腠理閉塞玄府不通衛氣不得泄越故外熱陰盛生內寒者厥氣上逆寒氣積於胸中而不瀉不瀉則溫氣去寒獨留則血凝泣凝則脈不通其脈盛大以澀故中寒生氣通天曰陰不勝其陽則脈流薄疾並乃狂陽不勝其陰則五臟氣爭九竅不通此三氣之虛實相勝所謂陰虛陽往營竭衛降即其事也精之以精血津液列為四者何也本神曰五臟主藏精者也故統謂之精夫血者水穀之精微得命門真火蒸化以生長肌肉皮毛者也凡人身筋骨肌肉皮膚毛髮有形者皆血類也精者血之精微所成生氣之所依也生氣者衛氣之根即命門真火是也精竭則生氣絶矣髓與腦皆精之類也津亦水穀所化其濁者為血清者為津以潤臟腑肌肉脈絡使氣血得以周行通利而不滯者此也凡氣血中不可無此無此則稿澀不行矣發於外者淚唾汗皆其類也小便其糟粕也液者淖而極厚不與氣同奔逸者也亦水穀所化藏於骨節筋會之間以利屈伸者其外出於孔竅曰涕曰涎皆其類也四者各有功用而體亦不同血之質最重濁津之質最輕清而液者清而晶瑩厚而凝結是重而不濁者也精者合血與津液之精華極清極厚而又極靈者也是神之宅也西醫謂精中有三物一曰蟲能蠕動者男女交媾即此蟲與女精合而成形也一曰珠極細極明而中空精平方一寸約有珠五百顆一曰白汁極明而淖珠與蟲皆藏汁中汁與珠二者其於交媾結形不知何用也西醫徒恃窺測而不能明理雖曰徵實然未免滯於象矣四者之在人身也血為最多精為最重而津之用為最大也內之臟腑筋骨外之皮膚毫毛即夫精也血也液也莫不賴津以濡之乃能各成其體而不敝津枯則精血可粉毛髮可折故決氣曰精脫者耳聾氣脫者目不明津脫者腠理開汗大泄液脫者骨屬屈伸不利色夭腦髓消脛酸耳數鳴血脫者色白夭然不澤其脈空虛經脈別論曰飲食飽甚汗出於胃驚而奪精汗出於心持重遠行汗出於腎疾走恐懼汗出於肝搖體勞苦汗出於脾此非汗出於臟也各因其臟氣之動鼓津以外出也營衛生會曰奪血者無汗奪汗者無血夫汗即津也其與血非一物也而有無相應者氣機應也故三氣為陽而營為陽之陰以氣與津並與四精為陰而津為陰之陽以津隨氣行也生氣通天曰陽氣者煩勞則張精絶闢積於夏使人煎厥目盲不可以視耳閉不可以聽潰潰乎若壞都都堤防也高士宗曰國都汩汩乎不可以止精絶者津耗也葉香岩溫熱論謂養陰不在補血而在生津王孟英釋之曰此增水行舟之法也有味乎其言之也五神者血氣之性也喜怒思憂恐本於天命人而無此謂之大癡其性死矣然而神之病其變不可測而又最不易治則其本末不可不知也大抵神之充也欲其調神之調也欲其靜痹論曰陰氣者靜則神藏躁則消亡生氣通天曰陽氣者靜則養神柔則養筋柔者動而和也又曰陽氣者大怒則形氣絶形氣乖離血菀於上使人薄厥有傷於筋縱其若不容陰陽應象曰暴怒傷陰暴喜傷陽厥氣上行滿脈去形喜怒無度生乃不固故四氣調神篇大義所惡者逆而所以奉生奉長奉收奉藏者必賴乎預也故陰陽應象曰怒傷肝悲勝怒喜傷心恐勝喜思傷脾怒勝思憂傷肺喜勝憂恐傷腎思勝恐此五性之相制也舉痛曰怒則氣上喜則氣緩悲則氣消恐則氣下驚則氣亂勞則氣耗思則氣結此五性之病機也本神曰肝藏血血舍魂虛則恐實則怒脾藏營營舍意虛則四肢不用五臟不安實而腹脹涇溲不利心藏脈脈舍神虛則悲實則笑不休肺藏氣氣舍魄虛則鼻塞不利少氣實則喘喝胸盈仰息腎藏精精舍志虛則厥實則脹此五性之病之虛實也脾肺腎三臟不言神病者已具肝心二臟之病之中可推而知也又曰心怵惕思慮則傷神神傷則恐懼自失破䐃脫肉毛悴色夭死於冬脾憂愁不解則傷意意傷則悗亂四肢不舉毛悴色夭死於春肝悲哀動中則傷魂魂傷則狂妄不精不精則不敢正當人陰縮而攣筋兩脅骨不舉毛悴色夭死於秋肺喜樂無極則傷魄魄傷則狂狂者意不存人皮革焦毛悴色夭死於夏腎盛怒不止則傷志志傷則善忘其前言腰脊不可以俯仰屈伸毛悴色夭死於長夏恐懼而不解則傷精精傷則骨酸痿厥精時自下故五臟主藏精者也不可傷傷則失守而陰虛陰虛則無氣而死矣此五性之病因病形與其死期也經曰死於秋死之於冬則治之不當用秋冬之劑可知矣經曰死於春死於夏則治之不得用春夏之劑可知矣秋冬之劑者寒燥斂降之劑也春夏之劑者溫熱升散之劑也此治法之可以對觀而得也邪氣臟腑病形曰愁憂恐懼則傷心形寒寒飲則傷肺有所墮墜惡血留內有所大怒氣上而不下積於脅下則傷肝有所擊僕若醉入房汗出當風則傷脾有所用力舉重若入房過度汗出浴水則傷腎經脈別論曰夜行則喘出於腎淫氣病肺有所墮恐喘出於肝淫氣害脾有所驚恐喘出於肺淫氣傷心度水跌僕喘出於腎與骨當是之時勇者氣行則已怯者則著而為病也此又外之不節以傷其內孟子所謂蹶者趨者是氣而反動其心者也凡察病機惟鬼來克身與子來泄氣二者其勢最重華他曰如心病入肝是亦難治子不合乘母之逆也所謂思慮傷心盛怒傷腎是也又神病多徵於夢靈樞淫邪發夢篇是其義也大氣者精之御也精者神之宅也神者氣與精之華也各生於五臟而五臟之中又各有所主是故氣之主主於命門精之主主於腎神之主主於心而復從於膽難經曰寸口脈平而死者何也然諸十二經脈者皆繫於生氣之原所謂生氣之原者謂十二經之根本也謂腎間動氣也此五臟六腑之本十二經脈之根呼吸之門三焦之原一名守邪之神故氣者人之根本也根絶則莖葉枯矣寸口脈平而死者生氣獨絶於內也又曰臍下腎間動氣者人之生命也十二經之根本也故名曰原三焦者原氣之別使也主通行三氣經歷於五臟六腑又曰命門者精神之所舍原氣之所繫也男子以藏精女子以系胞此所謂氣主於命門者也上古天真曰腎者主水受五臟六腑之精而藏之故五臟盛乃能瀉六節臟象曰腎者主蟄封藏之本精之處也此所謂精主於腎者也靈蘭祕典曰心者君主之官神明出焉肺者相傅之官治節出焉肝者將軍之官謀慮出焉膽者中正之官決斷出焉膻中者臣使之官喜樂出焉脾胃者倉廩之官五味出焉補遺云脾者諫議之官智周出焉大腸者傳導之官變化出焉小腸者受盛之官化物出焉腎者作強之官伎巧出焉三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣凡此十二官者不得相失也故主明則下安主不明則十二官危使道閉塞而不通形乃大傷經脈別論曰太陰臟搏者用心省真五臟氣少胃氣不平謂過用其心傷其真氣致五臟脈氣俱少也脈經曰思慮傷心其脈弦是也此所謂神主於心者也奇病曰口苦者病名曰膽疸夫肝者中之將也取決於膽咽為之使此人者數謀慮不決故膽虛氣上溢而口為之苦矣六節臟象曰凡十一臟皆取決於膽也仲景謂心氣虛則魂魄妄行華他謂膽實熱則精神不守此所謂復從於膽者也心膽神之主腦又神之會也故凡有思憶則目上注又嘗論之氣之三也精之四也神之五也此十二者尤必以營衛為之宰營衛之生也各具其體而不可相離也各成其用而不可相勝也各行其道而不可相干也趙睛初曰津雖陰類而猶未離乎陽氣者也內經謂熏膚充身澤毛若霧露之溉是謂氣霧露所溉萬物皆潤豈非氣中有津乎驗之口中呵氣水愈徵氣津之不相離矣氣若離乎津則陽偏勝即氣有餘便是火是也熊三拔泰西水法云凡諸藥系草木果谷菜諸部其有水性者皆用新鮮物料依法蒸餾得水名之為露以之為藥勝諸干質諸露皆是精華不待胃化脾傳已成微妙且蒸餾所得既於諸物體中最為上分復得初力則氣厚勢大夫蒸露以氣上蒸而得雖屬水類而隨氣流行體極清輕以治氣津枯耗其功能有非他藥所能及所謂氣津枯耗者傷陰化燥清竅乾澀內經謂九竅者水注之氣乾澀者病人自覺火氣從口鼻出是津離乎氣而氣獨上注者也所謂其體不可相離者此也柯韻伯謂氣上騰便是水此語最足玩味蓋陰氣凝結津液不得上升以致枯燥治宜溫熱助陽俾陰精上交陽位如釜底加薪釜中之水氣上騰其潤澤有立至者仲景以八味丸治消渴即此義也但枯燥有由於陰竭者必須大劑濡養如救焚然故同一枯燥而有陰凝陰竭之分二證霄壤至宜細審不可誤也所謂其用不可相勝者此也微火緩烘即令物燥而盛火急炙轉令物潤故陰凝而見燥化者當加大熱品於清潤之中則力能蒸騰其氣以開結而回陽若但取小溫小潤謬謂和平而不知真陰轉暗為所傷矣病勢日進遂謂病不受溫改用清涼致人於死可嘆也趙晴初謂病重藥輕亦能增病即此類也此又始於相勝成於相平者也氣行之亂也大率衛強營弱營為衛擾而不得寧而衛之為榮所滯者則惟水腫一端而已衛氣之竄入營道也亂之於在表肌腠之隙則令人汗出而不可止所謂衛氣不共營氣和諧也風鼓其衛不能自固津隨氣行而亦外越以桂枝湯復發其汗則愈不得援有汗禁汗之常例矣亂於在裡血絡之隙則令人血湧傾碗盈盤而不可御或寒束其脈血無所容或痰壅其脈血不能行或火鼓其氣血為之奔逸而外溢下文泄肺肝是治火盛若痰壅則宜兼溫疏若寒束更重用溫散矣世醫概用清降以致成勞而死內經示從容曰脈急者血泄血無所行也此理甚明恨無知者葉香岩治湧血必先泄肺者是急泄衛氣也然不如泄肝為尤切二者皆氣在於隙故皆有所泄也若氣亂於大經之中其機向外而無所泄也則壅盛於四肢而逾垣上屋之事見矣所謂巨陽少陽其動大疾病為怒狂也其機向內而無所泄也則壅窒於臟腑而昏厥顛仆之事見矣更有氣並於氣之細絡而脹悶不堪致生自齧自刃之變者又有氣滯於血之細絡而怫鬱不解致成為癢為疹之災者至於營竭道澀而衛氣內伐則不瞑營盛膚濕而衛氣久留則多臥內經謂胃不和則臥不安中藏經謂膽熱則多睡膽冷則無眠溫病逆傳心包則神昏譫妄此津傷而神機不利清氣不生也經曰津液相成神乃自生神借津以養也是又因氣之盈虧而神為之纍矣盈虧雖殊總由於推行不利而已矣此氣之失其道而相干者也升降出入論六微旨論曰出入廢則神機化滅升降息則氣立孤危故非出入則無以生長壯老已非升降則無以生長化收藏升降出入無器不有器散則分之生化息矣王氏釋之曰凡竅橫者皆有出入去來之氣竅豎者皆有陰陽升降之氣往復於中即如壁窗戶牖兩面伺之皆承來氣衝擊於人是則出入氣也西醫謂人居室中不可兩面開窗則人之中氣為往來之氣所衝擊不能支即頭空痛矣又如陽升則井寒陰升則水暖以物投井及葉墜空中翩翩不疾皆升氣所礙也虛管溉滿捻上懸之水固不泄為無升氣而不能降也空瓶小口頓溉不入為氣不出而不能入也可謂發揮盡致矣劉河間曰皮膚之汗孔者謂泄汗之孔竅也一名氣門謂泄氣之門戶也一名腠理謂氣液之隧道紋理也一名鬼門謂幽冥之門也一名玄府謂玄微之府也然玄府者無物不有人之臟腑皮毛肌肉筋膜骨髓爪牙至於萬物悉皆有之乃出入升降道路門戶也經曰升降出入無器不有故知人之眼耳鼻舌身意神識能為用者皆由升降出入之通利也有所閉塞則不能用也故目無所見耳無所聞鼻不聞香舌不知味筋痿骨痹爪退齒腐毛髮墮落皮膚不仁腸胃不能滲泄者悉由熱氣怫鬱玄府閉塞而致津液血脈榮衛清濁之氣不能升降出入故也各隨怫鬱微甚而為病之大小焉李東垣曰聖人治病必本四時升降浮沉之理權變之宜必先歲氣無伐天和經謂升降浮沉則順之寒熱溫涼則逆之仲景謂陽盛陰虛下之則愈汗之則死陰盛陽虛汗之則愈下之則死大抵聖人立法且如升陽或散發之劑是助春夏之陽氣令其上升乃瀉秋冬收藏殞殺寒涼之氣此升降浮沉之至理也天地之氣以升降浮沉乃生四時如治病不可逆之故順天者昌逆天者亡夫人之身亦有四時天地之氣不可只認在外人亦體同天地也吳醫匯講引蔣星墀説曰傷寒論所謂傳經即是出入精義蓋正氣出入由厥陰而少陰太陰而少陽陽明太陽循環往復六淫之邪則從太陽入一步反歸一步至厥陰而極此邪氣進而正氣退行不復與外氣相通故開闔樞三者最為要旨見素問陰陽離合論靈樞根結篇中分言之為出入為升降合言之總不外乎一氣而已矣觀東垣脾胃論浮沉補瀉圖以卯酉為道路而歸重於蒼天之氣考其所訂諸方用升柴苓澤等法實即發源於長沙論中葛根柴胡五苓之意引而伸之所謂升之九天之上降之九地之下雖內傷外感殊科而於氣之升降出入則無以異耳吳鞠通溫病條辨有曰風之體不一而風之用亦殊春風自下而上夏風橫行空中秋風自上而下冬風刮地而行其方位也則有四正四隅此方位之合於四時八節也諸家之論闡發無餘蘊矣升降出入者天地之體用萬物之橐籥百病之綱領生死之樞機也茲更舉天地之氣人身之氣與夫脈象病機治宜一一而條析之四時之氣春生夏長秋收冬藏其行也如輪之轉旋至圓者也如春氣自下而上直行者是冬氣橫斂已極堅不可解若徑從橫散則與冬氣驟逆矣氣不可逆也故先從直行以活其機而後繼以夏之橫散也夏氣疏散已極若徑從橫斂又與夏氣驟逆矣轉旋之機不可驟也故先以秋之直降而後繼以冬之橫斂也所以然者各以其橫行直行之極也直行極則不可以徑從直升直降而必先有橫行開闔之氣以疏之橫行極則不可以徑從橫散橫斂而必先有直行浮沉之氣以達之若直行未極則升者未嘗不可以直降降者未嘗不可以直升橫行未極則散者未嘗不可以橫斂斂者未嘗不可以橫散即如春日未嘗無秋風而春之後決不可繼以秋也夏日未嘗無冬風而夏之後決不可繼以冬也此天地四時斡旋之機妙也人身肌肉筋骨各有橫直腠理為氣所出入升降之道升降者裡氣與裡氣相回旋之道也出入者裡氣與外氣相交接之道也裡氣者身氣也外氣者空氣也鼻息一呼而周身八萬四千毛孔皆為之一張一吸而周身八萬四千毛孔皆為之一翕出入如此升降亦然無一瞬或停者也內經曰陽在外陰之使也陰在內陽之守也又曰陽氣者衛外而為固也陰氣者藏精而起亟也此出入之機也又曰天地之精氣其大數常出三而入一故谷不入半日則氣衰一日則氣少矣此出入之數也推求師意曰在肝則溫化其氣升在心則熱化其氣浮在脾則沖和之化其氣備在肺則涼化其氣降在腎則寒化其氣藏內經曰濁氣在上則生䐜脹清氣在下則生飧泄又曰夏暑汗不出秋成風瘧冬不藏精春必病溫此升降出入之常變也內而臟腑外而肌肉縱橫往來並行不悖如水之流逝者自逝而波浪之起伏自起伏也其合四時也春則上升者強而下鎮者微矣夏則外舒者盛而內守者微矣秋則下抑而上鼓者微矣冬則內斂而外發者微矣此其常也逆冬氣則奉生者少矣逆春氣則奉長者少矣逆夏氣則奉收者少矣逆秋氣則奉藏者少矣太過不及皆為逆也此其變也故聖人必順四時以調其神氣也其在脈象則有三部九候三部者寸關尺也以候形段之上下以直言之也九候者浮中沉也以候形層之表裡以橫言之也病在上則見於寸在下則見於尺病在裡則見於沉在表則見於浮裡寒外熱則沉緊浮緩裡熱外寒則沉緩浮緊上虛下實則寸小尺大上實下虛則寸強尺弱此脈象之大略也其在病機則內傷之病多病於升降以升降主裡也外感之病多病於出入以出入主外也傷寒分六經以表裡言溫病分三焦以高下言溫病從里發故也升降之病極則亦纍及出入矣出入之病極則亦纍及升降矣故飲食之傷亦發寒熱風寒之感亦形喘喝此病機之大略也至於治法則必明於天地四時之氣旋轉之機至圓之用而後可應於無窮氣之亢於上者抑而降之陷於下者升而舉之散於外者斂而固之結於內者疏而散之對證施治豈不顯然而易見者乎然此以治病之輕且淺者可耳若深重者則不可以徑行而必有待於致曲夫所謂曲者何也氣亢於上不可徑抑也審其有餘不足有餘耶先疏而散之後清而降之不足耶行斂而固之後重而鎮之氣陷於下不可徑舉也審其有餘不足有餘耶先疏而散之後開而提之不足耶先斂而固之後兜而托之氣鬱於內不可徑散也審其有餘不足有餘者攻其實而汗自通故承氣可先於桂枝不足者升其陽而表自退故益氣有借於升柴氣散於外不可徑斂也審其有餘不足有餘者自汗由於腸胃之實下其實而陽氣內收不足者表虛由於脾肺之虧宣其陽而衛氣外固此皆治法之要妙也苟不達此而直升直降直斂直散鮮不僨事矣嘗憶先哲有言胸腹痞脹昧者以檳榔枳朴攻之及其氣下陷泄利不止復以參耆升柴舉之於是氣上下脫而死矣此直升直降之禍也況升降出入交相為用者也用之不可太過當升而過於升不但下氣虛而裡氣亦不固氣喘者將有汗脫之虞矣當降而過於降不但上氣陷而表氣亦不充下利者每有惡寒之證矣當斂而過於斂不但裡氣郁而下氣亦不能上朝當散而過於散不但表氣疏而上氣亦不能下濟矣故醫者之於天人之氣也必明於體尤必明於用必明於常尤必明於變物性亦然寒熱燥濕其體性也升降斂散其功用也升柴參耆氣之直升者也硝黃枳朴氣之直降者也五味山萸金櫻覆盆氣之內斂者也麻黃桂枝荊芥防風氣之外散者也此其體也而用之在人此其常也而善用之則變化可應於不窮不善用之則變患每生於不測王漢皋論溫病大便祕右寸洪實而胸滯悶者宜枳朴蔔子橫解之蘇子桔梗半夏檳榔豎解之其言橫解豎解是矣其所指諸藥則未是也即東垣諸方慣用升柴枳朴亦未免直撞之弊若潔古枳朮丸以荷葉燒飯為丸則有欲直先橫之妙矣籲醫豈易言者乎又嘗論之氣之開闔必有其樞無升降則無以為出入無出入則無以為升降升降出入互為其樞者也故人之病風寒喘咳者以毛竅束於風寒出入之經隧不利而升降亦迫矣病尸厥卒死者以升降之大氣不轉而出入亦微矣生氣通天曰大怒則血菀於上使人薄厥調經曰血氣並走於上則為大厥扁鵲曰陽脈下墜陰脈上爭會氣閉而不通陰上而陽內行下內鼓而不起上外絶而不為使上有絶陽之絡下有破陰之紐破陰絶陽之色已廢脈亂故形靜如死狀凡人出入之氣本微於升降升降既息出入更微矣故扁鵲謂當聞其耳鳴而鼻張循其兩股以至於陰當尚溫也此所謂出入更微者也又嘗著左右陰陽論勞痹證治論文義淺陋而與此相發其論左右陰陽曰朱丹溪謂脾具坤靜之體而有乾健之運故能使心肺之陽降肝腎之陰升而成地天交之泰矣近世黃元御著書專主左升右降立説以為心肺陽也隨胃氣而右降降則化為陰肝腎陰也隨脾氣而左升升則化為陽故戊己二土中氣四氣之樞紐百病之權衡生死之門戶養生之道治病之法俱不可不謹於此其書八種直將素問靈樞傷寒金匱本草五大部聖經俱籠入左升右降四字之中蓋自以為獨開生面得內經左右陰陽道路之奧旨矣竊思內經之論陰陽也不只言升降而必言出入升降直而出入橫氣不能有升降而無出入出入廢則升降亦必息矣只論升降不論出入是已得一而遺一況必以升降分屬左右則尤難通之義也左右俱有陰陽俱有升降嘗推求西醫所論人身脈絡功用與夫氣血之流行合之內經大旨榮行脈中衛行脈外榮氣是隨六陰六陽之經循環往來終而復始即以經脈之升降為升降也衛氣不拘於經行於手足六陽之部分則上升行於手足六陰之部分則下降是表升而里降也內經以左右為陰陽之道路未嘗以左即升右即降也其義如寸口候陰主中人迎候陽主外舉其大概而已脈法又以左尺主膀胱前陰右尺主大腸後陰其於內經背陽腹陰將何以合之故確求升降之道路只當分表裡而無分於左右也或曰人之患半身不遂者何也曰半身不遂是橫病不是直病何以言之人身腠理毛竅在左邊者俱左外向在右邊者俱右外向前自鼻柱後自脊骨截然中分故人側臥汗出顯有界畔者因側臥則向上半邊毛竅熱氣上蒸向下半邊毛竅熱氣不能下蒸也內經曰汗出偏沮使人偏枯故偏枯者橫氣不能左右相通也下痿者直氣不能上下相濟也左有左之升降右有右之升降上有上之升降下有下之升降上下左右又合為一大升降者也是故先天八卦坎離分東西此左陽右陰之義也後天八卦坎離分南北此表升里降之義也即如人身熱氣蒸騰只是向上其表升可知也水穀入胃糟粕下傳此必有氣以行之其里降可知也經必以左右分陰陽者日月升於東降於西人為日月所照氣亦隨之而轉旋表之升也動於左而右隨之里之降也動於右而左隨之左則表升之力強右則里降之力強耳經謂人左手足不及右強右耳目不及左聰明者亦此意也其論勞痹證治曰痹者閉也其病有二有虛勞之痹有積聚癰疽麻木疼痛之痹其積聚癰疽麻木疼痛之痹有在經絡者有在臟腑者前人論之詳矣內經中藏經諸篇可熟讀也至於虛勞之痹即俗所謂乾血勞者人身外而經絡內而臟腑其氣不外五行自上而下直分之有直五行即直五層一肺二心三脾四肝五腎也自外而內橫分之有橫五行即橫五層亦一肺二心三脾四肝五腎也內經升降息則氣立孤危言直也出入廢則神機化滅言橫也脈法左寸心關肝尺腎右寸肺關脾尺命亦言直也三菽肺六菽心九菽脾十二菽肝按之至骨腎亦言橫也升降出入雖分橫直統歸於陰陽之噓吸而已人病虛勞直氣不能布於周身若陰氣先傷則吸力先微內不能至腎至肝而還而有骨痿之事矣若陽氣先傷則呼力先微外不能至肺至心而還而有皮聚毛悴之事矣所謂肝腎心肺者謂分野之表裡淺深也如是則脈行十六丈二尺為一周者其數有不盈矣不盈則升降出入之期促故脈數也難經論損至之脈曰一呼三至至一呼六至此至之脈也一呼一至至四呼一至此損之脈也至脈從下上損脈從上下損脈之為病始於皮聚毛落而極於骨痿不能起於床反此者至之為病也從下上者皮聚而毛落者死從上下者骨痿不能起於床者死窮之於其極也盧子由曰脈來之損至即脈至之疾徐至固不離乎至損豈獨外於至乎是蓋疑虛損之脈必數而無遲也扁鵲亦曰一呼脈四至以上謂痹者脫脈氣謂失十六丈二尺一周之常經也然虛損脈遲者甚多但其情不同脈數者血液先敗塞其氣道氣悍而不通故短促也脈遲者血液未敗而真氣之力不能徑達如人行路遙力倦而欲息也是其病始於氣而未壞有形之血液故易治補其氣而血自生也氣不能周反見脈數者是血壞而氣無所歸故難治補其氣而血愈壅也是故初病即見脈數者是因痹致虛血病纍氣故曰從下損上即由里而表也先脈遲而漸見脈數者是因虛致痹氣病纍血故曰從上損下即由表而里也至於氣不能至腎至肺非全無氣也正氣為邪氣所據不能應期而至耳若全無氣則一臟氣絶五臟俱無以自存矣此勞痹之大義也積聚癰疽麻木疼痛之痹在經絡之中只是兩頭有氣中間隔塞其本未傷疏之而即復矣譬如一管之中有物結之去其結而氣自行矣此實痹之大義也實痹之治無論矣勞痹之治難經有曰損其肺者益其氣損其心者調其榮衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精此皆以虛言之也而勞痹之為病往往虛實夾雜仲景治血痹風氣百疾有薯蕷丸是補其虛也有大黃蟅蟲丸是攻其實也更有外邪久結證同虛損如徐靈胎所謂風寒不醒成勞病者近日凡病咳嗽輒稱肺熱桑葉麥冬搖筆即來生地知母滿紙俱是於是陽氣日衰風寒與水飲合力盤踞膻中漸致夜不伏枕涎中帶紅頭面胕腫呼吸喘促飲食嘔逆大便溏泄而危矣故今之病五苓青龍證者無不逼入勞損覆轍相尋至死不悟張景嶽曰外感之邪未除而留伏於經絡飲食之滯不消而積聚於臟腑或鬱結逆氣有不可散或頑痰瘀血有所留藏病久致羸似形不足不知病本未除還當治本若誤用補必益其病矣醫能明此其寡過矣乎大抵治病必先求邪氣之來路而後能開邪氣之去路病在升降舉之抑之病在出入疏之固之或病在升降而斡旋於出入或病在出入而斡旋於升降氣之上逆下不納也氣之下陷上不宣也氣之內結外不疏也氣之外泄內不諧也故趙晴初曰人身內外作兩層上下作兩截而內外上下每如呼吸而動相牽引譬如攻下而利是泄其在內之下截而上截之氣即陷內上即空其外層之表氣連邪內入此結胸之根也譬如發表而汗是疏其在外之上截而在內之氣跟出內上即空其內下之陰氣上塞此痞悶之根也故在上禁過汗在內慎攻下此陰陽盈虛消長之理也抑吾尤有默會之旨不欲為外人道而不得不道也內經以升降出入關於生長壯老己者何也本草稱日能松物以絮久曝日中則松矣是日有提攝之力也凡物皆向日不獨葵藿也非物有知日有攝力也人在日下其氣亦為日所提攝矣物置地上久則下陷以地心有吸力也人在地上其氣亦為地所吸引矣至於氣之往來於空中更無一息之或間莊子曰人在風中仲景曰人因風氣而生長人為風所鼓蕩其氣之出入不待言矣人之初生合父精母血而成形其體象地各有自具之吸力其力多藏於五臟及骨髓之中故氣能自固於體中而不散也及其生也則上為日所攝下為地所吸中為風所鼓蕩而日長日壯矣及其衰也攝之久而氣漸上脫矣吸之久而氣漸下脫矣鼓蕩之久而氣漸外散矣故為老為已也大抵三氣之中惟地之吸力最強故人死則體重以本體不能自主全為地所吸也又人死其尸不可見日恐復為日氣所提攝而尸走也生人不可與尸騎牛臨面生人身有吸力恐尸中遊氣未盡二氣相感而相吸而亦有尸走之事也是説也前人未言得毋駭俗乎夫人勞則氣動而心勞則五臟之吸力皆疏故氣易散而易老易已也人靜則氣固而心靜則五臟之吸力尤固故氣常完而多壽難老也然則明於斯義是亦養生之助也而又何駭乎痹論曰陰氣者靜則神藏躁則消亡生氣通天曰陽氣者靜則養神柔則養筋大惑論曰心勞則魂魄散志意亂故經脈別論敘五臟喘汗之事而申其戒曰四時之病常起於過用也故曰無形無患與道合同惟真人也承製生化論天地一傾軋之宇也陰陽一摩蕩之氣也五行一倚伏之數也萬物一推移之象也四時一更代之紀也此之謂日新此之謂不息不制則不生不勝則不復而天地之機息矣人物之類滅矣其機不激則不動不動則鈍而不靈而陰陽五行積於無用之地矣天地萬物有不摧裂破壞者乎內經六微旨大論曰相火之下水氣承之水位之下土氣承之土位之下風氣承之風位之下金氣承之金位之下火氣承之君火之下陰精承之亢則害承乃制制則生化外列盛衰害則敗亂生化大病夫曰下曰承云者此以六氣之步言其措詞不得不如此若推究萬物之體則所謂下者非本體之外別有所為下也乃本體之中自有此氣渾於無間者也所謂承者非從其外而附之乃具其中而存之者也何者天下無一物不備五行四時無一刻不備五行之氣但有多寡之數盛衰之宜一或運行有差則勝者亢而不勝者害矣其所以不終於害者以有制之者也其制也非制於既亢之後也火承以水則火自有所涵而不越水承以土則水自有所防而不濫土承以木則土自有所動而不郁木承以金則木自有所裁而不橫金承以火則金自有所成而不頑承者隱制於未然斯不待其亢而害消於不覺矣至於制之云者世皆以為抑其生之過而不知制者正以助其生之機也木得金制則不致橫溢而力專於火矣火得水制則不致渙散而精聚於土矣此言生也木亢不成火以其濕也得金制之則木燥而火成矣火亢不成土以其燥也得水制之則火濕而土成矣此言化也制也者萬物之所以成始而成終也既防亢害之後而又開生化之先其諸乾坤合闢陰陽不測之妙乎明斯義也其於病氣勝復倚伏之機治法氣味合和之道豁然貫通矣乎謹採先哲之名談一得之管見有關於運氣之旨病機之變治法之要者條列於下以備觀覽焉夫以四時五行運氣之變也其機甚微亢之害也木亢則土害土害則水肆而火熄土愈失發生之源矣火亢則金害金害則木橫而土微金愈乏資生之本矣土金水仿此此亢之害害乃於他者也亦有亢之害害反及於身者史載之曰經言天火下臨則肺金上從白起金用而草乃眚燥氣下臨則肝氣上從蒼起木用而土乃眚以常所勝論之則火至而肺病金至而肝病今也天火下臨則金以從天之氣而白乃用故病反生於肝天金下臨則木以從天之氣而蒼乃用故病反生於脾舉此類推則厥陰司天脾氣上從而水斯眚太陽司天心氣上從而金斯眚太陰司天腎氣上從而火斯眚皆可知矣此天度之尊獨異於他經言天能制色以其能制勝己而使不為害至於司地則氣化之正各隨其證矣惟勝復之候不同亦隨其氣之多寡以求之勝之為病輕復之為病重勝則所不勝者順受其克復加報怨仇焉此不可不知也如木之受病本於肺金所制則不過肺氣有餘凌犯於肝生眼昏眥癢耳無所聞胸痛體重諸病耳若乃木化之盛肝氣妄行大傷於脾則金必相救邪反傷肝能使人體重煩冤胸痛引背兩脅滿痛引少腹故經言上應太白星者謂金之復也載之之論如此所謂勝者亢之害也所謂復者承之制也經曰風傷肝燥勝風熱傷氣寒勝熱濕傷肉風勝濕燥傷皮毛熱勝燥寒傷血濕勝寒此勝之氣也又曰風勝則動熱勝則腫燥勝則乾寒勝則浮濕勝則濡瀉甚則水閉胕腫此勝之證也又曰有餘而往不足隨之不足而往有餘隨之此復之機也又曰勝復盛衰不能相多也往來小大不能相過也用之升降不能相無也又曰氣有餘則制己所勝而侮所不勝其不及則己所不勝侮而乘之己所勝輕而侮之侮反受邪侮而受邪寡於畏也此勝復之大數也所以然者如木亢害土則土氣無所泄而專精於金矣土亢害水則水氣無所用而積力於木矣金反報木而土氣得伸矣木反報土而水氣得伸矣不但此也今日之亢即是前日之制而今日之制又為來日之亢制之不已則又亢矣經曰侮反受邪史載之曰復之病重者復之氣以積久而力厚勝之氣以發泄而無餘也故經曰所謂勝至報氣屈伏而未發也勝至而復復已而勝無常數也故經又曰無翼其勝無贊其復謂治勝氣者宜預安其屈伏無令復氣之反侮也嗚呼聖人之教深矣此亢之害害反及於身者所謂不戢自焚也所謂制也所謂復也此皆承製之實也更有承製之虛實者能生能化虛者不能生化也何以言之承製之實者木亢而金來制木實已生化金氣來復也金亢而火來制金實已生化火氣來復也虛者乃木亢極而見金之幻象其金不但不能制木而實害土之極也金亢極而見火之幻象其火不但不能制金而實害木之極也劉河間曰瘡瘍屬火而反腐出膿水者猶谷果肉菜熱極則腐爛而潰為汙水也潰而腐爛者水之化也所謂五行之理過極則勝己者反來制之故火熱過極則反兼於水化也又曰諸暴強直支痛緛戾裡急筋縮皆屬於風者燥金主於緊斂短縮徑切風木為病反見燥金之化由亢則害承乃制也況風能勝濕而為燥也一部原病式其論皆如此此承製之虛也其承製乃亢害非生化也易老保命集中所謂兼化之虛象者也而劉氏乃曰經云亢則害承乃制者謂亢過極反兼勝己之化制其甚也如以火鍊金熱極則反為水五行之理微則當其本化甚則兼其鬼賊如此是直以亢極之幻象誤為承製之實用矣認似作是豈不謬乎河間所論乃承製之虛此辨最精透自古無人見及治病者於承製之實必能安其屈伏而始有防微之功於承製之虛必能察其本原而後為見真之智也且夫五行之相生相制也萬物由此而成萬法由此而出故張隱菴有曰棗色黃味甘脾家果也凡木末之實而為心家果者生化之道也木生心火木末之實而為脾家果者制化之道也木製脾土蓋天地所生之萬物咸感五運六氣之生化明乎陰陽生克之理則凡物之性皆可用之而生化於五臟六腑之氣矣故桃為肺之果核主利肝血杏為心之果核主利肺氣皆制化之理然也本草述大黃條引盧不遠曰大黃味大苦氣大寒似得寒水正化而炎上作苦苦性走下不相反乎參同云五行相剋更為父母素問曰制則生化是故五行之體以克為用其潤下者正炎上之用乎則凡心用有所不行變生痰疾者舍同類之苦巽以入之不能彰其用而復其常也夫是説也即六元正紀曰六氣之用各歸不勝而為化故太陰雨化施於太陽太陽寒化施於少陰少陽少陰少陽熱化施於陽明陽明燥化施於厥陰厥陰風化施於太陰此有所施則彼有所奉所謂太陰雨化施於太陽者太陽寒水之用必受太陰雨化之施而其用乃成而太陰雨化之用亦必受太陽寒水之奉而其用乃成也故制也者六氣之所以成己而成物也盧氏不引內經而引參同舍近取遠非引掖後學之道也此生物之體性也至於制方之法則柯韻伯論四神丸方義有曰雞鳴至平旦天之陰陰中之陽也陽氣當至不至虛邪得以留而不去故作瀉於黎明其由有四一為脾虛不能制水一為腎虛不能行水故二神丸君補骨脂之辛燥者入腎以制水佐肉豆蔻之辛溫者入脾以暖土丸以棗肉又辛甘發散為陽也一為命門火衰不能生土一為少陽氣虛無以發陳故五味子散君五味子之酸溫以收坎宮耗散之火少火生氣以培土也佐吳茱萸之辛溫以順肝木欲散之勢為水氣開滋生之路以奉春生也此四者病因雖異而見症則同皆水亢為害二神丸是承製之劑五味散是化生之劑也二方理不同而用則同故可互用以助效亦可合用以建功合為四神丸是制生之劑也制生則化久泄自瘳矣此制方之法必本於五行承製生化之理也若此者皆往哲之名論或論運氣或論物性或論病機或論方法亦云備矣至於平日讀書之管見則有論五行體性功用與病機吉凶緩急之篇曰肝主東方風木其體溫潤是土氣也木剋土即為土所供奉也其性疏泄是木之正氣也其用燥凡濕得風則干是金氣也金剋木木含金氣即為金所制伏不使疏泄太過也心主南方火熱其體乾燥凡物必乾燥始能著火又物得火則堅是金氣也火剋金即為金所供奉也其性大熱是火之正氣也其用蒸凡物為火所逼則潮是水氣也水剋火火含水氣即為水所制伏不使炎熱太過也脾主中央濕土其體淖澤是水氣也土剋水水為土之奴當供奉夫土者也其性鎮靜是土之正氣也靜則易郁必借木氣以疏之土為萬物所歸四氣具備而求助於水與木者尤亟何者土不可燥亦不可郁故脾之用主於動是木氣也肺主西方燥金其體徑潔是木氣也其性清肅是金之正氣也其用酷烈酷暑烈火火使人畏金亦使人畏是金中有火神也火有光明金亦有光明者也腎主北方寒水其體流動是火氣也其性沉下是水之正氣也其用溫潤是土氣也由是觀之五行之中各有五行不待外求而本體自足此天地相生相成自然之數當然之常也停停勻勻不偏不倚至於有變則為病矣變者謂自病而所不勝者乘之與自病而乘所勝者皆是也二者吉凶緩急前人皆混統立説未曾分析今吾思之凡自病而所不勝者乘之其吉凶未可知而其勢必緩也自病而乘所勝者其勢急而必凶矣何以言之自病則本當為人所乘其勢順自病而反能乘人其勢逆也其順逆奈何正虛與邪實之別也正虛者脾土虛則肝木盛心火虛則腎水盛肝腎本無邪本無意來克脾克心不過五臟之氣此虧則彼溢有互相挹注之勢故土虛不運則木氣滿悶火氣不揚則水氣寒凝耳其病在自虛之臟而不在來乘之臟也其吉凶不可知者何也謂自虛之臟氣微則相生之力微但以藥助之而可復矣並無事瀉來乘之臟也是其治最易而無待輾轉斡旋也必自虛之臟氣竭而後相生之力竭而不可為矣故曰其勢緩也邪實者肝邪實則剋土不必土臟之虛也而徑克之腎邪實則剋火不必火臟之虛也而徑克之克之則傳之七傳而生氣絶矣其絶也不待其七傳而知也當其初傳而預決之矣何也有病之臟本不當力能乘人今其力能乘人者邪盛而本臟之元氣已絶不能自主惟邪氣之所欲為而肆行無忌也若本臟元氣未絶則自能監製邪氣不使橫溢至此矣本臟氣絶則生生之源竭而所勝之臟失其所恃故克而傳之易易也如肝邪實則肝之正氣不能生火而土之化源已虛肝邪來逼略無救援既經傳脾肝脾合氣邪力愈大正氣愈微勢如破竹初或數日而傳一臟繼則一日而傳一臟或一日而傳數臟矣當其初傳化源已絶用藥補瀉皆窮於無可施故曰其勢凶而急也何也所謂邪實者以其得母氣之生助也肝挾水邪而剋土則火不能生脾挾火邪以剋水則金不能助故也是同一相乘相剋而其吉凶緩急如是懸隔臨診決病視人生死其可不盡心乎故越人仲景論治未病皆曰見肝之病必先實脾是當其未傳而急防之也急防云者抑木之亢扶土之衰仍資火氣以導木之去路培土之來源其法攻補兼施輾轉斡旋如隔二隔三瀉南補北良工心苦正為此耳至如薛立齋張景嶽輩每曰補正則邪自去此乃自虛而為人所乘者變因自虛人本無邪故直補本宮無事誅伐也又嘗論寒者熱之熱者寒之微者逆之甚者從之假者反之之義曰前賢有言實熱以苦寒折之虛熱以甘溫除之用苦寒者是熱者寒之微者逆之之義也用甘溫者是假者反之之義也又言陰盛格陽陽盛格陰則先其所主伏其所因或寒藥而熱服或熱劑而寒佐是甚者從之之義也所謂反佐是也此三者逆之義為最顯從之義前賢發之為最詳獨所謂假者反之自昔未有篤論而又往往混於甚者從之之中漫無分別不揣狂愚聊獻一得以質高明即如甘溫除大熱一事豈真大熱而可用甘溫耶是必虛熱也夫所謂虛者何也氣虛則心寒寒非熱也血虛則必燥燥為次寒亦非熱也其熱何也是亢極而見勝己之化也燥為金氣熱為火氣寒為水氣燥之化熱是化其所不勝以火剋金即經之所謂承也寒之化熱是化其所勝火反侮水即仲景之所謂橫是陰陽二氣之對化也虛熱生於寒燥熱由虛生虛熱二字當折看不當連讀惟其虛也燥也故以甘潤燥以溫煦寒也虛燥去而熱自除是真火蒸騰而物轉潤矣故不知者以為大熱其知者以為寒燥不知者以為甘溫除大熱其知者以為甘溫除寒燥不知者以為反治其知者以為正治就其假者而言之則謂之反就其真者而言之則猶是正也劉河間謂己亢過極反似勝己之化似也者假之謂也醫者能見其真而不眩於假斯可矣雖然甘溫除假熱固矣而用甘溫之法又有術焉非徒曰甘溫遂盡厥妙也凡病氣正來者其氣多實而強病氣反來者其氣多變而幻故內經每致警於虛邪也何者其氣既能自化是已挾人身之靈氣以為氣矣以甘溫治其本原直搗老巢而真相可見矣但氣靈而藥不靈往往藥力為病氣所據而不得達其巢窟將甘溫反助病氣以為虐故藥之中亦必具有靈氣而後足以與病氣相敵所謂靈者何也凡物必力有餘而後能化寒燥化熱必寒燥厚積日久可知也厚積日久者鬱結之謂也氣虛不足以推血則血必有瘀血虛不足以滑氣則氣必有聚東垣諸方多用升柴而滑伯仁謂每用補劑加桃仁等破血疏絡之品其效最捷經謂反佐治實熱者苦寒而佐之以熱治虛熱者甘溫亦可佐之以寒虛勞大熱每用熱藥涼服又昔人論連理丸治吞酸能變胃而不受胃變是皆靈之類也病有化氣藥亦有化氣如酸甘化陰辛甘化陽是也善用者且能借病之假氣以助藥之真力是即兵法之招撫者也昔人又謂化氣之力甚於本氣蓋氣之所以能化者必其人之正虛而邪氣之力厚有以勝夫人之正氣於是化良為寇反挾人之氣以還而傷人如寒燥化熱非寒燥已化為熱也寒燥自在而其力又能驅使人身之正氣為熱以為之疑陳作障於外也所謂承製之虛也其氣最幻而最鋭故醫者必以全神全力制之視其變化而捷應焉乃可有濟此虛勞內傷大病之所以難治也虛勞大病往往近於鬼神非鬼神也化氣之靈者也仍即人身本氣之靈者也此二篇者或論物性或論病機或論治法揆之經旨固未能發明萬一又嘗綜而論之世間無物不本於五行也天地之氣有常有變風其性升其體寒其用溫其化燥寒其性斂其體濕其用寒其化風暑濕熱之合也生於郁體用俱同濕熱其化風燥濕其性重其體熱其用濕其化寒燥其性降其體風其用燥其化火火其性散其體燥其用熱其化濕此順化也亦曰傳化更有對化即濕極化燥寒極化熱是也對化有虛有實傳化是氣機更代之常對化是氣機憤激之變故必極而後化也又有兼化亦虛化之類也又有合化如風合熱而化燥寒合濕而化熱亦實化之類也五行之氣金木皆有燥水土皆有濕但金燥而斂風燥而散土濕而熱水濕而寒火則能燥能濕其燥者木亢而水不交也其濕者土鬱而木暢也故火得風而焰長以器掩之而器即潤矣此五行生化之性情也四時更代成功者退一盛一衰互相牽制不獨天地之氣然也即人之性情亦如之經曰怒傷肝悲勝怒喜傷心恐勝喜思傷脾怒勝思悲傷肺喜勝悲恐傷腎思勝恐又膽為中正之官謀慮久不決則傷膽也肝為將軍之官鬱怒不得發則傷肝也恐懼不止注而為思思慮不得激而為怒盛怒不止鬱而為悲喜無節則易恐悲太過則易喜此五臟性情之承製生化也故扁鵲華他皆能以激怒起沉疴張子和亦能以引笑開痼疾非大具神通者乎至於治病之法則以安仇之義為最奧要其義大著於至真要論中如太陽寒水之勝而剋火矣治之者必以甘溫土性之藥制水以苦溫火性之藥扶火是矣然水之亢者不可徒制也必有以順其性而導之故復以酸溫木性之藥開水氣滋生之路即以培火氣發生之源也佐以所利資以所生法至密矣而未已也如此治之則水必退火必進水哀火鋭土氣又將上僭矣故仍以鹹寒水性之藥小佐其間合酸溫木性以併力制土此所以安其屈伏無使勝復之相尋無已也前賢醫案常有先用熱藥以愈病後用涼藥以清余患者此類多矣非熟於氣化能如是乎總之五行之氣有亢而後有制有制而後有生有化此自然之數也故業醫者必講求亢害承製生化六字而善用之於是每遇一病可以逆而制之亦可順而導之調其氣使之平而生化之常復矣試更以經義證之經曰木得金而伐火得水而滅土得木而達金得火而缺水得土而絶此五行之相制也又曰木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之然調其義過者折之以其畏也所謂瀉之又曰折其鬱氣資其化源無翼其勝無贊其復迎而奪之惡得無虛隨而濟之惡得無實又曰佐以所利資以所生是謂得氣此五勝五郁之治法也故木位之主其瀉以酸其補以辛而厥陰遂先酸后辛矣火位之主其瀉以甘其補以咸而少陰少陽遂先甘後咸矣土金水仿此先用瀉者制其勝也後用補者安其復也又如氣味之用互用生化經曰服寒而反熱服熱而反寒者不治五味屬也五味入胃各歸其所喜攻酸先入肝苦先入心甘先入脾辛先入肺咸先入腎久服增氣物化之常也氣增而久夭之由也蓋以自來用藥者只求其氣不求其味但取氣寒以治熱而不知寒之苦者入心化火也但取氣熱以治寒而不知熱之咸者入腎化水也味久則化氣者經曰味歸形形歸氣又曰五味入口藏於腸胃味有所藏以養五氣故五味久服即增氣也味陰氣陽陽動而散陰靜而留留則久積力厚與臟氣合同而化用藥者當知防微矣李東垣曰同味之物必有諸氣同氣之物必有諸味用其味者必審其氣用其氣者必防其味也又如脈象之至亦本六氣經曰天地之變無以脈診間氣左右隨其所在何者謂不得以天地之氣主診一歲必隨六氣之至分診四時也六氣之脈奈何曰厥陰之至其脈弦少陰之至其脈鉤太陰之至其脈沉少陽之至大而浮陽明之至短而澀太陽之至大而長其至也或太過或不及更有澀極似滑弦極似緩虛寒似熱大熱似寒病內寒而脈中空邪外充而脈內陷故承製有虛實生化有真假雖明者往往為所眩矣經曰脈從病反者脈至而從按之不鼓諸陽皆然諸陰之反者脈至而從按之鼓甚而盛也明乎此而脈無遁矣而病無遁矣而治亦無難矣虛實補瀉論虛實者病之體類也補瀉者治之律令也前人論之詳矣茲撮其要者與平日讀書之所記彙輯於此以為溫故之一助云夫內難仲景之論虛實也其義甚繁有以正氣盛衰分虛實者所謂脈來疾去遲外實內虛來遲去疾外虛內實也有以邪盛正衰分虛實者所謂邪氣盛則實精氣奪則虛也有以病者為實不病為虛者所謂內痛外快內實外虛外痛內快外實內虛也有以病者為虛不病為實者所謂陽盛陰虛下之則愈汗之則死陰盛陽虛汗之則愈下之則死也有以病在氣分無形為虛血分有形為實者白虎與承氣之分也有以病之微者為虛甚者為實者大小陷胸與瀉心之辨也有以病之動者為虛靜者為實者在臟曰積在腑曰聚是也有以病之痼者為實新者為虛者久病邪深新病邪淺也有以寒為虛以熱為實者陽道常實陰道常虛之義也有以寒為陰實陽虛熱為陽實陰虛者陰陽對待各從其類之義也有以氣上壅為實下陷為虛氣內結為實外散為虛者是以病形之積散空堅言之也至如從前來者為實邪從後來者為虛邪此又五行子母順逆衰旺之大道也內經首篇即以虛邪與賊風同警所謂去而不去命曰氣淫乘其所勝而侮所不勝也後世以虛邪為不治自愈不亦謬乎此虛實之大略也虛實既辨則補瀉可施靈樞終始曰所謂氣至而有效者瀉則益虛虛者脈大如其故而不堅也堅如其故者適雖言故病未去也補則益實實者脈大如其故而益堅也大如其故而不堅者適雖言快病未去也故補則實瀉則虛痛雖不隨針病必衰去矣此補瀉之機也若夫補瀉之法之妙則莫詳於素問及陰陽大論而越人仲景各從而發明之臟氣法時論本五臟苦欲之性以明補瀉其文曰肝苦急急食甘以緩之心苦緩急食酸以收之脾苦濕急食苦以燥之肺苦氣上逆急食苦以泄之腎苦燥急食辛以潤之開腠理致津液通氣也肝欲散急食辛以散之用辛補之酸瀉之心欲軟急食鹹以軟之用鹹補之甘瀉之脾欲緩急食甘以緩之用苦瀉之甘補之肺欲收急食酸以收之用酸補之辛瀉之腎欲堅急食苦以堅之用苦補之咸瀉之至真要論本司天在泉六氣之勝復以明補瀉其文甚詳今舉其司天勝氣之治而以其餘附之司天之氣風淫所勝平以辛涼佐以苦甘以甘緩之以酸瀉之在泉風淫於內治以辛涼佐以苦以甘緩之以辛散之風司於地清反勝之治以酸溫佐以苦甘以辛平之風化於天清反勝之治以酸溫佐以甘苦厥陰之勝治以甘清佐以苦辛以酸瀉之厥陰之復治以酸寒佐以甘辛以酸瀉之以甘緩之木位之主其瀉以酸其補以辛先酸后辛厥陰之客以辛補之以酸瀉之以甘緩之熱淫所勝平以鹹寒佐以苦甘以酸收之在泉熱淫於內治以鹹寒佐以甘苦以酸收之以苦發之熱司於地寒反勝之治以甘熱佐以苦辛以鹹平之熱化於天寒反勝之治以甘溫佐以苦酸辛少陰之勝治以辛寒佐以苦鹹以甘瀉之少陰之復治以鹹寒佐以苦辛以甘瀉之以酸收之辛苦發之以咸軟之火位之主其瀉以甘其補以咸先甘後咸少陰之客以咸補之以甘瀉之以咸收之按末句收當是軟或咸是酸濕淫所勝平以苦熱佐以酸辛以苦燥之以淡泄之濕上甚而熱治以苦溫佐以甘辛以汗為故而止在泉濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之濕司於地熱反勝之治以苦冷佐以鹹甘以苦平之濕化於天熱反勝之治以苦寒佐以苦酸太陰之勝治以咸熱佐以辛甘以苦瀉之太陰之復治以苦熱佐以酸辛以苦瀉之燥之泄之上位之主其瀉以苦其補以甘先苦後甘太陰之客以甘補之以苦瀉之以甘緩之火淫所勝平以鹹冷佐以苦甘以酸收之以苦發之以酸復之熱淫同在泉火淫於內治以鹹冷佐以苦辛以酸收之以苦發之火司於地寒反勝之治以甘熱佐以苦辛以鹹平之火化於天寒反勝之治以甘熱佐以苦辛少陽之勝治以辛寒佐以甘鹹以甘瀉之少陽之復治以鹹冷佐以苦辛以咸軟之以酸收之辛苦發之發不遠熱無犯溫涼少陰同法火位之主與少陰同少陽之客以咸補之以甘瀉之以咸軟之燥淫所勝平以苦濕新校正云濕當是溫佐以酸辛以苦下之在泉燥淫於內治以苦溫佐以甘辛以苦下之新校正云甘辛當是酸辛燥司於地熱反勝之治以辛寒佐以苦甘以酸平之以和為利燥化於天熱反勝之治以辛寒佐以苦甘陽明之勝治以酸溫佐以辛甘以苦泄之陽明之復治以辛溫佐以苦甘以苦泄之以苦下之以酸補之金位之主其瀉以辛其補以酸先辛後酸陽明之客以酸補之以辛瀉之以苦泄之寒淫所勝平以辛熱佐以甘苦以咸瀉之在泉寒淫於內治以甘熱佐以苦辛以咸瀉之以辛潤之以苦堅之寒司於地熱反勝之治以鹹冷佐以苦辛太陽之勝治以甘熱佐以辛酸以咸瀉之新校正云甘熱當作苦熱太陽之復治以咸熱佐以甘辛以苦堅之水位之主其瀉以咸其補以苦先咸後苦太陽之客以苦補之以咸瀉之以苦堅之以辛潤之開發腠理致津液通氣也揆厥大義無非制其勝安其復而已如木之勝也金虛寡畏而乘土矣於是補金以制之扶土以逆之又以勝氣不可直折也導之以補火之味以開木氣資生之路使其氣有所發而不郁所謂瀉也是已妙之至矣然自此金進木退而土寡於畏恐又將剋水也於是平之以補水之味以滋木之元神使不致受邪於反侮也此治當令之勝氣也若夫反勝者乃虛邪鬼氣不當令者也彼反勝則此郁郁之發也必暴尤當預有以防之復氣即鬱氣之發也一發無餘其治又有再安復勝之法審其脈證而調之故曰所謂勝至報氣伏屈而未發也復至則不以天地異名皆如復氣為法也又曰大復其勝則主勝之故反病也又曰必折其鬱氣資其化源無翼其勝無贊其復是謂至治此之謂也難經言東方實西方虛瀉南方補北方者舊解紛出穿鑿支離其實文意淺直不須深求東實西虛非必不可瀉東補西而必瀉南補北也以為瀉東之外仍可瀉南而決不可補南也補西之外仍可補北而決不可瀉北也下文推究五行當更相平及子能令母實母能令子虛之義乃專就所以瀉南補北而發揮之水勝火句束上子能令母實二句起下是提空立論不黏上木之子木之母也故復以故瀉南補北句遙遙接下後人只因不識經文用筆離合之致泥定上下子母字面遂窒礙難通也試於子能令母實上加一凡字便豁然矣金匱首篇論治未病之道曰上工治未病何也曰見肝之病知肝傳脾當先實脾四季脾旺不受邪即勿補之中工不曉相傳見肝之病不解實脾惟治肝也夫肝之病補用酸助用焦苦益用甘味之藥調之酸入肝焦苦入心甘入脾脾能傷腎腎氣微弱則水不行水不行則心火氣盛則傷肺肺被傷則金氣不行金氣不行則肝氣盛則肝自愈此治肝補脾之要妙也肝虛則用此法實則不在用之經曰虛虛實實補不足損有餘是其義也餘臟仿此此章之義徐氏隨文衍釋尚得真詮但於虛實二字未見分曉遂令後人致凝耳尤氏黃氏徑將中段刪去其言曰五臟之病實者傳人而虛者不傳是未明虛實之義者也夫實者傳人此事理之常不待上工而知也虛者亦能傳人此事理之微故中工不能知之凡經言虛實者皆當從五行氣化推之肝屬木其氣溫升心屬火其氣熱散脾屬土其氣濕重肺屬金其氣清肅腎屬水其氣寒沉此五臟之本氣也本氣太過謂之實本氣不及謂之虛虛實皆能為病金匱之義就其虛者言之也肝失其溫升而變為寒降則為虛矣肝寒傳脾肝不上舉脾寒下陷將下利不止而死矣補用酸助用焦苦益用甘者皆就其性之溫者用之非酸寒甘寒苦寒之用也脾能傷腎腎氣微弱則水不行是寒氣辟易也肺被傷則金氣不行是清氣屈伏也金氣不行則肝氣盛是肝遂其溫升之性也所謂腎與肺者俱指其氣化非指其正體正用也腎即肝中之寒氣肺即肝中之清氣金氣不行水氣不行雲者肝中之寒氣清氣不得肆行也只是肝受寒邪失其本性不可專於瀉肝當補肝之本體而溫土以養其氣耳若肝熱者多見痙厥不專傳脾而兼傳心矣是為有餘為實邪治之但直瀉其本宮或兼瀉心脾矣不得用焦苦助心實脾法也故曰實則不在用之舊注於虛實二字囫圇讀過遂致難通難經曰從後來者為虛邪從前來者為實邪此虛實之旨也肝之後為腎腎屬寒水肝挾寒水之勢欲反侮脾故實脾之中即寓制腎以治其本肝脾溫潤騰達而清寒之邪自退矣此之謂傷腎傷肺也即傷肝中之寒邪清邪也東垣謂凡言補之以辛甘溫熱之藥者助春夏升浮之氣即是瀉秋收冬藏之氣也若內經謂腎受氣於肝傳之於心至脾而死肝受氣於心傳之於脾至肺而死此氣之逆行也是言實邪之相傳也事與此殊義可對勘肝受氣於心是從前來者為實邪當瀉心肝而補脾肺矣腎受氣於肝當瀉肝腎而補心脾矣不得肝有病反補用酸也至內經以酸為泄金匱以酸為補此體用之別也前賢已論之矣夫肝實之治內經有曰風淫於內治以辛涼是其義也此皆補瀉之大經大法也其他則汗吐下皆瀉也溫清和皆補也有正補正瀉法如四君補氣四物補血是也有隔補隔瀉法如虛則補母實則瀉子是也有兼補兼瀉法如調胃承氣人參白虎是也有以瀉為補以補為瀉法如攻其食而脾自健助其土而水自消是也有迭用攻補法是補瀉兩方早晚分服或分日輪服也此即復方謂既用補方復用瀉方也有並用補瀉法與兼補兼瀉不同是一方之中補瀉之力輕重相等此法最難須知避邪乃無隱患錢仲陽曰肺有邪而虛不可攻者補其脾而攻其肺也尤有要者病在氣分而虛不任攻者補其血而攻其氣病在血分而虛不任攻者補其氣而攻其血如是則補藥之力不與邪相值不致連邪補著矣又葉天士謂久病必治絡其説謂病久氣血推行不利血絡之中必有瘀凝故致病氣纏延不去必疏其絡而病氣可盡也徐靈胎陳修園從而譏之然劉河間力發玄府之功用朱丹溪治久病必參用郁法滑伯仁謂每用補劑參入活血通經之品其效更捷史載之之方之多用三稜莪朮王清任之方之多用桃仁紅花不皆治絡之胃耶且內經之所謂升降出入所謂守經隧所謂疏氣令調所謂去菀陳莝非此義耶內經又曰寒之而熱者求之水熱之而寒者求之火所謂求其屬也又曰治病必求其本受病為本見證為標先病為本後病為標有客氣有同氣間者並行甚者獨行此皆補瀉參用之大義也補瀉因虛實而定者也補瀉之義既宏虛實之變亦衆請更舉先哲之論虛實者華他中藏經曰病有臟虛臟實腑虛腑實上虛上實下虛下實狀各不同宜深消息腸鳴氣走足冷手寒食不入胃吐逆無時皮毛憔悴肌肉皺皴耳目昏塞語聲破散行步喘促精神不收此五臟之虛也診其脈舉指而活按之而微看在何部以斷其臟也又按之沉小弱微短澀軟濡俱為臟虛也虛則補益治之常情耳飲食過多大小便難胸隔滿悶肢節疼痛身體沉重頭目昏眩唇口腫脹咽喉閉塞腸中氣急皮肉不仁暴生喘乏偶作寒熱瘡疽並起悲喜時來或自痿弱或自高強氣不舒暢血不流通此臟之實也診其脈舉按俱盛者實也又長浮數疾洪緊弦大俱曰實也看在何經而斷其臟也頭疼目赤皮熱骨寒手足舒緩血氣壅塞丹瘤更生咽喉腫痛輕按之痛重按之快食飲如故曰腑實也診其脈浮而實大者是也皮膚瘙癢肌肉䐜脹食飲不化大便滑而不止診其脈輕手按之得滑重手按之得平此乃腑虛也看在何經而正其時也胸膈痞滿頭目碎痛飲食不下腦項昏重咽喉不利涕唾稠黏診其脈左右寸口沉結實大者上實也頰赤心忪舉動顫栗語聲嘶嗄唇焦口乾喘乏無力面少顏色頤頷腫滿診其左右寸脈弱而微者上虛也大小便難飲食如故腰腳沉重臍腹疼痛診其左右手脈尺中脈伏而澀者下實也大小便難飲食進退腰腳沉重如坐水中行步艱難氣上奔沖夢寐危險診其左右尺中脈滑而澀者下虛也病人脈微澀短小俱屬下虛也張景嶽曰通評虛實論曰邪氣盛則實精氣奪則虛此虛實之大法也設有人焉正已奪而邪方盛者將顧其虛而補之乎抑先其邪而攻之乎見有不的則死生系之此其所以宜慎也夫正者本也邪者標也若正氣既虛則邪氣雖盛亦不可攻蓋恐邪未去而正先脫呼吸變生則措手無及故治虛邪者當先顧正氣正氣存則不致於害且補中自有攻意蓋補陰即所以攻熱補陽即所以攻寒世未有正氣復而邪不退者亦未有正氣竭而命不傾者如必不得已亦當酌量緩急暫從權宜從少從多寓戰於守斯可矣此治虛之道也若正氣無損者邪氣雖微自不宜補蓋補之則正無與而邪反盛適足以藉寇兵而資盜糧故治實證者當直攻其邪邪去則身安但法貴精專便臻速效此治實之道也要之能勝攻者方是實證實者可攻何慮之有不能勝攻者便是虛證氣去不返可不寒心此邪正之本末不可不知也日本元堅字廉夫者嘗論列虛實夾雜之證治甚為明備其文曰為醫之要不過辨病之虛實也已虛實之不明妄下湯藥則冰炭相反坐誤性命是以臨處之際不容毫有率略矣蓋嘗考之厥冷下利人皆知大虛宜補潮熱譫語人皆知大實宜瀉此則其病雖重而診療之法莫甚難者矣如夫至虛有盛候大實有羸狀者誠醫之所難也雖然此猶難乎辨證而不難乎處治何者假證發露抑遏真情自非至心體察則不能辨其疑似而認其真然既認其真也純補純瀉一意直到而病可愈矣豈有他策耶唯醫之所最難者在真實真虛混淆糅雜者而已何者其病視為虛乎挾有實證視為實乎兼有虛候必也精慮熟思能析毫釐而其情其機始可辨認及其施治欲以補之則恐妨其實欲以瀉之則恐妨其虛補瀉掣肘不易下手必也審之又審奇正攻守著著中法而後病可起矣此豈非辨認難而處治亦難者乎岐伯有五有餘二不足之説而仲景之經所云難治者概此之謂也蓋虛實之相錯其證不能一定其治不能各無其別也區而論之有虛實相兼者焉病本邪實當汗如下而醫失其法或用藥過劑以傷真氣病實未除又見虛候者此實中兼虛也治之之法宜瀉中兼補倘虛甚者或不得已姑從於補虛復而後宜議瀉矣其人素虛陰衰陽盛一旦感邪兩陽相搏遂變為實者此虛中兼實也治之之法不清涼無由解熱不轉刷無由逐結然從前之虛不得不顧故或從緩下或一下止服前哲於此證以為須先治其虛後治其實此殆未是也大抵邪不解則不受補有邪而補徒增壅住且積日之虛豈暫補所能挽回乎考之經文如附子瀉心調胃承氣即瀉中兼補之治也陽明病至循衣摸床微喘直視則既屬虛憊而猶用承氣者以實去而陰可回縱下後頓見虛候其實既去則調養易施也擴充觸長無適而不可矣此虛實之相兼大較如此如夫虛實之相因而生是亦不可不辨也有人於此焉脾氣虧損或久吐或久利中氣不行馴至腹滿溺閉此自虛而生實也至其滿極則姑治其標主以疏導然不以扶陽為念則土崩可待也又有人焉腎陰不足下虧上盈或潮熱心煩或血溢痰湧亦是虛生實者也至其火亢則姑治其標專主清涼然不以潤養為念則真元竭絶矣有人於此焉腸澼赤帶腹痛後重如其失下則病積依然而津汁日泄羸劣日加此自實而生虛也治法或姑從扶陽然不以磨積為先則邪勝其正立至危殆又有人焉肝氣壅實妄言妄怒既而脾氣受制飲食減損日就委頓亦是實生虛者也治法或姑從補中然不兼以清膈則必格拒不納矣在仲景法則汗後脹滿是自虛而實故用且疏且補之劑五勞虛極因內有乾血是自實而虛宿食脈澀亦自實而虛故一用大黃蟅蟲丸一用大承氣湯蓋乾血下而虛自復宿食去而胃必和也此虛實相因而生之大略也要之相兼者與相因者病之新久胃之強弱尤宜參伍加思亦是診處之大關鑰也更論虛實之兼挾則表裡上下之分又不可不知也實在表而裡虛者補其中而病自愈以病之在外胃氣充盛則宜托出且里弱可以受補如發背痘瘡之類是也實在裡而兼虛者除其實而病自愈以病之屬熱倘攔補之必助其壅如彼虛人得胃實與瘀血宿食之類是也病上實素下寒者必揣其臍腹而後吐下可用病下虛素上熱者必察其心胸而後滋補可施此表裡上下之例也雖然今此所論大概就病之屬熱者而立言已如病寒之證亦不可不辨焉經云氣實者熱也氣虛者寒也蓋胃強則熱胃弱則寒此必然之理也故寒病多屬虛者然有如厥陰病之上熱下寒此其上熱雖未必為實而未得不言之猶有陽存故涼溫並用方為合轍矣寒病又有陽雖虛而病則實者固是胃氣本弱然關門猶有權而痼寒宿冷僻在一處或與邪相併或觸時氣而動以為內實也倘其初起滿閉未甚者須溫利之滿閉殊劇者攻下反在所禁唯當溫散之蓋以寒固胃之所畏其實之極必傷胃氣遂變純虛耳觀仲景太陰病及腹滿寒疝之治而其理可見也然則病寒之實必要溫補固不可與病熱之虛猶宜清滌者一例而論矣玉函經曰寒則散之熱則去之可謂一言蔽之已是寒熱之分誠虛實證治之最吃緊也病之虛實藥之補瀉各有條例其略如此而微甚多少之際猶有不可計較者實如張景嶽氏之言焉夫虛實之不明補瀉之不當而栩栩然欲療極重極險之病者豈足與語醫哉要之病之實實有百也病之虛虛有百也實之瀉瀉有百也虛之補補有百也而大旨總視胃氣之盛衰有無以為吉凶之主內經曰五實死五虛死脈盛心也皮熱肺也腹脹脾也前後不通腎也悶瞀肝也此謂五實脈細心也皮寒肺也氣少脾也泄利前後腎也飲食不入肝也此謂五虛其時有生者何也曰漿粥入胃泄注止則虛者活身汗得後利則實者活全注云此皆胃氣之得調和也韙哉言乎繆仲淳曰穀氣者譬國家之餉道也餉道一絶則萬衆立散胃氣一敗則百藥難施若陰虛若陽虛或中風或中暑乃至瀉利滯下胎前産後疔腫癰疽痘瘡痧疹驚疳靡不以保護胃氣補養脾氣為先務本所當急也故益陰宜遠苦寒益陽宜防增氣祛風勿過燥散消暑毋輕下通瀉利勿加消導滯下之忌芒硝巴豆牽牛胎前泄瀉之忌當歸産後寒熱之忌黃連梔子疔腫癰疽之未潰忌當歸痘疹之不可妄下其他內外諸病應投藥物之中凡與胃氣相違者概勿施用夫治實者急去其邪治虛者治專於補其顧胃氣人所易知也獨此邪盛正虛攻補兩難之際只有力保胃氣加以攻邪戰守具備敵乃可克昔人謂孕婦患病統以四物加對治之藥此固不足為訓然其意可師推而行之保胃氣以攻邪其理正如是也
