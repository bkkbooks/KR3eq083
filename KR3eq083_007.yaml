  - {type: 'tls:div-start', offset: 6114, content: '', id: KR3eq083_jc_006-d9.d2d7, level: 3, head_text: 君一臣二奇之制也君二臣四偶之制也君二臣三奇之制也君二臣六偶之制也}
  - {type: 'tls:head', offset: 6114, content: '', id: KR3eq083_jc_006-d9.d2.d7.h1s1}
