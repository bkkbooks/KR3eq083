body:
  text: 卷六評釋類讀傷寒論雜記三陰三陽者陽經為陽陰經為陰此以外言之也五臟為陰六腑為陽此以內言之也在外者又以寒傷營在脈中者為陰風傷衛在脈外者為陽在內者六腑又以胃為陽大腸為陰膀胱為陽小腸為陰膽為更陰也五臟又以肺為陽心脾為陰肝腎為至陰也內經以脾為至陰三陽亦有里證三陰亦有表證在表者無論陰陽多在足經見證在裡則手足俱有矣陽明承氣攻大腸非攻胃也豈有燥屎而在胃耶太陽抵當攻小腸非攻膀胱也膀胱果有蓄血當如血淋而小便不利矣何得小便利而反大便黑耶且其證兼見昏昧譫妄如狂者心證也心與小腸脈絡相通故氣相通也陶節庵謂傷寒至沉脈如分陰陽意謂邪在三陽之經者脈皆浮也至脈沉則有三陽之裡與三陰之經矣然浮而無力無神乃陰虛之極比邪陷於裡以致裡實者更屬危險張景嶽重論此義最為有功正不得謂陰脈皆沉而浮必無陰也三陰皆有吐利四肢逆冷證蓋邪入三陰非遽入臟也必先動於腑寒邪在腑故變見諸證若動臟即死矣靈樞曰邪中於陰則溜於腑是也且吐屬胃利屬大腸四肢屬脾故邪入三陰最重脾胃脾胃不敗邪雖入里易治也膽為清淨之腑無出無人故禁三法然所謂足少陽證者以其經也經氣豈無出入耶若入里則不必在膽而在三焦矣三焦屬氣雖不似抵當承氣之有形可攻而升降調氣之法於膽猶遠於三焦最切故大柴胡亦加入攻藥者為三焦設也故丹溪脈因證治謂少陽禁三法亦宜三法三陰下利與陽明之燥實對看三陰大便寒實即為陰結三陽下利即為協熱然則豈無寒利耶曰寒利即三陰也外淫有六而仲景以傷寒名論方中行張隱菴必以三陰三陽屬於六氣大謬謂講明此書之理即通於治六氣則可耳然自古及今未見有此通人也傷寒邪在表則分六經入里則亦分三焦吳鞠通謂溫病分三焦傷寒亦何獨不分三焦是矣而不言在表在裡語缺分曉少陰一經賅左右腎為水火同居寒邪與水合氣而火為所抑故脈沉細但欲寐陽抑而不得伸也火抑而又常欲伸故常有心煩欲吐之象也或曰少陰入里即通於心其心煩者非即心證耶不知寒邪果入心必至昏迷不寤矣何得尚有煩也其心煩者乃下元真火為寒邪所抑不得抒發但能一線直上以擾包絡之氣也心不受邪惟少陰一經不入手以手厥陰心包絡代之包絡者心之外宮城也婦人熱入血室之證即男子熱入心包之證驗之屢矣仲景於熱入血室治以小柴胡葉天士於此證獨忌柴胡非無見也徐靈胎譏之未免孟浪細思此證與小柴胡何涉仲景此方蓋治少陽之熱感於心包者熱入心包身靜不欲動神昏譫語其邪氣實者亦或躁擾如狂皆熱證也何以無寒入心包絡證也蓋心包雖代心君受邪究為純火之臟與神明之主只隔一間若寒水賊邪上犯必是火衰神去其竄入心臟致人於死頃刻間事故中寒傷心之證其死極速不及施救傷寒之邪不及中寒之猛不得遽入心包必待化熱而後熏蒸漸漬同氣相召矣故有熱入血室無寒入血室有熱入心包無寒入心包也非無也有之則死如吐利惡寒身蜷四逆煩躁即心陽之漸熄也而況其卒中者耶大便閉結亦有潮熱譫語神昏不識人之證全與熱犯心包無異者以其皆是熱在血分也當以脈辨之心包熱者左寸脈必緩而滑大便閉者右尺脈必長而實也又少陰病咳而下利譫語者以火劫汗故也小便必難又傷寒脈浮以火劫汗驚狂起臥不安者救逆湯主之此二者皆強汗亡陽之證汗為心液心液虛不能養神故也大抵譫語總屬於心神迷亂之所致但有邪氣正在包絡者有邪氣感動包絡者邪之虛實不同病之微甚有別即如肝乘脾腹滿譫語寸口脈沉而緊名曰縱刺期門亦以邪氣有與心相感者也傷寒傳經有此經之邪延及彼經者有前經之邪移及後經者合病並病皆邪氣實至於其經也更有邪在此經而兼見彼經之證者邪在陽經而兼見陰經之證者邪氣未入證何由見蓋人身經絡相通一氣相感雖有界畔終難板分如少陽病脈浮大上關上但欲眠睡合目則汗此少陰心證也心氣不任少陽之疏泄而然也此氣之所感非邪由少陽已入心也他經此類甚多氣相感者大抵寒從寒熱從熱寒多感於肺腎熱多感於心肝所謂同氣相求也其與傳經證候虛實微甚之間自有辨別有先感而邪因傳之者有先感而邪亦終不傳之者前人於傳經之說刺刺不休皆未發明及此豈以淺不足道耶王勳臣極詆分經之謬是又但知氣之相感而未知有形之邪氣固各有界畔也傷寒金匱中每為死證立方此義最可思傷寒有證異而治同如自利不渴屬太陰自利而渴屬少陰皆用四逆溫之有證同而治異如陽明自利腹痛者此內實也宜下之太陰為病下之則胸下結硬矣究竟同者必有其所以同少陰渴而用四逆者以其小便色白下焦虛寒太陰不渴亦以其臟寒也異者必有其所以異腹痛宜下不宜下一能食一不能食也讀書須從此等處用心參校自有會悟然必先逐條熟讀方可如此否則拋荒本義彼此錯綜徒亂人意嘗讀至真要論所謂勝至報氣屈伏而未發也因思凡治勝氣必宜顧忌復氣不可太過反助伏氣為患也不然復已而勝寧有止期耶傷寒諸方有寒熱合用鹹辛酸苦並投者雖曰對證施治亦未始非顧慮復氣之微意也六經復氣少陽厥陰二經最甚內經所謂火燥熱也又曰木發無時水隨火也汗則傷陽陰盛者寒起矣下則傷陰陽盛者熱生矣且或汗之而陽愈熾下之而陰愈深以汗藥多熱下藥多寒也大法如火勝治以咸必佐以甘酸咸者正治甘為子氣導其去路所謂瀉之酸為母法護其根基防本氣受制之太過也火之復為水甘以制水而酸又泄水矣故火淫所勝以酸復之王注云不復其氣則淫氣空虛招其損矣厥旨精微讀傷寒者必須透此治病必求其本所謂本者有萬病之公本有各病之專本治病者當求各病專本而對治之方稱精切薛立齊一流專講真水真火特治公本者耳傷寒金匱乃真能見病治病故藥味增損確切不移讀者每於一方藥味須一一從本證來源去路本經虛實子母本氣標本勝復上委曲搜求確有見地如自己出他日自能獨出手眼無俟扶牆摸壁豈非快事凡讀成方須先揣摹方前所列之證再看方中藥味主對如有不協於心儘可擬改旁注以俟異日考正傷寒金匱中有許多今人不能遵用之方向來注者皆循例解說甚或穿鑿求深反淺惟舒馳遠能不諱所疑然不自任不知而必詆古人傳誤未免訕上實則譫語虛則鄭聲然譫語亦有虛實實者陽明腑實證協熱下利證熱入血室證太陽蓄血證虛者如過汗亡陽過下亡陰內經評熱論所謂汗出不衰狂言失志者皆是乃五臟之津液乾枯臟體燥熱神無所養也經曰津液相成神乃自生津虛故神憒也鄭聲者邪聲也舊解謂鄭重也尾聲重濁此實也非虛也凡氣虛者發語之始其聲如常及其中末氣有不續聲忽轉變如他人語不似其人平日之本聲故曰邪也六經篇首皆列中風脈證一條是藉以襯明傷寒之脈證也蓋中風間有不挾寒者而傷寒則必因於風風力挾寒傷人極重者為中寒次為傷寒輕即中風也可見六經有中風表證即皆有傷寒表證陶節庵直中之說詎為杜撰況內經更有中陽溜經中陰溜腑之明文耶但風寒初傷在經絡雖屬於陰在病氣仍屬於表其治法總不外溫散太陽篇中六經初傷之證具在可按而考也傷寒一病初起多同於中風死證多類於中寒傷寒一部書只有寒死證無熱死證白虎承氣本非死證也若溫病則反是矣反字有數解不應也卻也復也如弱反在關濡反在巔只是語助俗言卻也當不能食而反能食乃不應也如得之反發熱脈沉者麻辛附子湯謂既始得之復有發熱表證雖脈沉亦宜汗法也讀者當隨文生義勿執一而例百傷寒全論外感金匱亦有外證不見一方用羌活者何也即風濕亦只用麻黃薏苡附子白朮黃耆防己諸家皆言六經每篇有提綱其後凡渾言某經病者即某經提綱所列諸證也然太陰病脈浮者可發汗宜桂枝湯若果腹滿而吐食不下自利益甚時腹自痛純屬陰寒內證可僅據脈浮而用汗耶此等更須參詳讀書固不可執一而例百也寒極反熱熱極反寒此化氣也真假勿淆前人辨之矣至於所以反熱反寒之故訖無發明若謂寒邪在內而逼人身之熱氣於外似於寒極反熱之義未甚切矣竊思寒極反熱者若果外見面赤唇紅尚是真陽外越僅可謂之假熱惟外無熱象而燥渴索飲漱水不咽小澀大祕時下微溏此乃陰寒內結微陽欲熄不能運化津液以潮於經絡臟腑所謂水冷成冰之寒燥也此真反熱者矣熱極反寒者若因腠理開泄衛陽不固尚是正氣內怯僅可謂之假寒惟熱邪湧盛奔逸於經絡臟腑之中內外津液全為灼干氣管全為槁澀熱邪奔迫不利如人之疾趨而蹶者壅積而不得四達此真反寒者矣前人於此等治法每以回陽泄熱約略立言殊不知治假熱者引火歸元治反熱者溫化津液豈可固耶治假寒者生津益氣治反寒者生津泄氣豈可同耶假寒假熱為虛氣之遊行猶有此二氣也反寒反熱為虛象之疑似其寒也正其熱之極其熱也正其寒之極也讀內經注疑五條附考一日二十四時釋左升右降難經脈例以一動為一至而脈經引扁鵲脈例以再動為一至此一人而兩例也玉機真臟云若人一息五六至其形肉雖不脫真臟雖不見猶死也此再動之例也大奇論浮合如數一息十至以上是又一動為一至矣此一書而兩例也前人絶無辨之者而林億轉疑玉機真臟為誤文何也營衛皆一日五十度周於身而衛氣行篇所論人氣一刻在太陽二刻在少陽三刻在陽明四刻在陰分是四刻一周不合其數然其下文云一十二度半是半日之度也又明明一日二十五度一夜二十五度矣此必當時有以一日一夜二百刻紀數者也前人絶無辨之者而戴同甫轉疑靈樞為衍文何也經言左右者陰陽之道路也又曰陽從左陰從右而人身之氣左右並行絶無左右先後低昂之跡然則何升何降耶前人絶無辨之者何也氣之運行於十二經也雖各經之脈左右各有一條而氣之左右並行卒無分於彼此先後也乃脈度十六丈二尺以手足之經各具六陰六陽分紀其數然則果如所謂左升右降耶果爾則氣之行也必有左右參差之跡矣而三部九候論曰上下左右之脈相應如參舂者病甚相失不可數者死是明明左右並行矣此大可疑者也而前人絶無疑之者何也六氣之加臨也少陰所在其脈不應理殊難通若謂少陰君火不主令則五氣足矣何必虛設君火之位耶至謂心君位尊無為而治更屬荒謬人身氣化之事豈等於人倫之體制耶六氣分主六年一年之中又分主四時何以五氣皆應此獨不應耶且其脈不應是絶無少陰脈象矣何以又云少陰之至其脈鉤耶此大可疑者也而前人絶無疑之者何也考一日二十四時近泰西制時辰表以一日夜分二十四小時此乃近事且出外夷難證中國古書之義頃讀張潔古保命集近託名劉河間書刻入河間三書中中卷煮黃丸條下言一時服一丸每日二十四丸自注云一日二十四時也夫一日既可析為二十四時獨不可析為二百刻乎此亦可以借證者矣一日一日夜也內經以日為晝故半日止得四分之一云釋左升右降曾著左升右降論謂人身之氣本是表升里降因左升氣盛右降氣盛故遂曰左升右降耳其論已列入證治總論文繁不復贅述至真要論少陰之復條有云氣動於左上行於右張石頑醫通勞倦門曾治一人遍身淫淫如蟲行從左腿腳起漸次上頭復下至右腳脈浮澀而按之不足決其氣虛用補中益氣加味而愈由此觀之人身果實有左升右降之氣矣吾為此事行思坐想近取諸身遠揣諸物乃似微有所獲者夫人身之榮氣行於血脈之中矣宗氣行於動脈而外為呼吸矣獨衛氣之行於脈外者其道有二一在肌肉脈絡之外一在皮肉交際之間人身皮與肉交際之處有膜以橫絡其中皮肉之氣雖能相通而不能相從不獨人身為然凡萬物之體皮里干外其際莫不有隙衛氣之行於肌肉者日夜五十度與榮氣相應所行之道即衛氣行篇之所敘是也若皮膜之氣橫行皮里以固護於大表其度數與日月相應左升右降日夜一周若有痰濕以滯之則氣行緩而淫淫如蟲矣是左升右降者衛氣之在皮膜者也內經雖無明文而其理似有可通謹書所見待質高明讀書須是篤信方能深入百年以來經學家專講讀書得閒每執一卷未領真趣先求其疵遂以號於人而自矜有得矣此欺世盜名之術若醫者身命之事死生所關豈可以虛名了事哉不料丹溪作局方發揮以後此風滔滔不可止每著一書必痛詆前賢以為立名之地惟仲景不敢毀則遷怒於叔和識者見之真不值一笑也嘗謂胸中存一絲菲薄之心則心便不能入雖讀遍百家終無所得故讀內經即深信其為黃帝岐伯書讀難經即深信其為越人書讀傷寒金匱即深信其為仲景原文讀甲乙經脈經千金方翼方諸輯録古書即深信其理法必有所授讀東垣河間潔古丹溪立齊景嶽諸家即深信其學問必有所勝即膚庸至於馮氏錦囊沈氏尊生平心求之皆有至理如此久久豁然貫通自能臻於萬珠一貫之妙是從腳踏實地真積力久而得非從超穎頓悟浮光掠響而來自無明暗相兼得失參半之敝矣孔子曰信而好古又曰篤信好學不篤信又焉能好學乎舊案有敗證收功太速者嘗讀前人醫案有敘證迭見敗象忽以一二劑挽回振起三五劑即收全功者此必非本元之真陰真陽有敗也此必前醫誤藥及病前有傷也或傷於勞倦或傷於憂怒或傷於飲食或傷於房室正氣未及復元而即生病故病本不重而似重證本不敗而似敗敗證雜沓之中必有一二緊要之處未見敗形若果元氣既敗豈真醫能回天藥能續命耶所謂緊要之處者脾腎居其大半而各臟亦皆有之前人醫案多不能分別指出但自誇功效而已讀者須是覷破四因正義朱丹溪擅改經文竊未為安今依經衍義頗覺通暢雖改一字增二字皆協於本文上下詞意考於全書確有證據名曰正義似當本旨明者鑑之陽氣者若天與日失其所則折壽而不彰故天運當以日光明是故陽因而上衛外者也此合論天人以起下文也人有陽氣如天之有日與當作於二字古文通用若陽氣失所則損折夭壽而不見其天命之本數矣故天之運行也以日光在上而始明人之有陽氣也亦充因於上不陷於下始得周行衛外不致為邪所侵也因充積之義也因於寒欲當做咳如運樞起居如驚神氣乃浮此下四節皆言陽氣失所不能衛外之病也欲蓋咳之訛也靈樞曰形寒寒飲則傷肺氣逆而上行氣上逆故咳也如運樞者言其咳之連連不已內動五臟外振經脈也若曰欲如運樞則不致傷於寒似與冬不按蹺之義不合且與上下文氣不續坐臥不寧神采不定其狀如驚狂者然至真要論曰寒氣大來水之勝也火熱受邪心病生焉心病則神敝故起居如驚也久則大氣浮越而為吐血咯血諸症矣所謂風寒不醒成勞病也榮衛生會曰血者神氣也因於暑汗當有不出二字煩則喘喝靜則多言體若燔炭汗出而散此暑閉於內之症也故知汗下當有不出二字煩者暑擾於氣也氣擾則喘喝靜者暑陷於陰也陰傷則神明顛倒而多妄言是症也體若燔炭仍宜汗出暑氣乃散以其始因於汗不出而暑鬱於內也但體若燔炭津液已傷仍必出汗始散則急宜養津之意自在言外或曰煩靜即東垣動暑靜暑義也動暑傷氣故喘喝靜暑中氣鬱而不宣故多言也亦通因於濕首如裹濕熱不攘大筋軟短小筋弛長軟短為拘弛長為痿此節丹溪所議極是濕則濁氣上升頭重而神識不清故如裹久則化熱不急攘除則熱氣內爍傷液而大筋軟短矣濕氣外淫而小筋弛長矣夫濕熱者發為痿躄而拘急者必因於寒此乃濕熱亦有拘急者何也熱內也濕外也大筋居內小筋居外在內者濕不敵熱則液燥燥則縮矣寒而拘急者亦以其化燥也寒熱不同其燥一也在外者熱不敵濕則肉濡濡則縱矣大筋軟短則屈伸不能小筋弛長則操縱無力而合病為痿矣因於氣為腫四維相代陽氣乃竭此衛氣鬱滯也血滯於臟則為積氣滯於臟則為聚血滯於身則為痹氣滯於身則為腫腫則四肢必有廢而不用者則不廢者代其職矣脊以代頭尻以代踵代之義也四末為諸陽之本有所廢而不用久則陽氣必偏竭矣非氣竭而死也不曰不用而曰相代者痹氣走刺無定彼此互易非四肢全廢也仲景曰病人一臂不遂時復轉移在一臂是也陽氣者煩勞則張精絶闢積於夏使人煎厥目盲不可以視耳閉不可以聽潰潰乎若壞都汩汩乎不可止此言養陽者宜調其形體也形體煩勞則血脈爭張津液必有偏絶屢犯而闢積以至於夏則陰精內竭時火外迫如煎而厥矣闢積即襞積猶言零碎積纍也蓋煩勞偶犯津液猶可漸復惟屢犯不止而至於夏則內外合邪變症作矣目盲以下煎厥證狀也都防也凡中風卒倒痰涎潮湧腹中比水流波浪之聲更甚煎厥由於陰虛薄厥由於陽實煎薄二字可味陽氣者大怒則形氣絶而血菀於上使人薄厥有傷於筋縱其若不容此言養陽者宜和其心性也若大怒則形與氣必相離絶不相維矣何則怒則氣逆而血隨氣升亦菀於上血氣相薄上實下虛其人必厥薄者迫也氣血並迫經絡壅塞而不通故厥也亦有不發為厥者怒生於肝肝主於筋怒則血氣奔逸火升液耗而筋傷筋則肌肉無所束而形體縱大若不容矣此皆形氣離絶之證也筋非骨會之大筋乃散絡之管攝肌肉者常有怒罵叫號以致頭面胕腫四肢痠軟難動如痿廢者見之屢矣氣復即愈此形與氣絶非死絶也經中言絶義多如此薄厥見症於氣筋縱見症於形陰陽應象曰暴怒傷陰暴喜傷陽厥氣上行滿脈去形即此義也君一臣二奇之制也君二臣四偶之制也君二臣三奇之制也君二臣六偶之制也一三五七二四六八者品數之單駢也奇偶者所以制緩急厚薄之體以成遠近汗下之用者也於品數之單駢何與耶品數之單駢於治病之實又何與耶制病以氣數之單駢無氣也蓋嘗思之用一物為君復用同氣之二物以輔之是物性專一故曰奇也用二物一補一瀉為君復用同氣者各二物以輔之是兩氣並行故曰偶也君二而臣有多寡則力有偏重故亦曰奇臣力平勻則亦曰偶推之品數加多均依此例此奇偶之義不可易者也舊解皆專指數之單駢且曰汗不以奇而桂枝用三下不以偶而承氣用四以此為神明之致也可為噴飯天氣清淨光明者也藏德不止故不下也天明則日月不明邪害空上聲竅陽氣者閉塞地氣者成而登天上古天真成者聖人之道成也登天即天位為天子也鼎湖之事乃秦漢諸儒附會之談古無是說豈可援為注釋且果上升矣下文乃問於天師句何以接得上殊不知此即舜典乃命以位之義耳逆秋氣則太陰不收肺氣焦滿逆冬氣則少陰不藏腎氣獨沉四氣調神生氣通天論曰肝為陽中之少陽心為陽中之太陽肺為陰中之少陰腎為陰中之太陰脾胃為至陰此五臟陰陽本體之真氣也與六經之三陰三陽因人身左右前後之部位起義者迥不侔矣上文逆春氣少陽不生逆夏氣太陽不長則秋當作少陰冬當作太陰上下文義始貫前人多忽略讀過夫自古通天者生之本本於陰陽天地之間六合之內其氣九州九竅五臟十二節皆通乎天氣生氣通天自古猶從來也言從來所謂通天者萬物生生之本莫不本於陰陽故天地之間六合之內其氣充塞九州而人在氣中其九竅五臟十二節皆通乎天氣也天氣即陰陽也王啓玄以其氣九州九竅為句既嫌穿鑿而吳鶴皋以自古能天者生為句之本本於陰陽為句無理特甚男子如蠱女子如怚靈樞熱病篇怚者阻之訛也甲乙經引此作阻脈經有肝中風者令人嗜甘如阻婦狀是明明以阻為妊娠之稱矣謂妊娠則經阻不下也故妊娠之病曰惡阻謂惡作劇於阻婦也丹溪解為嘔惡以阻飲食者謬矣馬注徑作怚解考字書無怚字揣其注意頗似怛字之義穿鑿極矣張隱菴起而正之宜也惜未見甲乙經耳又見太素作妲尤非太陰臟搏者用心省真五脈氣少胃氣不平用心省真謂用心太過省其真氣也省即損字猶邪即斜字思慮不節則心之真陰為其所耗心為十二官之主而脾者孤臟以灌四旁者也主不明則十二官危脾有病則五臟不安脈經有曰憂愁思慮傷於心者其脈必弦故太陰臟搏者因用心以省其真脾不能輸精於五臟而五脈氣少不能為胃行其津液而胃氣不平也氣少與不平即氣不沖和而脈弦之義也舊說未妥陰陽結斜多陰少陽曰石水少腹腫陰陽結為句謂尺寸皆緊也斜字為句謂脈形低昂即多陰少陽關前浮少關後沉多也大奇論所謂肝腎並沉為石水是也此陽虛陰結後世所謂單腹脹者故曰少腹腫也前人每論單腹脹未嘗指為即石水注石水者亦未嘗言即單腹脹蓋因不知是石水故立單腹脹之名耳石者堅也冷也反仰其手脈經有脈深伏不見反仰其手乃得之之文前人不知反仰之義竟有解作覆手者殊不可通竅思此所謂伏非真伏也乃沉之極也凡診脈皆仰置其手反仰謂將腕高枕而手掌反折垂下於是筋脈為之牽引繃急而挺起矣故沉者亦外見而可診也應天者動五歲而右遷應地者靜六期而環會此數語舊解皆未甚明晰其實乃極淺之語所謂應者主三陰三陽之六氣言也天地以干支言非司天司地之謂也應天者謂六氣之合於天干也如甲年起太陽行至五年必右遷一步而始復起太陽甲與太陽不復相值也故曰動應地者如子年起太陽行至六年臨午再六年而復臨子矣其數有定而無所參差也故曰靜天以六為節地以五為制周天氣者六期為一備終地紀者五歲為一周此謂天以地之六為節地以天之五為制互相節制而不得相值地周於天六期乃備天終於地五歲已周二語乃明其不相值也不相值而相生相制變化其中矣故五六相合而七百二十氣為一紀凡三十歲千四百四十氣凡六十歲而為一周不及太過斯皆見矣君火以明相火以位張景嶽解得最好二句亦無深義只以明六氣所以有二火之義也數動一代者病在陽之脈也泄及便膿血諸過者切之澀者陽氣有餘也為身熱無汗滑者陰氣有餘也為多汗身寒前人多以此三句連續殊覺脈證不相屬而下文諸過者亦嫌突起而無著也豫以上二句為一段以下五字連下文諸過者讀屬下滑澀寒熱為義其義即通評虛實論所謂腸澼下膿血白沫者身熱則死寒則生脈澀則死滑則生之義也上二句前人亦未剖析透徹夫氣之動於臟也如弓弩之發若里脈有病則氣初發之處即為之陰滯而脈之應指必軟弱矣今其脈迫促而數搏滑而動是其氣已湧至於表因表脈有阻而不得暢達故有此鬱勃之象而僅偶間一至軟弱而代也數音促不音索舊讀去聲者誤代之本義為弱詳平人氣象論後人專釋為止是不讀內經之過也折齒金匱備急丸方下有若口噤亦須折齒灌之之語後世方書有謂口噤不得入藥者打去一齒灌之其義蓋本諸此其實金匱之意非謂打去一齒也只是撬之使開耳齒根上連於腦內應於心敲之即痛徹心腦口噤本是心氣閉塞若再使痛氣入心不速之斃乎或已發熱或未發熱發熱惡寒發於陽無熱惡寒發於陰發於陽者七日愈發於陰者六日愈此數語雖無深義而有新感與伏氣之殊前人辨論紛紜讀之迄不能令人心意朗豁者空談不切事情也以己身所未見天下所必無之事而大言不怍強作解人是何意耶詳玩語氣陰陽二字是指表裡之部分非指風寒溫熱之氣化也何者其意是專辨傷寒有此兩途非兩辨傷寒溫病之異也凡感於風寒而即病者皆因發熱而始惡寒未見有不熱但惡寒者即初時爪尖略形厥冷不過片刻之事臨診之時必已發熱豈得謂之無熱未發熱耶惟伏氣之病激於時令之氣而發者或早惡寒而夜發熱或夜惡寒而早發熱更有遲至一日以外者以寒邪內伏至春初陽氣當升邪阻其道二氣相爭榮衛不通遂見惡寒待裡氣奮達於表始見發熱故發熱惡寒一時並見者即已發熱之謂也是新感風寒病起於表故曰發於陽無熱惡寒久乃發熱者即未發熱之證也是伏邪內動病起於裡故曰發於陰凡伏氣之病發於里者有寒熱兩途熱即寒邪入鬱而化熱者也其人若真陰充裕寒雖久伏不能化熱若真陰不足虛陽亢燥遂發為春溫風溫之病矣其初起皆不即發熱而治法之寒熱虛實迥異仲景是專指伏氣寒病也近人如葉天士薛生白王孟英輩止知有伏氣之溫病而不知有伏氣之寒病皆揣理而談未嘗徵之實事也汪幼純所說汗病之事即伏氣之寒病也詳見第四卷證治類中兩愈字乃半面之詞若至期不愈即不可為矣如辨脈云表有病者脈當浮大今反沉遲故知愈也里有病者脈當沉細今反浮大故知愈也千金方引此文而申之曰若不愈者必死以其脈與病不相應也即此義也愈非痊愈也只是邪氣至此當已盡頭不能再進而可漸退也六七兩字前人見原文有陽數陰數之語莫不滑口讀過未嘗深考其實夫病之愈也必藉於氣六七數也何與人身之氣耶鄙見此當指人身之形層言也劉河間曰天地自太虛至黃泉有六位人身自頭至足有六位而胸腹之間自肺至腎亦有六位是人身形層之表裡顯有六分也故發於陰者自里而表六日傳至極表而邪氣散矣發於陽者自表而里六日行至極里為里分正氣所持不得久留越一日而邪氣始從三焦消散故陽病轉比陰病多一日也原文陽數七陰數六者即以里必行至六而邪乃衰表必行至七而邪乃衰也不然陰陽之數四五八九皆是也且五六尤有合於臟腑之數何獨取六七耶內經寸口內外分配臟腑脈要精微論曰尺內兩旁則季脅也尺外以候腎尺裡以候腹中附上左外以候肝內以候膈右外以候胃內以候脾上附上右外以候肺內以候胸中左外以候心內以候膻中前以候前後以候後上竟上者喉胸中事也下竟下者少腹腰股膝脛足中事也此固顯然寸口分配臟腑之診法矣其內外之義有以浮沉解者有以前後名半部解者有以內外兩側解者總之浮也前也外側也皆屬陽當以候腑沉也後也內側也皆屬陰當以候臟而經文相反者何也嘗思之矣外以候經絡之行於軀殼者也內以候氣化之行於胸腹者也如尺外以候腎是候腎之經氣外行於身者也尺裡以候腹則指定腹內矣左外以候肝是候肝之經氣外行於身者也內以候膈則指定膈內矣右外以候肺是候肺之經氣外行於身者也內以候胸中則無與軀殼之事矣左外以候心是候心之經氣外行於身者也內以候膻中則直指心體之處矣即右外以候胃內以候脾亦非以臟腑分也候胃候其經氣之行於身者也候脾候其氣化功用之行於里者也又云前以候前謂關前候胸腹也主陽明沖任後以候後謂關後候脊背也主太陽督脈是推廣上義以寸關尺三部之正位為脈之中段以候身之中段矣上竟上者喉胸中事下竟下者少腹腰股膝脛足中事也是更推廣於寸之上尺之下以分候軀殼之極上極下矣人之一身四維包中心故以內外言之兩頭包中段故以上下言之兩面夾中間故以前後言之可知寸口之部位其分配有三一以浮沉候表裡也一以關前關後候身之前後也一以寸上尺下候身之上下也李士材以內外為前後各半部謂臟氣清故居上腑氣濁故居下此不但自古無人用此診法也即士材亦豈能據此為診乎且胸膻膈腹又何能專指以為腑乎尺內謂尺之正部也兩旁字與下文竟下之下字同義謂兩尺之後也不在正位故曰旁也非兩側之謂季脅即賅在少腹腹股之中者也經先提而言之者蓋古人診脈下指是先定尺部再取關寸故曰中附上上附上非如後世有高骨為關之說先取關而後定尺寸也膻中者心體四旁之空處在肺葉所護之內也胸中者肺前空大之處皆是也經意蓋即以膻中為心胸中為肺膈為肝腹為腎矣六腑各從其臟也而三焦之空處亦舉賅於其中於此徵經文措詞之靈而密秋傷於濕冬生咳嗽喻嘉言改秋傷於濕為傷燥在喻氏不過借證秋燥之義而擅改經文則謬矣夫濕非燥之訛也素問水熱穴論曰秋者金始治肺將收殺陰氣初勝濕氣及體蓋四時五行之遞嬗也惟土濕與金清相遞太急濕令未衰而清斂之令已至故其始濕雖盛而氣外散也及秋而濕乃斂入體中矣及冬而陽氣又入矣陽濕相激故咳嗽也若是傷燥秋即當嗽不待冬矣其所制清燥救肺湯亦治秋燥非治冬咳之燥也燥為次寒其氣屬金其象為干為堅為降為清析為鋒利皆金之正令也若熱燥是挾火在內與寒燥相對待不專於金也喻專以熱言燥則水澤腹堅又何以說之與友條論讀傷寒論法傷寒非奇病也傷寒論非奇書也仲景據其所見筆之於書非既有此書而天下之人依書而病也其三陰三陽轉變之處前人往往詞涉硬派一似暗有鬼物指使邪氣如何傳法並不得如何傳法讀者須消去此等臆見每讀一段即設一病者於此以揣其病機治法而後借證於書不得專在文字上安排第一須辨傷寒為何等病此本四時皆有之病也但三時多有挾溫挾濕挾燥挾風之異其氣不專於寒其膚腠疏鬆初傷即兼二三經再傳而六經已遍惟冬時腠理固密寒邪必先傷皮膚以漸深入故謂三時傷寒治法不同則可謂三時無傷寒則不可仲景是專論冬時傷寒惟即病於冬與遲病於春中多相間錯出未曾分析其遲病於春者亦系專指寒病未及化熱者與內經冬傷於寒春必病溫之旨不同前釋發陰發陽篇可參看伏氣二字本不必過於深求今日感寒今日即病固即病也上月感寒下月始病亦常有之事謂之伏氣可也謂之即病可也豈得一言伏氣便有許多奇怪第二須辨論中寒熱二字為何等氣寒者天地之邪氣也熱者人身之正氣也為寒邪所束不得宣發鬱結而成與寒邪是兩氣非寒能化熱也與溫熱病傷於天地之熱邪者不同寒邪既散即當陽氣伸而熱解其有不解者正氣久困經脈凝滯不能自運抑或誤治使然第三須將傳字看得活非邪氣有腳能自初中轉變步伐正齊也病證變見何象即為邪傷何經如少陽主行津液津液灼干即少陽證陽明主運渣滓渣滓燥結即陽明證讀者須思何以頭痛嘔吐暈眩脅脹何以大便祕結潮熱自汗不得渾之曰邪入少陽故爾也邪入陽明故爾也當在氣化上推求不得專在部位上拘泥第四須辨初傷有三陽有兩感有直中太陽行身之後而主表其時陽明少陽決無不傷內經曰中於項則下太陽中於面則下陽明中於頰則下少陽中於陽則溜於經中於陰則溜於腑即仲景所敘太陽中風鼻鳴乾嘔豈專太陽但邪在大表治法不外麻桂葛根故不必多立名色兩感直中皆因其人陽氣之虛或邪氣之猛也太陽少陰陽明太陰皆有兩感少陽厥陰兩感殊少直中亦然少厥兩感即陽氣蔑矣直中與兩感不同者兩感是一陰一陽同病其邪相等直中是邪甚於陰也其陽亦斷無不傷但陰分之病校較感為急第五須識傷營傷衛不能判然兩途仲景風則傷衛寒則傷營只略敘於麻黃證中不過分析風寒所傷之偏重如此其意側重在寒是串說非平說況夫中風脈緩自汗汗即營也營液外泄桂枝湯是充助營氣之劑傷寒脈緊無汗是衛氣為寒所拘麻黃輕迅是過營透衛以開表其力正注於衛何得謂風傷衛不傷營寒傷營不傷衛更何得以此劈分兩大綱按冬月腠理閉密寒邪以漸而深初傷皮膚只在氣分此時發之不必得汗其邪自散次傷肌肉乃在津液邪與汗俱汗出邪退次傷經脈乃入血分即入經脈則或竄筋骨或潰三焦而據臟腑亦有已及筋骨而仍未入經脈之中者故三陰亦有表證可汗也既入經脈必連臟腑非可專恃汗法矣其未入經脈時所稱太陽病陽明病少陽病及三陰病者只是三陽三陰之部非經也與第二卷三陰三陽名義篇參看第六須辨寒熱傳化之機初傷固總是寒日久有寒邪內陷者是其人本內寒也有寒去熱不解者是其人陰不足也寒邪內陷必下利即所謂陰傳太陰也其實即陽明之下陷耳繼即少陽之氣陷繼即少陰之氣陷至厥陰肝氣亦陷無復生機矣始終總不離乎下利若利早止於厥陰未陷之前即不得死止於厥陰已陷之後息高時冒陰氣竭矣熱氣不解必祕結必自汗即所謂陽傳陽明也此時太陰之津液必已虧矣治之失法而少陰之精又虧厥陰之血又虧始終總不離乎祕結非邪至陽明即無復傳也總不離乎陽明耳第七須識傷寒溫病始異終同之說不可執也此只說得熱傳陽明一邊其寒傳太陰迥乎不同傷寒有寒死證無熱死證陽明內實非死證也其有死者皆由誤治若溫熱病則有自然一成不變之熱死證第八須識合病並病之中有真假之不同前人分別合病並病語多牽強當是兩陽同感謂之合病由此連彼謂之並病更有邪氣未及彼經而彼經為之擾動者其見證必有虛實之不同如素胃寒者一傷於寒即口淡即便滑素陰虛者一傷於寒熱氣內菀即喘喝即口渴豈真邪傳陽明太陰耶但散其寒諸證即瘳亦有略須兼顧者必其內虛之甚預杜邪氣內陷之路也第九須求寒熱氣化之真際六經傳次本不必依仲景篇次也無如前人越經傳表裡傳等語說得過泥並未靠定各經切發其所以然如少陽主經脈之津液經脈灼干即見少陽證太陰主腸胃之津液腸胃灼干即見太陰證陽明主腸胃之渣滓渣滓燥結即見陽明證厥陰主筋膜之津液筋膜枯索即見厥陰證少陰主下焦之氣化津液津竭氣散即見少陰證此從熱化也從寒化者陽氣不足而下泄寒水淫溢而上逆總是何臟受傷即何經見證第十寒化熱化各視本體之陰陽虛實此語淺而極真論中誤汗後有為內寒者有為內熱者誤下後亦有內寒者有內熱者若執過汗亡陽過下亡陰之例便不可通故讀者以隨文生義為貴夫六經乘虛而傳寒熱隨偏而化也第十一須知表裡之說有形層之表裡有經絡之表裡有臟腑之表裡有氣化之表裡形層即前所謂皮膚肌肉筋骨所謂部分也邪在三陰之部里而仍表仍宜汗解邪入三陽之經表而已里只有清化即和解也少陽半表半裡亦有數解以部位言則外在經絡則內連三焦也以氣化言則表裡未清而裡熱已盛也總是氣化燥結之象與第四卷少陽三禁篇參看第十二須知手經足經並無分別足經部位大邪氣在表尚在經脈之外其氣是一大片故見足經證邪入經脈之中反多見手經證矣大抵足經證見者多在軀殼之外手經證見者多關臟腑之中足證有在經者手證絶少在經也經者身形之事也臟腑者神明氣化之事也第十三須知三陰三陽只是經絡表裡之雅名於臟腑氣血之陰陽不相涉也若謂邪入三陽即為傷陽邪入三陰即為傷陰則差矣內經心為太陽肝為少陽肺為少陰腎為太陰脾與六腑為至陰此以氣血清濁言之今人已不講其實各經各臟各腑之中各有陰陽此說甚長細讀內經自能辨之第十四讀書須知闕疑論中敘證有極簡者有極繁者有方證不合者有上下文義不貫者一經設身處境實在難以遵行安知非錯簡脫簡耶不必枉費心機以俟將來之閲歷即如少陽陽明合病自下利者黃芩湯太陽誤下利不止者此協熱利也承氣湯此必內有伏熱三焦腸胃穢氣鬱濁頗似溫病之發於伏邪者於傷寒自利及誤下而利者殊不合格又太陽誤下結胸正宜兼開兼降以宣內陷之陽而開邪氣之結乃反用甘遂巴豆以重泄之是以一誤為不足而又益之也又太陽陰明合病自利者葛根湯不下利但嘔者葛根湯加半夏既不下利何以仍用原方是原方只治合病並非治下利也前文何必特署下利字樣此類宜詳思之前人只說三陽合病皆有下利絶不說合病所以下利之故此之謂半截學問總之讀傷寒論只當涵泳白文注家無慮數十以豫所見二十餘種皆不免穿鑿附會言似新奇莫能見之行事鄙見只當分作四層曰傷寒初起本證治法曰傷寒初起兼證治法曰傷寒日久化寒並誤治化寒證治曰傷寒日久化熱並誤治化熱證治其霍亂風濕食復勞復以雜證附之再參之陶節庵書及各家論溫熱書互相考證庶於讀書有條理而臨診亦可有徑途矣蓋經脈部位與夫形層表裡淺深之事固不可不講而究不可過執也著力仍在氣化上此書在唐以前已非一本其章節離合本無深意讀者只應各就本文思量不必牽扯上下文積久自能融會貫通
