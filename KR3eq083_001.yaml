front:
  text: 自序讀醫隨筆者學海之所以備遺忘也意在溫故以求新實無新意之可採徒以同志傳誦一二遠方君子多來索觀且促付梓不能拂其請也而應之跡近於自炫矣夫學海之治醫也先治脈次治藥脈有脈義簡摩診家直訣之刻藥以親嘗未遍不敢臆說久未成書若夫病證衆矣治法繁矣雖古之名醫猶不能以一身盡歷天下之病變也何況小子敢以管蠡之見妄事窺測乎僅於讀書臨診之際隨聽見而記之缺略瑣碎固不足為成書亦復凌躐拉雜未有體例粗為分類以付手民其中陳陳相因者蹇澀未暢者繁沓不檢者前後重復異同互見者觸目皆是識淺筆孱貽譏大雅知不免矣昔之人或廣搜舊說輯為宏編或澄煉精思約為枕祕以此方彼不亦蔑乎雖然竊有說焉宋人懷燕石而自以為寶也一旦出示於人乃悟其非寶矣朱奉議作傷寒百問早刊行世得某友指摘之遂改著活人書而傳矣學海深羡宋人之善悟而將勉為奉議之能改也然則是刻也非自炫也亦非非自炫也光緒戊戌暮春皖南建德周學海澄之甫書於邵伯埭舟中
