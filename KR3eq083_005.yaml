body:
  text: 卷四證治類陰虛注夏陽虛注秋並陽虛注夏凡人三四月天氣乍暑腠理乍開內氣不勝其散而為神昏發熱體倦不思食之症謂之注夏世醫論之多矣至於七八月間暑氣初收新涼乍來腠理乍閉而內氣久經夏汗外泄其力孱弱不能自充多見肺氣下陷呼吸短促不足之象繼則連暑氣涼氣濕氣一齊吸受皮腠之內發為悗熱惡寒體重肢倦飲食無味口渴不欲飲諸症此與注夏之病正相對待一為陰虛天氣乍開而力不足於開也一為陽虛天氣乍合而力不足於合也世醫論之者少惟張石頑醫通勞倦門有之吾名之以注秋而録其文曰脾胃虛則怠惰嗜臥四肢不收時值秋燥令行濕熱少退體重節痛口乾舌燥飲食無味不欲食食不消大便不調小便頻數兼肺病灑淅惡寒慘慘不樂而色槁不和乃陽氣不伸故也升陽益胃湯又曰勞役辛苦腎中陰火沸騰後因脫衣或沐浴歇息陰涼處所其陰火不行還歸皮膚腠理極虛無陽被風陰涼所遏以此表虛不任風寒與外感惡寒相似其症少氣短促懶於言語困弱無力不可同外感治補中益氣加柴蘇羌活甚者加桂枝最當此條雖不言秋令而風與陰涼非秋氣乎故乍涼見證每多如此後條較前條尤重者為涼氣乍至尤覺有猝不及防之勢也又按注夏一病前人有指為三四月乍暑之時即見此證者有指為長夏六月暑濕交蒸之時而見此證者竊謂二者當並有之如乍暑見此證盛夏未有不加甚者也盛暑見此證初夏未有不先兆者也且病名注夏本統夏令三月而言其病由於陰虛不任疏散自是夏令之月無日不然而其機總髮動於初夏與初秋為一開一合之對待故以初夏見證為當也但時有初盛即病有微甚耳亦有初夏見證至盛夏轉精神清爽者此陽氣不足經絡伏有寒濕初時陽力不能伸達非如陰虛者內氣先已不固不勝天氣之再散也其證多見煩悗躁擾不似注夏之怠惰少氣也是又注夏之別一證矣戴元禮以七月初涼見證為注夏殊覺名義未協吾故創注秋之說也論嚏金匱痰飲篇曰水在肝脅下支滿嚏而痛徐注曰肝與少陽膽為表裡所以主半表半裡者水氣乘之陰寒內束故少陽氣上出衝擊而嚏如傷風然喻注曰火氣衝鼻故嚏也按內經腎主嚏故凡太陽傷寒寒氣深入隨督入腦為熱所擊則嚏矣太陽與督即少陰之部也其脈皆與腦通嚏者寒熱相激逐於脈中致脈內作癢癢即突出徐曰寒束喻曰火沖其義一也惟不言肝腎相通而牽說少陽殊屬無稽夫肝水見嚏者肝寒感於腎也且嚏之來路有二因寒束肺竅熱氣撩於肺中而上衝者其氣發於胸中上過上齶之內而下出於鼻也因寒束督脈熱氣激於脊膂而上衝者其氣起於腰俞循脊上出腦頂之巔而下出於鼻也一縷寒邪孤行氣脈而不為正氣所容故衝擊而出也本屬微邪不足為病然見有早起必嚏數十次無間寒暑而寒天較甚婦人妊娠尤為有礙此不得為微邪矣治法宜仿肝水例宣達肝與膀胱之陽與肺氣相接使水邪下伏宿寒外攘即止論嘔噦傷寒論濕病篇濕家下之早則噦此丹田有熱胸上有寒又太陽篇邪高痛下故使其嘔小柴胡湯主之邪者傷寒之邪也痛者熱之所鬱而激也又云傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐黃連湯主之脈經平嘔吐噦篇曰寒氣在上暖氣在下二氣相爭但出不入其人即嘔而不得食恐怖即死寬緩即瘥朱丹溪曰厄逆有痰閉於上火起於下而不得伸越者大凡人身四維有寒束之氣行橫竅之出入不利遂從直竅上衝又或寒壓於上熱鬱於下氣上升道狹不如其常則升氣衝激此皆作嘔噦也若腸胃祕結濁氣上蒸肝腎血熱火氣上浮而無寒遏於上者不過慍慍欲吐不至沖激也乾嘔與噦證有輕重而因無異同前人剖析太過轉亂人意按上論嘔噦非論吐也吐之病有因寒氣從下上衝而然者有因中焦胃熱肝熱而然者有因外風襲胃者驚躍常於欲寐未寐之際霎然舉手振躍者世皆謂為血不養筋而實非也乃津不濡脈之候也人身氣脈一動周身百脈湧應其中必有津以濡之故能自然無礙也若有一脈竟塞不通則氣亦竟不至其處亦遂寂然不動矣無如脈終不能不通氣終不能不至也脈中津汁耗燥一有不濡之處或略有痰絲以格之則氣之既動而窒窒而復動一控送之間而百脈為之撼躍矣其動之所發無定處或起四肢或起胸中隨其氣之所觸而起也此象偶然一見不足為病若欲治之惟甘涼生津而已凡小兒寐中多作此象俗謂骨氣撐長之兆實即痰格其氣也若大人逐日方寐即見驚掣是為痰盛是津虛之燥痰也生津為主而祛痰佐之津盛則痰有所載而滑利易出也若血液虧虛不能養筋者當見肢節拘急不便或舉身振振欲劈然此風熱所傷與發汗太過之所致所謂筋惕肉瞤也是故心津虛燥之人往往神明散越欲寐之際心中無故驚惕四肢微有瘛瘲甚至纍纍不已令人不能成寐者其勢雖微病根反深若驟因風熱與過汗者宜甘酸以養之經謂心苦緩急食酸以收之是也若久病與無病而然者更宜大劑甘寒酸溫之藥生津補血以溉之所謂津液相成神乃自生地又有水飲衝心而發者必辛散淡滲兼滑潤之劑載痰上下分出以滌之此又所謂心中憺憺大動恐如人將捕之者是心陽為水邪遏抑而神不自安也表裡俱病治各不同表裡俱病者俱傷於邪也非表邪實里正虛之謂也氣者六淫是也試以寒熱明其例表裡俱寒者治宜溫中以散寒裡氣壯而外邪可退矣仲景於身體疼痛下利清穀先溫其里後攻其表者是指示大法如此其實表裡兩感於寒溫里發表一時並用正不必分先後也表裡俱熱者治宜甘寒佐以辛涼解散如葉香岩溫熱治法若陽明腑實者更先以苦寒鹹寒攻下之如服承氣大便得通而汗自出是也二者表裡同氣故重在裡治其里而表亦即應手而愈矣即或表有未盡餘邪再略清其表可也若先攻其表不但裡虛而表不能淨即令表淨而正氣受傷里邪又將從何路以驅除之表熱裡寒者如其人素屬中寒而新感風熱治宜解表而已如其人內傷生冷外傷風熱表裡俱屬新邪則治宜辛涼疏表之中佐以芳香理氣以化內寒表寒裡熱者如其熱是因表邪腠理閉遏所致但解表而已如其熱是因溫邪蘊結而表又新感風寒輕者辛涼疏其裡熱而外寒自祛重者寒力足蔽其熱治宜辛香輕悍急通其表免致表邪久束裡熱愈深漬入經絡沾滯血分便難措手但劑中宜佐涼滋不可過燥表解急清裡熱二者表裡異氣故重在表所謂先攻其易也若先攻裡不但表邪內陷恐里邪未易去而表邪已堅矣此法之大體也又當隨時消息病勢之緩急以為施治之先後神明於法中而非死板法也其庶幾乎大抵病由外陷內者須開其表而撐其里使邪仍從原路出也昔人嘗謂少陰之邪仍以太陽為出路太陽之邪仍以陽明為出路故凡外邪內陷日久者服藥後能轉見表證即是邪氣退出也又如內傷飲食以致惡寒則攻滯之中必兼理氣內傷精血以致發熱則養陰之中必寓潛陽此又表裡互虛互實之治法也傷寒邪在陽經則脈浮在陰經則脈沉舊說謂傷寒邪在陽經其脈浮邪入陰經其脈沉此浮表沉里之大義也其實寒邪初感在表脈多沉緊而數不見浮也此事景嶽已曾辨之矣邪入陰經惟寒邪直中者脈見沉緊若由陽經化熱傳裡者脈多洪盛未有轉變沉細者然則舊說非耶曰所謂陽經脈在浮者非謂其脈之浮也謂診者當於浮分診候其變象也陰經脈在沉者非謂其脈之沉也謂診者當於沉分診候其變象也大抵初感外邪如屬風熱則脈浮然風熱之象止見於浮若重按則不見也如屬風寒則脈沉不能浮然風寒之象止在指力初到脈皮之上若重按至脈底亦不見也且其勢有欲浮不得之意即此可見寒邪據表陽氣不得外達矣此邪在陽經則脈浮之說也邪入於裡若屬沉寒或寒濕從下受直入陰經者重按沉分必見細緊若系熱邪入里外有寒束則必見浮緊而沉滑矣至傷寒由陽經化熱傳入陰經只是邪氣內連非邪氣內移表邪全罷也其脈當較病在陽經時更覺洪實其邪氣之變象不止見於浮分連沉分亦如是矣此邪在陰經則脈沉之說也若表邪入里而表分全退只見里證此必內虛而致邪氣內陷也或熱結於胸而為神昏譫語其脈必沉細而數或寒陷於中而為下利足冷其脈必沉微欲絶亦有沉緊而遲邪盛正虛比之邪氣直中者更難挽回也內連者是邪氣蔓延而正氣之力不敵也內陷者是正氣全虛而邪氣據其巢穴也直中者雖亦正氣之虛而邪氣單刀直入尚未蔓延四布盤踞未牢故可急攻稍遲亦無及矣又有邪盛於表正虛於裡如所謂尺中微不可發汗尺中遲不可下者此猶虛處無邪正當急補其虛助正驅邪也稍遲邪即內陷矣處處有邪便難措手少陽三禁辨舊說謂膽為清淨之腑無出無入故邪在少陽禁汗吐下此說相沿已久不知始自何人而不知其不通之甚也夫五苓瀉太陽之腑承氣瀉陽明之腑若少陽膽腑誠無如此瀉法矣若少陽之經本與諸經之氣相通何得謂無出無入耶吐下無涉於經禁之可也汗乃通經之事而何以禁之然則仲景不徑用桂枝麻黃者何也蓋嘗思之少陽之經行身之側為人身之奧區凡人之身前後部位大則氣力大兩側部位小則氣力小百藥下咽皆藉膻中大氣以運行之今兩側為身之奧區藥力總是先行太陽陽明而後緩達少陽如此則用藥者亦當以緩法行之若徑用麻桂性急之藥則直走太陽陽明汗先出而少陽仍未到也正氣又已衰矣故用柴胡性緩之藥又以人參柔緩者監製之半夏下降者疏通之無非緩緩橫撐之意也故知少陽非忌汗也忌急汗出緩撐微降斯藥力旁滲而達於少陽之經邪乃得汗而解矣不但此也經謂邪在膽逆在胃善嘔苦汁溫溫欲吐溫溫當作慍慍是邪在少陽其氣上逆本自欲吐治以柴胡半夏降其逆氣故不得比於胃中夾食溫溫欲吐者當遂吐之也吐之則氣愈上逆而不降矣是禁吐亦非因膽腑之無出無入也邪在少陽之經每於手少陽三焦之腑其氣相通故少陽有心胸痞滿即屬於三焦矣治法雖不用硝黃而必以黃芩黃連半夏理其痞結以其邪在氣分故也若有痰涎有形之邪結於胸脅則大陷胸大柴胡以及栝蔞薤白旋覆代赭此皆少陽三焦之治也亦何嘗不用下耶大抵六腑惟膽腑之體同於五臟五臟受邪皆因六腑牽纍若直傷其臟即死矣膽之受邪亦因胃與三焦之牽纍若直傷膽亦無治矣故五臟受邪治在六腑膽腑受邪治在胃與三焦即如逾垣上屋罵詈不避親疏皆胃實以致膽橫也由此觀之緩汗微降治膽之經而陷胸硝黃之通胃與三焦者實以治膽之腑也按陶節庵曰傷寒因下早而成滿硬痛者為結胸未經下者雖滿悶不硬痛此為痞氣屬少陽部分宜從緩治不宜峻利觀此則豫之前說非杜撰矣再邪傷太陽陽明則正氣辟易積於兩側稍久邪勢張大漸入兩側則有邪正分爭之勢矣故時時作嘔者上下相爭也往來寒熱者表裡相爭也身重脅痛不能轉側者正氣為邪氣所逼僻處偏隅而不流利通行也此皆邪在於經之事若胸脅痛脹則入里而在胃與三焦矣均無與膽腑之本體也此論邪入少陽之經脈部位也又按膽主津液凡邪傷津液即屬少陽不必入於身側之經也故胸滿驚煩往來寒熱小便不利一身盡重不可轉側者津液傷則氣機不利也或熱入血室晝日明瞭夜則譫語者津液傷則血分受灼也小柴胡乃養榮之方生津益榮以托邪也胡玉海論陽明下證有云須先使邪氣浮動毒不黏連於肝乃可用大承氣下之此即少陽禁下之義也明於津虛血燥之義則少陽之所以三禁與其所以有熱入血室證俱瞭然矣少陽壞證為多者津液傷則血失所養易為熱邪所灼敗也此論邪傷少陽之所化功用也蟲脈蟲證關上脈微浮積熱在胸中嘔吐蛔蟲心健忘關上脈緊而滑者蛔動尺中脈沉而滑者寸白蟲腹中痛脈當沉若弦而反洪大此為有蛔蟲腹中痛多喘嘔而脈洪者為蟲按喘疑當作唾疳蝕其脈細數若虛小者生緊急者死按蟲病多起於濕熱太盛木鬱土中而化生也亦有瘀血所化者世謂癆蟲是也大抵在腸胃者易除在經絡者難治其脈不外弦滑細數之兩途然亦有弦遲者胃中寒濕也亦有細澀者胃汁為蟲所消耗也至於洄溪醫案所稱腸胃為蟲蝕盡而人猶不遽死則怪誕之說矣然事亦有甚奇者族有貧婦初覺七竅內如細蟲縈援數年後目盲皮膚枯槁而遍身振掉不息夜寐稍靜偶一言動即肢體無一不戰戰栗栗然者已十餘年矣今尚未死此必傷於微風化生細蟲吸血傷筋也大抵蟲證與痰證相類痰多怪證蟲亦多怪證也為暈眩昏厥為癲癇狂妄為吐利血水為皮膚頑麻奇痛奇癢為四肢拘急痿緩振掉為怪夢紛紜不可思議世稱人有患蝨瘤者神農本草水銀有殺皮膚中蝨之文不誣也豫近治汪君初起顴上有水常如屋溜一滴並不破皮後遂右半面常自覺振動如吹大風狀一日數發已六七年發時即須尖亦手不可近觸之其痛徹心也皮色如常不腫不變內外藥治僅得小效後挑出牙蟲無數而愈平時牙並不痛此亦奇證與前貧婦之類皆所親睹者也汗病西席汪幼純先生盱人也家洪澤湖之蔣壩鎮一日為豫言吾鄉有所謂汗病者每發於三四月間一人患此即舉家傳染同時併發其證初起覺毛聳即發熱昏臥不省人事不言不動不食但口渴索飲日夜不休若家有五六病人以一人供茶水不給也至六七日必大發狂躁汗出乃愈未有藥治者若不能狂躁即不起矣此何病也豫沉思良久曰此即傷寒也必冬日天之寒風與湖之水氣相合人自口鼻吸受伏於膜原不與榮衛出入之道相觸故不即時發交夏心中陽氣當升而寒濕所伏適當其沖阻其升發之氣遂相激而成病矣西醫謂人腦氣受傷則知覺運動之靈皆失腦氣與心氣相依者也心氣為伏寒所撲與手少陰直中之傷寒相似此仲景所未言者其年冬月有異風挾水邪而至人受之者斯為病矣故每三五年而一見蓋與運氣相關也未病之先邪氣內伏必當有頭腦時或沉重隱隱痛脹心氣偶然一陳如悶之狀治法桂枝麻黃皆不合格當以小青龍加生津藥主之以中有桂枝細辛能入心宣陽而散寒水也若欲預防則先於立春之月多服桂枝湯可矣發病之時脈必沉伏不見或沉緊細數未病之先其脈必緊小不盛也此不過一時據理擬議之詞實未知汗病果何義也嗣讀千金方乃知汗病即傷寒之別名也俗每謂不可用藥須俟自愈枉死者多是敝俗已千餘年矣仲景辨脈有曰病至六七日手足三部脈皆至大煩口噤不能言其人躁擾者為欲解也情形與此符合但未明六七日間當用何藥豈束手坐待耶此病若邪重當時即發卒倒無知者即為手少陰中寒也拙注仲景辨脈此條謂其人躁擾句是眼目若無此則煩噤乃氣脫也觀此益醒肺中伏風有專寒夾溫不同肺中伏風有專寒者有夾溫者專寒是口鼻吸受風寒於內其證嗆咳不已入夜尤甚為日稍久肺氣不能清肅即挾水飲上犯面目胕腫隱見青色治之宜用溫散如桂枝茯苓乾薑細辛皆要藥也夾溫是先吸受天地亢燥之氣肺中津液為亢氣擾耗大氣出入不得滑利呼吸喘促因之表氣不充腠理不固或夜寐盜汗或勞汗當風風寒乘虛內襲遂時覺惡寒發的熱肺氣愈不得暢亢氣愈菀於中時作嗆咳遇勞即甚痰涎乾結成塊成裹氣味腥腐舌苔薄黃乾燥唇焦引飲脈象浮候弦而帶滑中沉洪大而散大便祕結小便赤澀甚至胸中腹中有一點結痛是時正當仿大青龍越婢之意以兩解之即愈矣而醫乃有意深求以為此肺癰也又不遵古肺癰治法而用桑葉桔梗連翹銀花一派苦寒沉降之品致溫燥之氣愈結愈深毫無出路嗆唾膿血而肺真腐矣當肺未壞之先挽回得法間有發為斑疹瘡瘍而愈者然而難矣其死也面白唇枯發焦目陷吾見屢矣此病近時極多醫者不可不知內經勞風一病證候與此相近巢氏風熱候正引此文是因勞倦津液內傷風溫外襲久不得出蔓延於太陽少陰之經脈以內達於臟致肺腎肺氣為之擾亂浮越所以然者正氣先傷其力不能撐邪外出也治之惟有滋助肝腎元氣宣通肺與膀胱之經氣需以時日庶有瘳乎寒濕下受直傷少陰變證多端搜治匪易自古皆謂寒傷肺濕傷脾同氣相感也展轉乃傷他經今據吾所見凡人久在濕地坐臥寒濕之氣盡從太陽少陰深入矣內經謂傷於濕者下先受之又謂清濕地氣之中人也常從足胻始況人坐則以足置地臥多以背向下故內氣充足者邪氣不遽內襲即從腨髀上竄膂脊過頂入鼻一路筋絡牽引痠疼脹急此傷於太陽之經而內連督脈也重者即菀為腳氣矣若內之真陽稍怯者邪氣即從湧泉上入脛骨而內侵腰俞背俞先使腎陽不得下降大便溏滑小便赤澀兩脛時冷漸漸瀰漫三焦心胃之陽又為所抑矣甚者即水氣凌心也其始筋骨酸脹精神猥軟呼吸氣高兩腿沉重治之必仿少陰傷寒治法而加以溫行濕邪之品方能奏效若僅治中焦藥力不能與邪針對無益也若見其上熱誤認為熱而以寒涼澆灌其禍更不堪言仲景辨脈篇清邪中上濁邪中下一條即此病之久延敗證也前人指為瘟疫者非是拙著章句論之甚詳靈樞曰厥逆者寒濕之起也又曰厥成為癲疾金匱婦人篇中有曰因虛積冷結氣在下奄忽眩冒狀如厥癲其敘痙證也亦有面赤足冷目脈赤背反張之候是痙厥初起皆由寒濕下受上入脊膂腎陽不得下降上衝於心兩陽相搏於膻中治不得法積之日久遂有熱痰膠固不可拔之癇證矣嗣後飲食驚恐風寒暑濕有感即發醫者以為病在於心專用牛黃犀角以清心熱祛心痰心氣愈虛而邪愈痼殊不知此寒濕下受之邪太陽少陰之來路也千金方謂小續命為癲癇要藥即此義矣陶節庵槌法有曰病始得之無熱譫語煩躁不安精采不與人相當諸證皆氣高不下神明上越之象為寒濕從下衝激也庸醫不識呼為狂發殊不知此熱結膀胱之證也用桂苓散即五苓加味石頑老人亦謂五苓散能分水去濕胸中有停飲及小兒吐哯欲作癇者五苓散最妙此皆寒濕痼於下焦大氣遏痹不舒之所致也熱結膀胱者邪氣外束故也何子詹之子媳有孕患自兩足跟上腓腸入髀臀腰脊過項上頂復前至於鼻一路皆脹急痠疼四肢懶怠腰軟不支脈六部沉緊右手重按略滑此胎氣也其病乃寒濕傷於太陽內連督脈用細辛五分羌活二錢藁本威靈仙各錢半菟絲子桑寄生巴戟狗脊白朮杜仲茯苓牛膝各二錢決以三劑知五劑已果驗其苦如脫夫辛羌威藁牛膝號稱傷胎今既有病當之又加強筋固氣之品以佐之不但能防其偏而且能助其力故病愈而治無傷也若用參耆歸地便有妨寒濕而諸味不得展其長矣何子詹之孫三歲先於七月患濕瘡漸愈矣微見溏泄忽半夜發熱日出始退次日依時而至醫遂以為瘧忽又大聲驚喊目瞪昏厥旋覆如常醫又以為驚風更以危言嚇之越數日乃邀診至則見其精神萎頓面色慘黯目胞下垂四肢胕腫而左尤甚頭面亦右溫左涼舌苔薄白在後半部脈息沉緊審思良久曰異哉此寒濕深入骨髓也疏方用桂枝良薑烏藥香附陳皮菖蒲服四劑病無增損而萎頓彌甚然脈息浮弦矣因思邪從下上犯此藥僅溫理中焦宜無益也於是用細辛川芎各五分羌活藁本威靈仙生附子牛膝巴戟蒼朮桃仁杏仁各二錢決以三劑病已至期果面色清亮言笑有神飲食倍進胕腫全消脈息暢大矣惟肢體尚見微倦舌尖有小紅纍是虛熱也用桃仁杏仁蛤粉蒲黃略清結痰繼用香附青皮白朮雞內金川芎鬱金黨參山藥調理脾胃發水痘而復元是病也其初見發熱者是寒濕從陰分上蒸與衛陽交戰也驚喊昏厥者聲發於心寒濕內逼心陽乍掩熱痰乍湧於包絡所謂積冷在下狀如厥癲也若作瘡後驚風治之即敗矣若以子後發熱天明即止為傷食所致而概用消導亦危矣諸醫以為久病正虛須用氣血兩補其識更陋夫患濕瘡月餘而漸愈矣誰復議其寒濕內伏耶無怪血虛不能養心不能榮筋之說紛紛也水痘即豌豆瘡傷寒病後多有見陶節庵書中痘發於骨益徵寒濕在骨之非臆說耳史載之論水氣凌心諸脈證所謂水氣者非必有形之水也或外中於風寒或內傷於飲食或七情所感臟氣虛實自相乘侮皆是也夫五臟皆有中寒而入心最急古人論之矣亦有脾陽不足下焦寒盛自然心氣下陷腎氣上凌非關風寒外入者此為內虛其勢較緩而其本益深又有飲食寒冷及難化之物坐臥不動困遏中氣自損脾陽遂致水飲泛溢膈上心氣不得上升卒然心大動怔忡嘈雜嘔吐大作陰風內起二便頻泄不禁昏厥不省人事或無端自覺悽愴不樂或忽然氣悶逼迫無賴呼號求救大喘大汗腦痛如裂皆心火不揚為水所撲之驗也內經逆夏氣則秋為痎瘧冬至重病是心虛畏水之義也金匱牡瘧徐氏正如此說脈經三部動搖各各不同得病以仲夏桃花落而死此心氣受傷至次年心氣當旺之時有遇缺難過之慮也大抵風挾寒自外入者其氣猛而急濕挾寒自下犯者其氣沉而鋭史載之嘗謂人之病寒水犯心者雖治愈亦不永年此人世之大病亟宜講明者也若診脈見動而應指無力其人慘淡萎頓者凶之兆也茲將史氏所說條例如下水邪攻心氣用桂與姜壯心氣以勝之其病狂言身熱骨節疼痛面赤眼如拔而腦如脫心脈搏堅而長當病舌卷不能言凡脈之搏以有所犯而鬼氣勝之則搏心脈之搏腎邪犯之也舌卷不能言者舌固應心而舌本又少陰脈之所散也治之之法不獨涼其心而且暖行其腎涼字作瀉字說瀉即攻也心脈大滑而腎脈搏沉以汗為心液今心脈大滑則水犯之而動故汗此心氣先為寒水所遏而漸透重陰者也故脈動而有力載之有論腎寒作喘曰六脈沉重而濁渾革至如物制之此為腎寒太過也如物制之四字真為動脈傳神心脈搏滑急為心疝小急不鼓為瘕故曰診得心脈而急病名心疝少腹當有形此心氣不足血為寒邪所犯也凡脈之滑而搏者皆津液壅結之故也元氣虛弱腎氣不足膀胱氣虛衝任脈虛丈夫㿉疝婦人癃閉其脈六脈皆動細數而輕弦腎脈小擊而沉膀胱澀而短此二節皆寒濕久結心氣漸為所抑者也元氣虛乏腎水極寒發為寒戰冷汗自出六脈微細而沉寒邪犯心則腎脈必擊而沉心下大動不安甚則仆倒宜先暖其腎後保其心此心氣虛而卒乘之者也內經脈喘而堅積氣在中時害於食名曰心痹得之外疾思慮而心虛故邪從之故勞心太過者火衰而水易乘之也濕氣寒氣之勝同犯於心心氣上行不得小便腎水之勝凌犯於心經言心氣上行痛留眉頂間甚則延及胸頭痛腦戶間痛宜暖其腎寒邪犯心血氣內變傷損於中因而下注赤白此病世之罕有蓋傷犯人之極也其證發熱如火頭身俱痛色如紫草汁如膠涎如茶腳不急治之殺人反掌毒痢傷人不一惟水邪犯心最重凡人初患痢先發寒熱頭痛即是寒邪犯心此專就痢疾辨之即所謂下利身熱者也案上列諸證有緩有急有輕有重其脈有微細有弦緊有搏大滑動大抵邪淺犯於心氣運行之部而內感於心者其始邪在氣分則脈弦滑日久邪入血分則脈細緊矣若大邪直中心之本經而內犯於臟其乘心虛而侵之者脈多細澀其心氣實而強遏之者脈多搏大滑動也備臚諸證而不及悲傷不樂者悲傷不樂寒燥之輕邪也和解法說與少陽三禁篇參看和解者合汗下之法而緩用之者也傷寒以小柴胡為和解之方後人不求和解之義囫圇讀過隨口稱道昧者更以果子藥當之竊思凡用和解之法者必其邪氣之極雜者也寒者熱者燥者濕者結於一處而不得通則宜開其結而解之升者降者斂者散者積於一偏而不相洽則宜平其積而和之故方中往往寒熱並用燥濕並用升降斂散並用非雜亂而無法也正法之至妙也揆其大旨總是緩撐微降之法居多緩撐則結者解微降則偏者和矣且撐正以活其降之機降正以助其撐之力何者雜合之邪之交紐而不已也其氣必鬱而多逆故開鬱降逆即是和解無汗下之用而隱寓汗下之旨矣若但清降之則清降而已耳非和解也但疏散之則疏散而已耳非和解也和解之方多是偶方復方即或間有奇方亦方之大者也何者以其有相反而相用者也相反者寒與熱也燥與濕也升與降也斂與散也血痹瘧母合論金匱論血痹曰尊榮人骨弱肌豐盛重因疲勞汗出而臥不時動搖如被微風遂得之此即內經所謂厥逆顛疾僕擊偏枯肥貴人則膏粱之疾也蓋尊榮肥盛是素木氣虛血滯之質矣疲勞汗出則氣傷津耗氣不足以運血津不足以載血矣而又繼以坐臥不動加被微風血行遂不得反其故道而為之凝澀矣凡氣怯津虛之人忽遇勞倦即氣血沸騰旋覆靜息即氣血澄凝忽駛忽停失其常度即不得反其故道而瘀痹作矣尊榮豐盛不過為氣虛血滯立影其實農工力食之人年歲稍高即多此證為其汗出衣薄風寒屢襲而不已也瘧疾日久多成瘧母者即血之所積而痹也大寒大熱二氣迭乘寒至即周身血液為之結澀熱至即周身血液為之奔駛脈絡之中必有推蕩不盡之渣滓前血未淨續來之血行至此處必有所掛積之日久而癥塊成矣此即血痹之機括也但血痹之證散在周身脈絡之中而瘧母則結聚於內膜之一處要其痹皆在經脈絡膜而不在腸胃故治之總宜紅花䗪蟲曲折搜剔不宜大黃芒硝之直下而迅掃也吾每於力食之人患偏廢注痛者率以補氣破血施之瘧母則兼化冷痰其奏效皆甚捷此即從仲景鱉甲䗪蟲抵當化瘀諸方中來中風有陰虛陽虛兩大綱中風者人間第一大病也而金匱論之甚簡吾初亦怪仲景之太率略矣細考其義乃知察脈審證施治之法已提綱挈領而無遺也後世論中風者分中經中腑而口歪眼斜流涎吐沫偏枯不遂四肢拘急痿軟癱瘓呼吸喘促統列為中風之證中臟而不辨其陰陽虛實也大秦艽湯排風湯八風湯續命湯諸方統列為治中風之方而亦不辨其陰陽虛實也河間以為火東垣以為氣虛丹溪以為濕熱生痰未有辨別陰虛陽虛者所立之方終未有出小續命之範圍者也王節齊始暢發陰虛之論葉天士始重講陰虛之治一洗前人慣用辛燥之習而又遺陽虛一層矣後靜讀金匱脈遲而緊是陽虛之寒證也其下系以口眼歪斜四肢拘急口吐涎沫諸證脈遲而緩是陰虛之熱證也其下系以心氣不足胸滿短氣緩縱不收之證黃連瀉心湯治心氣不足吐血者義與此同前人所稱邪盛為真中風者其所指之證即皆在陽虛挾寒之條者也所稱正虛為類中風者其所指之證即皆在陰虛生燥之條者也故知陰虛陽虛為中風兩大關鍵而真之與類正無庸瑣瑣也何者二證之本皆由正氣大虛轉運之權無以自主而猝為時令升降斂散之氣所變亂以失其常度也陽虛者遇寒冷之令其陽氣不勝天氣之斂抑故多病於秋冬陰虛者遇溫熱之令其陰氣不勝天氣之發越故多病於春夏挾寒者氣內結多現外感之象世遂以為真中矣挾溫者氣外泄多現內虛之象世遂以為類中矣治之之法虛有微甚即藥有重輕不待言也所尤當辨者陽虛有陰盛有陰不盛陰虛有陽盛有陽不盛陰盛者為寒冷治之以重熱陰不盛為寒燥治之以溫潤陽盛者為燥熱治之以涼潤陽不盛為虛燥亦治之以溫潤也大抵陽虛之治藥取其氣氣重在辛陰虛之治藥取其味味重在酸而總須重佐之以活血何者陽虛血必凝非此無以撥其機陰虛血必滯非此無以通其道也或曰氣既虛矣而復活其血不速之脫乎曰固其氣則不脫矣且活血者正以疏其機關為氣之脫者闢歸之之路也西醫謂病此者腦中有水或有死血殊不知水者陽衰而水凌也死血者陰虛而血沸也皆中氣暴亂激之以至腦也上古之世所謂真中必感異風猝傷腦氣以致仆倒稍延即內變五臟而不治矣其證不數見故仲景不論也華他中藏經巢氏病源候論中有灸法宜並考之虛勞損極有內因外因兩大綱虛勞損極統謂之勞內經論之詳矣其緒旁見側出令人難尋惟四烏鰂骨一䕡茹丸一方純從血分攻補實開千古治勞之妙訣難經剖析損至脈證傳變補內經所未至仲景則治法大備矣小建中湯治勞之初起也復脈湯治病後之陰虛不復也薯蕷丸治久病大虛純補之劑也大黃䗪蟲丸治久病血痹通脈生新之劑也其義即發原於四烏鰂骨一䕡茹丸諸方或攻或補莫不從血分講求手法蓋勞病乃先因氣虛久之氣不能運血衛陽內陷津液又為所燔灼血行不能滑利而因之瘀痹矣東坦立補中益氣湯是杜漸防微之意非正治之法也後世不明此義以參耆為補虛治勞之藥往往氣壅不利遂以為不受補矣又或重任桂附而覺燥熱遂以為不受溫矣不但此也人世真勞病少假勞病多吳師朗曾著不居集辨之風寒咳嗽飲食停滯誤治以致吐血因吐血而即用涼潤遂逼入勞門矣此等病治法更宜重用溫散於攻血藥中為其風寒邪氣為藥所逼固結於血分也近醫只用清涼澆灌枉死纍纍真可憫也讀張石頑勞損門治案悉仿烏鰂䗪蟲之義攻令便血吐血使瘀盡而病除又有用辛溫透表之法使汗出而邪盡真開千餘年之矇昧而上接仲景真傳者也私嘗綜核此病原委凡由勞倦憂思內因而起者亦必兼挾外邪以正氣內陷外邪即相隨而入也其脈多弦芤或緊澀治宜補正而兼去邪攻血以開結塞生津以活脈絡疏氣以鼓陽撐邪補血以安中潤下命門火虧者兼用補火脾肺氣虛者略兼補氣猶且不可重用補氣驟用補火更斷斷乎不可破氣也豫每用溫散發表之藥與沉鋭攻血之藥以開其絡而鼓其氣佐以生津使之脈絡滑利佐以補火使之元氣溫固即補氣且少用矣況破氣之降泄乎況寒涼清肅之撲滅元陽乎凡由風寒暑濕外因而漸致者其脈多緊細或弦滑重用溫里發表以鼓陽撐邪攻血理氣以開結降濁不但補血降氣不可妄用即生津補火且不可濫施何者其人陽氣素弱者至此必水飲內結其人陽氣素盛者至此必濕熱內菀水結者宜重宣散熱菀者宜兼涼泄故生津補火二者皆微有不合也至於用藥之法甘酸者可取味而苦辛者必取氣氣走而味守也內因之治宜走守並用外因之治宜重用走若苦辛用味味厚不走恐苦積而化燥辛積而化熱故連柏薑桂皆慎用之其羌活藁本細辛威靈仙防風薄荷三稜莪朮薑黃鬱金虻䗪蠐螬之屬能散邪氣而不破正氣能攻瘀血而又不壞新血皆治勞之要品也況近日外因勞病多是寒濕下受上入少陰腎經命門真火為邪氣衝越不得歸根漸見上熱下痿喘促泄泄夢魘鬼交其脈形尺中動弱或弦澀諸品尤為救命仙芝矣脈經曰沉而滑為下重亦為背膂痛即此脈此病也是理也不但市醫無從夢見即高明博雅之士一聞此說亦不免胡盧醫法之失傳豈一日耶篇中所敘要品諸藥非謂專以諸藥成方也謂此乃治病之正藥當與補虛之藥並用為佐使也世人於此病只認定一虛字全不推求所以致虛之故無怪熟地當歸人參白朮龜板鱉甲豬髓羊腎日日貪餌至死不悟若夫真正虛損不挾外邪者無論先天不足後天戕賊皆以金石之精血肉之華為填補妙品今人不敢用金石而血肉不但取渣滓間或偶用金石亦屬鍛鍊太過精氣全銷只能傷人不能益人矣況不對證其禍更烈此正調所以絶響而沉疴永無救挽之期也豫身患此以重用石藥得延殘喘而韓飛霞自謂餌鹿䘒以補先天缺陷其效彰彰此治真虛之法也虛損病中之萬一耳此外又有傳尸鬼注世稱勞瘵此乃䘌蝕怪證不在虛勞之列其治法須重用殺蟲攻血亦不在虛勞治法之中別出可也瘧疾肝體壞外證西醫謂人以瘧死者其肝體每大於常人二三倍故病瘧者摸試肝大即不治矣夫肝大者寒濕盛而血瘀之故也寒濕內盛又以逐日之忽寒忽熱血行一駛一澄度數失常遂致瘀結矣西醫以為此即中醫所謂瘧母其實非也瘧母不得為死證且其部位多在兩乳開下與肝位甚遠竊以為肝大者其外必有腰脅脹痛不能轉側之證仲景曰肝中風者頭目瞤兩脅痛行常傴令人嗜甘如阻婦狀又曰肝水者其腹大不能自轉側脅下腹痛時時津液微生小便續通蓋肝之體後近於脊下藏於季脅一經脹大便僵痛不能俯仰轉側矣甚則腰不能伸而行傴矣其敗也上下氣絶下為大便滑泄注液五色小便膿血膏脂時時欲起煩躁不寧少腹拘急不仁兩肋骨如毆傷脅內脹極欲人重按其上膝脛時時轉筋神昏譫語嘔噦不納水穀目直欲脫不能見人唇鼻青慘或面色紫濁脈象牢堅硬如鐵箸如此者預之短期矣所謂摸試者揣其季脅空軟之處其內堅硬脹急即是也吾得此義凡治瘧疾必問其未發之先與既止之後腰脅脹痛不轉是肝體已大矣若正發之時腰脅脹痛瘧止即愈者是血尚未壞即預加行血藥於劑中以疏之往往默收奇效時人不知用藥之義有指為怪僻支離者富貴貧賤攻補異宜其說有辨前人皆謂富貴之病利用補貧賤之人利用攻初未臨診之時亦深以此語為數乃至今而覺其非也富貴之人安居厚奉臟腑經絡莫不痰涎膠固氣機凝滯不能流通故邪氣據之而不得去者非正氣之不足乃正氣之不運也治之宜重用攻散且氣血充裕能任攻散者正此輩也若重之以補是益之滯矣貧賤之人藜藿不充敗絮不暖四時力作汗液常泄榮虛衛散經脈枯槁及至有病初起隱忍勞役不輟勢至重困乃始求醫故其邪氣之不去者非正氣之不運實正氣之不足也治之須助正氣正氣一充其氣機之流利自能鼓舞驅邪非似富貴安逸者之氣滯必待重施攻散也吾每診貧賤力食之人病脈或粗大挺硬或短弱細微起伏總是無力應指總是少神求似富貴之脈之洪滑搏結者殊不多覯也蓋富病屬氣血之鬱滯貧病屬氣血之匱乏若謂筋骨柔脆與堅強之不同也此在無病時則然耳每治貧病佐以參朮歸地其效甚捷此無他故也地瘠者易為溉氣滑者易為滋也內經曰形苦志樂病生於筋治之以尉引是溫助其氣而運之形已苦者不得復開泄也形樂志樂病生於肉治之以針石形樂志苦病生於脈治之以灸刺是形樂者皆有血實決之之義也若攻苦之士家徒四壁謀道謀食百計經營此又不得與膏粱酣豢者同論矣故形苦志苦病生於困竭治之以甘藥謂表裡榮衛俱不足也形苦宜補形樂宜瀉不校然可睹耶病後調補須兼散氣破血東垣謂參術補脾非以防風白芷行之則補藥之力不能到慎齊謂調理脾胃須加羌活以散肝結此皆發表散氣之品也是能運補藥之力於周身又能開通三焦與經絡之滯氣也此外尚有川芎烏藥香附降香白檀香鬱金皆可選用以皆芳香有通氣之功也防風秦艽尤為散中之潤若味辛者不可混用味辛則燥能耗津液矣滑伯仁謂每加行血藥於補劑中其效倍捷行血之藥如紅花桃仁茜草歸鬚茺蔚子三稜莪朮之屬皆是也葉天士亦謂熱病用涼藥須佐以活血之品始不致有冰伏之虞蓋凡大寒大熱病後脈絡之中必有推蕩不盡之瘀血若不驅除新生之血不能流通元氣終不能復甚有傳為勞損者又有久病氣虛痰涎結於腸胃此宜加滌痰之品如蔞皮焦楂蒲黃刺蒺藜煅牡蠣海蛤粉海浮石青黛煅石膏皆可隨寒熱而施之行血之藥以水蛭為上虻蟲䗪蟲蠐螬次之壞痰之藥以硼砂為上礞石皂莢次之今人已不敢用矣痰本血液非津水之類也世以茯苓澤瀉利之血屬有形瘀積膜絡曲折之處非潛搜默剔不濟也世以大黃芒硝下之大謬著有痰飲分治說仲景抵當湯丸解具在集中可以互覽病在腸胃三焦大氣流行空虛之部與淫溢惉滯經脈膜絡曲折深隱之部其治不同虞天民曰水腫之病因脾土氣虛肝木氣逆而水濕妄行也雖有停痰留飲實無鬱積脫固故參術為君佐以清金利濕去熱即有十全之功彼黃腫者或酒疸或谷疸沉積頑痰膠固鬱結於中土氣外溢而黃也故以蒼朮厚朴香附陳皮之類以平土氣之敦阜鐵粉青皮之類以平木氣之橫逆加以麴櫱助脾消積黃退之後再用參術以收全功此標而本之之治也若二病互易而治禍不旋踵胡玉海曰傷寒至舌苔黑邪氣已入太陰可更衣散下之服之或一周時大便無有不解者如服到解而不解之時肝臟已無黏滯毒盡歸於闌門可即用大黃下之何則人之真陰藏於肝大黃為脾經之藥必待毒不沾連於肝方可用之如此分其先後則真陰不傷元氣易復也按此必先用甘寒生津活血之劑清血分之熱使熱毒浮載於空分乃可隨渣滓而俱下也若毒在血脈而攻其腸胃則津氣俱傷血分之菀毒愈滯著無出路矣肝即血分也脾即腸胃也上二條即氣分血分之辨也病在氣分與在血分其治自不可混在氣分者其邪氣虛懸無所滯著可以徑汗徑下邪氣即隨汗下血出若浸淫於脈絡曲折之處惉滯不能流通則必須提出歸於氣分然後可以盡之而不可徑行迅掃也其所以提歸氣分之法有用緩緩撐托之法屢使微汗以漸達於表有用滋血生津之法使津液充盈浮載邪氣於表然後一汗而盡之有用輕輕攻下之法屢使腸胃清空膜絡邪氣逐節卸入腸胃以漸而淨又有用酸澀收斂之品於大黃芒硝牽牛巴豆之劑中使腸胃四維膜絡之邪舉吸攝出於空中隨渣滓而俱下也有用補血益氣之法以運之有用破血化瘀之法以搜之仲景以承氣治燥屎以抵當治蓄血痘疹家謂用紅花紫草使血分鬆動而易透出其義大可思也向來邪氣入臟入腑之說腑臟即氣血之別名也析而言之有經絡之氣血有臟腑之氣血在經絡之氣分為寒熱走注在經絡之血分為疼痛麻木在腑其神志清明在臟其神明昏憒也夫邪氣漬入血分與血液合為一體是血液之質必壞矣治之必通泄其既壞之血液或有黃臭汗出在經絡者或下汙穢雜汁在臟腑者皆外邪之變亂血液也若內傷之病血液自壞或為乾結外為枯痿內為血痹或為濕腐外為癰疽內為五液注下或為泛溢血化為水變見腑腫即血分水分是也在經絡猶有可治在臟者新血無從生即敗血無從去矣總由氣分之菀結太深太久濁氣無所泄故也治之必用前節托補諸法使邪能撐出氣分方有殺冀蓋血分之病總以氣分為出路也身中腹中一股熱氣衝動者有虛實二因朱丹溪曰人有氣如火從腳下起入腹者此虛極也火起九泉之下此病十不救一治法以四物加降火藥服之外以附子末津調貼湧泉以引火下行虞天民曰此證果系勞怯之人固從陰虛法治之矣若壯實之人有此則濕鬱成熱之候也豫嘗冒雨徒行衣濕得此證以蒼朮黃柏加防己牛膝等藥作丸服之而愈後纍治數人皆效誤作陰虛即成痿證死矣竊維臨診以來每見患寒濕之證如筋骨疼痛四肢困軟咳嗽哮喘者多自言有一股熱氣從臍處上衝繞背入心或言有熱氣從腳心上衝少腹或上衝腨髀入於脊膂更有直上腦面者莫不自以為熱求用涼潤滋陰之劑豫概置不顧只照寒濕本證再加入羌活白芷細辛藁本威靈仙生附子在腳心者加牛膝苡仁又佐以菖蒲茜草鬱金薑黃降香三稜莪朮活血之品即吐血咳喘證似勞怯者亦皆酌用此法無不應乎取效可見此證總由寒濕滿布經絡衛氣不能暢達而錯道以入於脈中或抑遏於皮裡膜外夾縫之處隨左升右降之大氣而轉旋也其自覺大熱者固由此處之郁久熱性太過亦因體中寒濕氣盛真陽已減遂映之而倍覺其熱也其從臍上衝者臍乃小腸之部人之飲食必待入小腸始能化精氣以行脈中化悍氣以行脈外氣管血管皆由小腸上達心肺而內通臟腑外布周身今寒客於小腸之脈外玄府閉塞飲食新化之熱氣不能勻布三焦五經並行而湧溢於脈中遂覺熱盛於常矣故其熱之起也多在食遠或天明陽氣上升之時不似陰虛陽亢者必發於日晡也胸中多煩悶四肢多惡寒無力又不似陰虛陽亢者之煩躁不安神氣浮越也前賢論此者丹溪家以為陰虛陽亢東垣家以為陽氣下陷未有指為寒濕者而歷數生平所治又無一不是寒濕心竊疑之久矣得虞氏此論為之一快纍治皆效之語信不誣也五臟內傷外應見證凡表邪之傷於外者只以邪氣所傷之部位論之不必內動臟氣也即令病久臟氣亦為擾纍要總以邪氣所傷之部為主病在何部即證見何部無難察識也惟臟氣內傷病隱於內證見於外各有定象察之不真每易混淆何者五臟外應之候每多相似難於拘泥況又有兼臟之互相出入故辨之不可不預也茲撮其要約有數端一在經絡所行之部如太陽少陰行身之後陽明太陰行身之前少陽厥陰行身之側是也一在氣化所充之部如脾主四肢與唇肺主鼻與肩背肝主宗筋乳頭與目腎主二陰腰脊與耳心主面與舌是也一見於臟氣之功用如肝主疏泄心主神明肺主出氣腎主納氣脾主中焦升降諸氣是也一見於臟氣所主之體如肝主筋心主脈脾主肉肺主皮毛腎主骨是也一見於色與色之部色即肝青心赤脾黃肺白腎黑之五色部即心額腎頤脾鼻準肺右頰肝左頰及靈樞所敘面之色部是也以此數者互合考之病之所在當無遁矣但其中尤以臟氣之功用為主經所謂省察病機無失氣宜也察其前後數日證象之遞變者其機屬於何臟即可瞭然病之所屬矣凡五臟真氣自病未有不相乘克者如肝病克脾或脾虛為肝所乘莫不先病之臟其證先見後病之臟其證後見內經曰腎乘心心先病腎為應色皆如是此之謂也故察外感者必明五行之性情與其功用之常變也察內傷者必明五臟之性情與其功用之常變也論痙不當以剛柔分虛實朱丹溪謂前人以剛柔二痙分屬風濕者非也當以虛實分之剛痙屬外感宜栝蔞桂枝葛根湯及承氣湯之類柔痙屬內傷宜四物八物補中益氣之類愚按此明暗參半之論也剛柔二痙皆屬於實其虛痙乃別一證不得以柔痙當之蓋有風寒之痙有濕熱之痙有産後之痙有熱病之痙風寒之痙是風寒凝滯津液筋脈不能濡潤舒緩寒性收引故拘急也濕熱之痙者即內經所謂濕熱不攘大筋痙短小筋弛長痙短為拘弛長為痿者也産後之痙雖由血虛亦由風寒若不傷風寒者即血虛不能成痙故風寒之痙有剛有柔寒盛為剛風盛而內熱即為柔也濕熱之痙有柔無剛二者體各不同同歸於實惟熱病之痙靈樞熱病篇曰熱而痙者腰折瘛瘲口噤齒齗也此則津枯血敗筋無所養之敗證也謂之虛痙而何有剛柔之辨耶徐靈胎謂痙為傷寒壞病仲景諸方未嘗一效是不知剛柔二痙之病情而並不知虛痙之治法也風寒之痙屬於太陽即産後風寒亦太陽也桂枝葛根主之産後佐以養血可矣濕熱之痙與熱病之痙有屬於陽明內實者承氣主之其熱病之屬於厥陰者是腎水枯而肝風逆亂也四物尚不對證豈仲景實證諸方可施者乎擬大劑生地少加桃仁擂漿沖服或再加防風仲景豬膚湯法亦可用夫虛實者以體氣言也剛柔者以病形言也剛柔二字只以分風寒濕熱之輕重若細求之即剛痙亦何嘗不由津氣之不足津充氣旺即風寒深入亦何至成痙耶痙有寒濕外束陽氣內伏而然者脈緊無汗是也有寒濕下衝陽氣上格而然者面赤足冷是也其證頗與腳氣相類腳氣有衝心者是寒濕由下從氣化而上衝於裡此乃循經絡而上衝於表也上下之升降既格表裡之噓吸亦閉而大氣膹鬱於脈中矣故脈伏而堅直也脈沉細者陽氣內伏也脈浛浛如蛇腹暴脹大為欲解者必其脈由沉細變見粗長而軟是濕中生熱有溫潤之意津液漸見流通陽氣之機撥動與寒濕戰於中焦故相激而為腹脹也此乃剛痙由陰化陽之轉關也與柔痙無涉與虛痙更無涉仲景論列痙證多條並不執定剛柔二字讀者須就各條研究其義不可專以剛柔二字橫住胸中夫病痙者其人平日必濕重而氣滯或血燥而氣澀也平日已有不能運化津液濡養筋脈之勢及風寒傷之無汗而津愈凝矣風溫傷之多汗而津愈耗矣此初起病即見痙者也大致一緩不復痙者為輕時緩時急一日數見者為重在經與入里之分也發熱二三日而痙者如未見汗筋骨疼痛仍即剛痙也已見汗有陽明內實證者仍即柔痙也病久而痙表裡證俱不見者氣敗而津枯血燥之死證也其證必時緩時急時迷時醒蓋凡痙者多兼見厥痙之實者昏迷反甚而口開手緊痙之虛者譫妄無常而口開手撒如中風絶證也中風有見痙者有不見痙者痙有因風者有不因風者前人或以痙即中風者亦謬也又有身俯不抑四肢蜷曲頭膝相抵者在新感為邪中陽明在久病為陽明虛竭陽明為氣血之海而五臟六腑之所稟也困敗如此臟腑何所稟而活耶較之反張上竄者尤為難治而其死尤速也黃疸黑疸黃之為色血與水和雜而然也人身血管液管相副而行不相淆亂者各有管以束之也血分濕熱熏蒸肌理緩縱脈管遂弛而不密血遂滲出與液相雜映於膚泄於汗而莫不黃故治之法或汗或下必以苦寒清燥佐入行瘀之品為攝血分之濕熱而宣泄之也濕熱去則脈管復堅血液各返其道而清濁分矣陰黃者以其本體內寒也虛陽外菀與濕相搏肌肉腠理之間仍自濕熱非寒能成黃也陽黃色深厚者熱盛則津液蒸腐化為黃黏之汁與血相映故色厚也陰黃色暗淡者無根之熱不能蒸腐津液盡化稠黏而水多於血故色淡也夫血之所以旁滲者以血既為濕所停凝而前行有滯氣又為熱所逼迫而橫擠有力加以肌理鬆弛而血因之旁滲矣蓄血發黃亦此理也內經謂疸成為消中濕熱菀久而化燥火也亦有消成為疸者燥火得涼潤滋清之劑已殺其勢未淨其根余焰內灼轉為濕熱也黑疸乃女勞疸谷疸酒疸日久而成是腎虛燥而脾濕熱之所致也腎惡燥而脾惡濕腎燥必急需他臟之水精以分潤之適值脾濕有餘遂直吸受之而不覺並其濕熱之毒而亦吸入矣脾腎濁氣淫溢經脈逐日飲食之新精亦皆為濁氣所變亂全無清氣挹注周身血管不得吐故納新遂發為晦暗之黑色矣第微有辨焉其腎水不甚虛而脾胃自虛濁氣下溜者病在中焦為易治也其色黑而浮潤腎水虛甚吸受脾之濁氣如油入面深不可拔病在下焦其色黑而沉滯治中焦者清胃疏肝滋腎利水即小柴胡茵陳五苓是也陰黃者黃連枳實諸理中湯主之治下焦者滋腎補肺不得清胃更不得利水滋腎丸大補陰丸加參耆可也必待肺氣已充腎陰已復始從清胃利水若陰黃者茵陳四逆主之總須兼用化血之品一二味如桃仁紅花茜草丹參之類為其已壞之血不能復還原質必須化之而後無礙於新血之流行也注冬前人有陰虛注夏之說余又創陽虛注秋之說近察人間之病似有可名注冬者常見有人每交冬令即氣急痰多咳嗽喘促不能見風不能正眠五更以後即須危坐面色蒼黃顴頰浮腫腿痠背脹舉動不便飲食二便如常亦可赤澀溏泄春分漸暖始漸平愈此乃脾腎之陽兩虛腎中水邪上溢於肺脾中濕邪下溜於腎上下濕熱濁陰瀰漫肝陽疏泄宣發之性抑鬱而不得舒其人目胞浮而似腫者脾氣滯也目光露努而少神者肝氣滯也故必待木氣得令許久肝氣始能升舉始能泄腎邪而醒脾陽與內經秋傷於濕冬生咳嗽之證相似然傷濕為新病此乃逐年如此至時即發形同痼疾得不謂之注冬乎朱丹溪謂逐年入冬即患咳喘者時令之寒束其內熱也先於秋月泄去內熱使寒至無熱可包則不發喘九即此證也第泄熱之說猶有可議者此證雖因內有濕熱實因陽氣虛弱寒濕在表三焦不得宣通始蘊蓄而成痰熱也雖無表證實由表邪治法當以苦淡清其里辛溫疏其表苦淡如二妙散胃苓湯之屬辛溫如荊防敗毒散沖和湯之屬古用越婢半夏湯麻黃石膏並用最為有義若年深歲久痰涎膠固寒濕深刺筋骨者更非海浮石海蛤粉瓦愣子煅牡蠣焦楂桃仁赭石礞石不能滌其痰非細辛羌活白芷葛根諸品不能攻其表非黃柏側柏膽草柴胡苦參大苦大寒不能泄其濁而堅基且宜先於夏月乘陽氣宣發之令預為加減多服使筋骨腠理無有留邪腸胃三焦無有伏濕則陰邪下泄真陽外充膻中泰然百體俱適矣其補藥止宜菟絲杜仲牡蠣海螵蛸苦堅鹹溫鎮固腎氣不宜薑桂辛烈灼陰也更不宜承氣陷胸重泄脾腎真氣也若以蘇杏降氣則伐氣而上虛耆術補脾則助邪而中滿食填太陰證似結胸似溫毒似陰虛凡生冷堅硬難化之物過食停於胃脘以致發熱氣喘胸口結痛拒按大便祕結有五六日十餘日不動者全似結胸而斷不可以大小陷胸法治也陷胸是因誤下邪氣內陷與內痰相裹此乃初起即見結痛是有形之物阻塞氣化非氣化壅結也若依陷胸治之洞腸穿胃形氣俱傷矣其證兩側頭痛是食阻少陽之生氣也舌苔或白厚或黃厚而上覆以黑是胃脘之血為冷食所逼而停凝也舌尖起小紅粟纍纍甚則紫黑延及兩邊心熱如焚口乾索水而不欲咽是胃陽不能斡運而上越又挾有死血也故小兒傷食寒熱病愈後多有吐血數口及下血一二次者此也凡寒熱證及內癰證多挾死血也三五日有飲水無度者是宿食蒸腐化熱也此時遍身悗熱神識昏迷胸高氣粗若誤作溫毒治以涼解陽氣泄傷食轉不化而洞下矣亦有肢冷額熱困倦無力呼吸不續自汗盜汗者若誤作陰虛治以滋補中氣愈郁痞滿愈甚甚者化為腸癰胃癰積為肺癰輕亦傳為痢疾矣此病陽明胃腑形氣俱困太陰肺臟氣化大傷更有先傷他物未及消化旋又加以生硬者其勢尤重是胃之上下脘俱困矣治之失法死生反掌故東垣首競競於此也近時小兒最多此證或當風乳食或谷果雜下其初起身忽大熱面頰尤甚腹痛夭糾旋變寒熱往來入夜即熱五更為甚天明即止額與手心常熱爪尖時冷肚腹膨脹漸見胸高氣急鶩溏不暢或先水瀉稟賦弱者不能化熱即致洞下不起化熱者痰生於內壅肺迫心傳為驚風病家醫家以為既經泄瀉不疑有食起手則發表以虛其中氣繼則清熱以冰其胃陽久則或以為慢驚而墜痰或以為陰虛而養腎又以為氣虛而健脾補肺亦有與檳榔木香者病家畏而不服或服之而不知善其後雜投攻補而兒已胸過於頭肚大於箕不可為矣此焦楂桃仁陳皮紫菀一二劑之事耳而衆醫集議遷延無策目睹情形可笑可慨陰陽不別由於傳派不清前人每於陰虛陽陷熱鬱於內脈見沉散之證陰虛陽亢熱浮於外脈見浮洪之證陰虛陽熄內外皆寒脈見芤弦之證陽虛內陷陰為陽擾脈見緊數之證一概指為陰證與陰盛格陽寒沍於內陰盛遏陽寒錮於外之證略無分別此喻嘉言所譏為傳派不清者也倘概用附子理中四逆真武貽誤豈淺鮮哉更有口稱陰證而方用四物六味口稱陰虛而方用四逆白通者尤當會意勿致害詞夫陰虛者陽必湊之陽虛者陰必湊之此一說也陰虛者陽必無根陽虛者陰必不固此又一說也故陽虛內熱與陰虛內熱致不同也陰虛者如房室過度或用心過度陰氣消耗發為骨蒸骨髓如空小便赤澀此陰虛而陽氣因以陷之也治之必填精補血以充其陰而擎其陽宣發升舉之品只可為佐陽虛者如勞力過度汗出過多一經寧息時時灑淅惡寒內發煩渴四肢困倦筋骨酸𤺊此陽虛不能行表而內縮於陰也此時陰分亦必受傷但病起於陽治之必健脾益氣以充壯其陽生津清熱之品亦只可為佐東垣補中益氣之制為陽虛內熱設也丹溪大補陰丸之制為陰虛內熱設也二者豈可差互乎重以填精補血治陽虛必致陽愈鬱滯而不可復振重以健脾益氣治陰虛必致陰愈消灼而不可復回辨陽旺陰生陽旺未有不勝陰者其陽旺而陰生必劑中有陰藥之為引導若人參本具生津益氣之大力與肉桂附子純陽者迥別其益陰本不得謂之陽旺之功也至於真火衰歇沉陰沍寒津氣因寒不得敷布發為煩渴精血因寒不得充壯發為枯瘦渣滓因寒不得運動發為祕結以薑桂萸附補益真陽遂能蒸動津液宣化水精使五臟百脈為之充潤也此陽旺而陰始化非陽旺而陰自生也又有暴病陰盛格陽寒結於內熱浮於上煩躁狂妄譫語喘促以桂附開其下寒而虛火遂返其宅者此亦陰化非陰生也且皆以其陰盛而益陽以勝之使歸於和平非以陰少而益陽以助之也豈真有精枯血燥虛火亢炎而桂附能以獨力致陰消火者乎必用陰藥而資桂附熏蒸鼓舞之力也內經謂辛能開腠理通氣致津液其所謂致是自此而之彼非自無而之有是熏蒸鼓舞宣通敷布之謂非包涵孕育滋長增益之謂也前人措詞過當每多如此其病根總由於語欲驚人也後人習為常談漫不加察貽誤匪淺故敢正之用藥須使邪有出路吳又可謂黃連性寒不泄只能制熱不能泄實若內有實邪必資大黃以泄之否則畏大黃之峻而徒以黃連清之反將熱邪遏住內伏益深攻治益難此義甚精凡治病總宜使邪有出路宜下出者不泄之不得下也宜外出者不散之不得外也近時於溫熱證喜寒清而畏寒泄於寒濕證喜溫補而畏溫通曾聞有患痰飲者久服附子化為胕腫是不用茯苓豬苓之苦降淡滲以導邪而專益其陽陽氣充旺遂鼓激痰水四溢矣即補而不泄之過也張子和變化於汗吐下之三法以治百病蓋治病非三法不可也病去調理乃可專補補非所以治病也且出路又不可差也近時治病好用利水不拘何病皆兼利小便此誤會前人治病以小便通利為捷徑之說也嘗有患痰飲而胕腫者醫以真武五苓合與之不效余曰此因三焦陽氣不得宣通於表表氣鬱而裡氣始急也雖有痰飲並不脹滿宜以溫補合辛散不得合淡滲也治之果汗出而愈滲之是益傷其里矣當時有謂須泄虛其里使表水退返於裡以泄之而後可愈者是真殺之也前人有用此法者是邪伏里膜非在膚表也虛其腸胃俟里膜之邪復聚於腸胃然後從而竭之如吳又可所謂俟膜原熱邪復淤到胃再用下法是也蓋腫表證也為風為寒濕其證動而後喘法宜散之脹里證也為濕熱里盛脾實肝滯木鬱土中其證不待動而自喘法宜泄之腫脹兼有散之泄之未有膚腫而反泄之使陷入於裡者也發明欲補先瀉夾瀉於補之義孫真人曰凡欲服五石諸大湯丸補益者先服利湯以蕩滌腸胃痰涎蓄水也初亦贊此法之善乃今益有味乎其言也凡人服人參白朮黃耆地黃而中滿者皆為中有邪氣也蓋服此藥之人總因虛弱虛弱之人中氣不運腸胃必積有濕熱痰水格拒正氣使不流通補藥性緩守中入腹適與邪氣相值不能辟易邪氣以與正氣相接也故反助邪為患矣故凡服補益者必先重服利湯以攘闢其邪以開補藥資養之路也或間攻於補必須攻力勝於補力此非壞補藥之性也如人參白朮合檳榔厚朴用即初力大損合黃柏茯苓桃仁木香用乃分道揚鑣清濕熱以資正氣者也抑又有要焉胃中痰水不先滌去遽行健脾補氣氣力充壯將鼓激痰水四溢竄入經絡為患更大每見有服補藥反見遍身骨節疼痛或有塊大如桃李行走作痛或肢節忽然不便或皮膚一塊胕腫麻木冷痛如冰如刺如割或脈伏結不調人以為補藥將痰補住非也是補藥將痰鼓出也張石頑謂有一種肥盛多痰之人終日勞動不知困倦及靜息反困倦身痛者是勞動之時氣鼓痰行靜息即痰凝阻其氣血也夫痰飲既已竄入經絡斷不能復化精微從此敗痰流注久郁腐壞而癰痿癱緩痹痛偏枯不遂之根基此矣不知者以為補藥之禍非也不肯攻泄之禍也喻嘉言亦謂痰盛之人常須靜息使經絡之痰退返於胃乃有出路不宜貪服辛熱之劑反致激痰四潰莫由通泄也然但禁辛熱不如用苦澀沉降之劑輕輕頻服以吸攝膜絡之濁惡挾之而俱下斯胃中常時空淨而可受溫補亦不妨辛熱矣凡藥味辛麻者最能循筋而行亦最能引痰入絡也伏邪皆在膜原膜原者夾縫之處也人之一身皮里肉外皮與肉之交際有隙焉即原也膜托腹裡膜與腹之交際有隙焉即原也腸胃之體皆夾層夾層之中即原也臟腑之系形如脂膜夾層中空即原也膈盲之體橫隔中焦夾層中空莫非原也原者平野廣大之謂也故能邪伏其中不礙大氣之往來古書所謂皮中淫淫如蟲行及行痹周痹左右上下相移者皆在皮肉夾縫之中也藥力亦復不能直達其處何者藥力不過鼓正氣以攻邪今氣道寬大中雖有邪而正氣仍綽有可行之道即不必與邪氣相值矣若夫吳又可所謂瘟疫之邪盈溢膜原是邪氣自行發動與正氣相觸也猶以外皮既堅內膜亦固中道寬大疏泄維艱故有屢淤到胃屢泄始盡之法更有必俟復淤到胃方能再下之議此從里泄也葉天土治溫熱有再從里托於表之說是從外泄也故養生者只當閉密使邪勿入膜原即入膜原必待發病邪氣舒張始能攻泄當其未發邪正相避無從著力故難經謂溫病之脈行在諸經不知何經之動也各隨其所在而取之即俟其既動而後治之之義也既動則有所動之專經而可施專攻矣內經四時之傷伏氣為病皆伏於膜原也吳又可既知有膜原之事又力斥伏氣之非謂人身之中何處可客邪伏越時許久而後發耶仍未徹膜原之情形者也夫果百邪皆即傷即病是人身只有邪傷膚表之病何以有邪在膜原之病且如人之一病纍愈纍發或一年或數年不能除根者當其暫愈豈非內伏之明驗耶其所伏必不在呼吸之沖道亦必不在血氣之細絡而必在空闊無所拘束之部此即膜原是也然而邪又何以遽入膜原也曰其由皮毛入者方始中於表也必發寒熱由呼吸入者其始中於肺也必發嗆咳中於胃也必發嘔滿或以其勢微而忍之或攻之而未盡適遇勞力汗出及與房室膜原之中大氣暫虛遂攝入之而不覺矣亦有不發寒熱咳嘔而浸潤漸漬以深入者邪入膜原身中即隱隱常不自在或頭痛暈眩或身常汗出或常畏寒畏熱或驟苦氣短不能任勞或四肢少力或手心常熱或小便赤澀或大便常泄或大便常祕或飲食不消或飲食倍增或口常渴或口淡少味或舌苔倍厚或夜不成眠或多夢紛紜及其發也隨邪毒之微甚正力之強弱而變化焉寒化為溫者其陽盛也風化為泄者其陰盛也暑化為瘧者發於表也濕化為咳者發於里也更有發為痹痛身中纍纍如桃李核久不愈者有發為癮疹發於一肢一臠逐年應期即發不得斷根者嘗治此證疏表清裡展轉搜剔久而乃效以其邪在膜原不在腠理又僅發於一臠能與藥力相避故也當其既愈中氣必虛千金方論治腫脹必攻之使其人虛弱病乃可愈即此義也始表散之繼清泄之乘其外發而散之因其內留而泄之散而泄之泄而散之而邪可淨矣而其人有不虛弱者乎是又在調理之得法也常有調理之後余焰復熾諸證微發仍復間用攻泄始得淨盡者甚矣膜原之邪之不易治也瘀血內熱腹中常自覺有一段熱如湯火者此無與氣化之事也非實火內熱亦非陰虛內熱是瘀血之所為也其證口不幹而內渴消水蓋人身最熱之體莫過於血何則氣之性熱而血者氣之室也熱性之所附麗也氣之熱散而不聚其焰疏發血之熱積而獨厚其體燔灼火猶焰也血猶炭也焰熱於炭乎抑炭熱於焰也故病人或常如一陳熱湯澆狀是心虛而血下溜也又常如火從胸腹上衝於喉是肝脾郁逆而血上衝也皆仍在血所當行之道故不為泛溢外出之患又有兩肋內或當胸一道如火溫溫然有心窩中常如椒桂辛辣狀或如破皮疼脹狀喉中作血腥氣者是皆瘀血積於其處也其因或由寒熱病後或由渴極驟飲冷水或由大怒或由用力急遽或由勞後驟息或由傷食日久或由嗜食爆炙太過在婦人或由經水不盡治之必兼行瘀之品如桃仁紅花之屬或吐紫塊或下黑糞乃止若誤以為實火而用寒清以為陰虛而用滋補則瘀血益固而將成乾血證矣凡瘀血初起脈多見弦兼洪者易治渴飲者易治其中猶有生氣也短澀者難治不渴者難治以其中無生氣也如湯火上衝下溜者血雖瘀而猶行如辛辣如破皮常在其處者血已結於膜絡不得行也血行者涼化之佐以補氣血結者溫化之佐以行氣本草稱三稜能消刀柄亦甚言其能化無氣之血塊也勞傷陽虛發熱前人多言陰虛發熱罕言陽虛發熱者惟東垣曾力辨之夫勞傷陽虛者大勞大汗及強力入房汗出如浴陽氣內竭即亡陽之例也發為表熱粗看與外感無別若兼外感更難別矣頭面胸腹燔灼如火自覺心中如焚又與溫病相似治法卻與外感與溫病毫不相涉若或差誤死在頃刻輕者亦不出五日七日也其辨別處處感脈必弦緊溫病脈必洪大上湧有力勞傷脈必遲弱無力或浮虛而促或沉細而疾或斷而漉漉如珠或澀而參伍不調或應指即回而無勢或軟長圓淨而無暈外感四肢俱熱勞傷兩足必冷不能甚熱溫病以手按皮膚上必久而愈熱勞傷久按反覺冷氣侵入外感熱盛必煩躁氣粗勞傷氣平身靜不能轉側溫病內熱必全腹上下皆熱勞傷只熱在心中是陽氣離根而上結於此也溫病內熱必渴而索飲無厭勞傷口乾索水不欲飲飲亦不多外感舌苔先白而轉黃溫病舌苔先或白或黃而轉黑乾燥生刺勞傷或舌白苔薄或淡紅無苔或舌黑而潤或舌尖有紅紫黑點而舌心自淨外感溫病熱盛面色必赤勞傷面色不赤或兩顴浮紅而額上晦暗外感溫病熱盛必昏惑譫妄手足躁擾勞傷神識清明但臥而身重難動睡中呢喃一二句而聲息甚微如上諸象即不全見總有二三處可辨若舌微強短及言談委婉詳盡異於平日者此真氣已離神丹莫救矣治之先宜微酸入溫補劑中斂陽歸根有外感者俟中氣有權發見躁擾之象再以補中加散可也其中又有夾食夾血夾痰夾濕夾郁之辨更有兼陰虛者並宜兼顧若素有痞塊尤難措手誤用白虎三黃及犀角地黃但一入口即心氣衰息口不能言萬無挽回之策若外感重而勞傷輕者即陶節庵所謂勞力傷寒也與虛人病感皆散中加補可已末病尤當治本凡病偏著於一處必有致病之本在於臟腑之中宜求其本而治之非可泛治也即如鼻生息肉手指麻木脹痛症雖見於極杪根乃發於至深何則以其氣行於專經而不旁及也若外邪所傷豈能如是之專乎亦有外邪傷於專部而為病者此必滯入血脈發為腫痛則有之若氣分之病而偏著不移久而不愈或時愈時發者未有不根於內者也或邪氣由臟腑而溢於本經或臟腑不足以致經氣不充而邪氣乘虛中之也各視兼證以辨虛實而治之凡由內臟外溢者大致於神明之間必有變動或飲食二便有異也利小便世但知大便滑利之傷氣而不知小便滑利之更傷氣也但知小便頻數之傷陰而不知以二苓澤瀉木通等強利小便而小便並不能利者之更傷陽也近日醫家惑於前人治病以小便清利為捷徑之語不拘何病率用二茯澤瀉往往真氣下脫邪氣內陷纏綿不解殊不知前人之意是謂三焦氣化通暢即自小水通行所謂里和也以小便清利為里和之標驗也後人只當求所以和里之法不當但利小便蓋膀胱貼切命門為命門元氣發噓之第一關隘內經謂三焦膀胱應於毫毛腠理以元氣行於膀胱充於三焦達於毛理也今瀉膀胱是直瀉元氣發噓之根矣故陰虛之人不可利小便陽虛之人尤不可利小便錢仲陽曰小熱解毒大熱利小便李東垣曰肺受熱邪津液氣化之源絶則寒水斷流膀胱受濕熱癃閉約束則小便不通宜木通以治之朱二允曰小便利則諸經火邪皆從小便而下降矣夫火蓄於內有宜通大便者是熱結於腸胃之渣滓在濁道不在清道也有宜利小便者是熱邪淫溢於三焦之血脈清道為熱濁所搏宜以養陰之藥如生地花粉之類復其津液使熱邪浮動從血脈退出於津水之中而以滲藥利之而俱下故小便利者陰生而火退也亦有熱邪清濁兩結者張子和有玉燭散陶節庵有黃龍湯皆四物承氣合方胡宗憲更謂先養陰活血使毒不沾連於肝然後可以承氣下之是又分先後治法也故水蓄於內宜利小便火蓄於內亦不外利小便仲景治傷寒蓄水用五苓散多飲暖水者豈所蓄之水不足利耶蓋此證雖云蓄水亦兼蓄熱水與熱各搏於一偏澤茯暖水並進使兩邪一齊並去不致水去熱起且其時表邪未淨方中桂枝既宣膀胱氣化亦以清理表邪也邪水不能作汗必借暖水之精以蒸動作汗也手法之密何如耶以一方一法而兩解里邪一解表邪手法之迅何如耶古人利小便法不可勝紀大致不外養陰理氣兩途是利小便之先正有大段事在而小便之利特其徵驗耳今人不求所以利小便之故不拘何病而混用之又不求所以利小便之法僅取澤茯而直用之在外感則邪氣內陷在內傷則真陽下泄抑更有喪心之說焉小便一利表氣乍陷升氣乍匿病形必為之暫隱遂指為病減以欺病家旋即推手以卸禍於後來之醫也誤用麻桂而汗脫誤用硝黃而泄脫世皆知之誤用澤茯而滲脫獨無有知者以其雖用滲藥而小便不必見利元氣脫於無形故也此禍近日兒科尤甚不問何病一利之後垂頭喪氣中氣不續不能自言旋變喘促更謂氣擁而破降之遂四肢微掣目胞下垂額冷汗出而魂不返矣大抵小兒病平日多是風寒乳滯或久臥濕褥身傷於濕也夏月擁抱太久是大人身上熱氣汗氣逼入小兒身中腹中也治宜宣開疏化佐以清降其滲利斂澀皆未可輕試利止遺止反為死證仲景論傷寒少陰病利止息高者死時眩冒者死又謂霍亂利止者亡血也脈不出者死吾診病虛損者兩人皆上咳下遺遺止兩三月即死蓋遺者陰陽不相維也然猶有精而氣猶足以激出之止則精神當日旺病證當日瘳乃反身日見困神日見衰脈形日細至數日數斷續不勻早晚無定此乃陰陽偏絶無氣以激其離根之元氣僅縈縈於中焦而未散耳故咳聲日低呼吸日短飲食時進時退漸見稍動即喘神魂不寧此時補脾則中滿補肺則上壅而補腎與命門真陰真陽溫養攝納引氣歸元雖為對病之劑亦是催命之符何者下焦元氣空虛無主五臟運行之氣久已不歸其根一旦補藥得力中焦氣將下運如桶脫底而一去不得返矣孫一奎治馬二尹傷食誤服大黃芒硝巴豆重劑尚未得瀉以六君子救之而曰慮其得藥後脾陽內動諸藥性發將大瀉不止如瓶水底漏而不可禁也須備人參數斤以預之其機括正與此同孔育禮亦謂痢止而手足厥逆脈反沉細無神不能食者死也仲景為利止脈不出者出人參四逆湯亦不忍坐視聊盡人事而已夫利出濁道又屬暴病猶且如此況遺出命根又在久病之後者乎平肝者舒肝也非伐肝也肝之性喜升而惡降喜散而惡斂經曰肝苦急急食辛以散之以辛補之以酸泄之肝為將軍之官而膽附之凡十一臟取決於膽也東垣曰膽木春升餘氣從之故凡臟腑十二經之氣化皆必藉肝膽之氣化以鼓舞之始能調暢而不病凡病之氣結血凝痰飲胕腫臌脹痙厥癲狂積聚痞滿眩暈嘔吐噦厄咳嗽哮喘血痹虛損皆肝氣之不能舒暢所致也或肝虛而力不能舒或肝鬱而力不得舒日久遂氣停血滯水邪泛濫火勢內灼而外暴矣其故由於勞倦太過致傷中氣以及憂思不節致傷神化也內傷飲食外感寒濕脾肺受困肝必因之故凡治暴疾痼疾皆必以和肝之法參之和肝者伸其鬱開其結也或化血或疏痰兼升兼降肝和而三焦之氣化理矣百病有不就理者乎後世專講平肝不拘何病率入苦涼清降是伐肝也殊不知肝氣愈郁愈逆疏泄之性橫逆於中其實者暴而上衝其虛者折而下陷皆有橫悍逼迫之勢而不可御也必順其性而舒之自然相化於無有如東垣重講脾胃必遠肝木所指藥品乃防風羌活川芎白芷諸辛散之品也即陳皮厚朴且屢伸泄氣之戒矣其義不大可思乎丹溪號善用苦寒而意重開鬱常用之藥不外香附川芎白芷半夏也其義不更可思乎故知古人平肝之法乃芳香鼓舞舒以平之非白芍枳殼寒降以伐之也然則肝盛者當何如曰肝盛固當泄也豈百病皆可泄肝乎醫者善於調肝乃善治百病內經曰升降出入又曰疏其氣而使之調故東垣之講胃氣河間之講玄府丹溪之講開鬱天士之講通絡未有逾於舒肝之義者也所謂肝盛者風火自盛升散之力太過也後人每以鬱而上衝頭痛頭脹者為肝陽太旺更有以遺精白濁煩躁不眠諸下陷之證指為肝陽太旺者不亦戾乎風厥痙癇附中惡五尸內經論中風皆指外中於風者只是隱傷天地不正之氣如前所謂陰虛者感溫升之氣而發病陽虛者感斂肅之氣而發病是也榮血耗燥不與衛氣相維衛氣衰散無力自主遂隱為空氣暗風所持矣張景嶽毅然發非風之論直指為即古之煎厥其理固是而情形究有不同天地之間空中轉運之大氣即風也其力甚鋭豈必拔木揚沙哉莊子曰人在風中仲景曰人因風氣而生長皆謂空氣即風也當中風發病時其周身脈絡皆有空氣馳驟乎其中非如厥證之專為本氣內亂也內經又謂陽之氣以天地之疾風名之此風字與外風全不相涉正合厥證機括中風之風雖亦有此亢陽之氣而其發病究因感於空氣竄入筋脈也故前人治法總兼散風之意不為無見其與痙厥癲癇異者風為之病其傷在筋故有口眼喎斜肢節痿緩之象厥之為病其傷在氣血虛氣逆加以外寒束於皮膚逆氣內迫上奔而發病也故氣復即醒醒即如常而無遷延之患以其在氣分故也但正當氣逆之時血未嘗不隨之而逆故昏不知人其形靜者氣機窒塞之甚也其有放血而愈者邪不在血血未瘀敗也若血敗而色全黑及血瘀而放不得出者死矣癲癇之病其傷在血寒熱燥濕之邪雜然凝滯於血脈血脈通心故發必昏悶而又有抽掣叫呼者皆心肝氣為血困之象即所謂天地之疾風是也厥有一愈不發癲癇必屢發難愈者正以在血故也內經謂厥成為癲疾氣病日久亦將滯入血脈也痙之為病亦傷在筋而暴因風寒濕之外邪其來也驟筋中之本氣未虧故證見邪正格拒之象而愈後並無似中風之餘患也一為筋中之血虛而暗風走之一為筋中之氣滯而外邪持之也其熱病血不養筋而痙者乃轉筋之敗證血竭氣衰但略見口噤齒齘瘛瘲而無脊反頭搖目赤格拒之象也中惡客忤而卒死者即厥也但所感或挾空中穢惡之氣故其治或放血或汗或下皆以泄氣血中有餘之邪也要之此四病者雖有病機病體之不同而吾有一言以該之歸於調肝也經謂十一臟取決於膽肝膽一氣也肝膽之氣充足條暢噓吸停勻其根不空其標不折斷不致有倉皇逆亂之事故治法雖各因其臟各因其氣而總必寓之以調肝肝者貫陰陽統血氣居貞元之間握升降之樞者也木曰曲直腎陰不燥則肝能曲而藏而心得下交脾陽不陷則肝能直而伸而心得外照世謂脾為升降之本非也脾者升降所由之徑肝者升降發始之根也又有所謂五尸者飛尸伏尸遁尸風尸疰尸其發也或目光一眩而厥僕或身上胸內一處急痛如刺如裂瞬息攻心而即厥僕或怒而發或憂而發或勞而發或驚而發或食惡味而發或聞穢氣而發或入廟入墓問病見尸見孝服而發或聞哭而發或自悲哭而發或見血而發或遇大風驟寒而發此皆風寒燥濕雜合之邪刺入血脈內傷五臟之神也自古醫書未有確指病根者以泰西醫說考之乃逆氣鼓激惡血上攻於腦也其先痛而後厥者由腦氣筋而漸感於腦也所謂腦氣筋者如脂如膜發原於髓資養於血故邪伏於營血之分而不散以致血絡有變一經外有所觸感動其邪與血相激其機如電之迅而病作矣內經曰血氣者人之神也又曰血者神氣也故血亂而神即失常也此皆痼疾與癲癇同類治之總以疏肝宣心濡血搜筋為法肝氣舒心氣暢血流通筋條達而正氣不結邪無所容矣其用藥大致多生津化瘀也津充則五臟皆潤瘀行則百脈皆通而古書只有祛痰理氣之議宜其百無一效耳中風實在上焦虛在下焦中風者內燥化風而復感於邪之所作也內燥之故亦致不同有濕熱久菀化為燥痰壅滿胃絡一旦或因勞倦或因憂鬱或因天時不正忽然暈倒昏迷無知四肢抽掣呼吸有痰者此熱痰擁入心包而氣閉不通之證也其證神昏而不醒肢瘈而不緩或更兼拘急不便也病在中焦以上為肝脾之邪實治宜開之降之滌痰化血佐以養陰有陰虛內涸無從奉心心氣大潰筋脈緩弛一旦不因勞倦不因憂鬱不因天時不正卒然仆倒口目喎僻流涎不止兩腮暈紅手足微掣緩縱不收偏痿不用呼吸有聲無痰神識忽明忽昧無定者此下焦陰津耗竭無以維氣氣散筋枯之所致也病在下焦肝腎陰空陽散大開不合治宜滋之斂之養心平肝佐以行氣蓋此之所謂中風即內經所謂發為痿厥是痿厥合併之病也觀於內經論厥有寒有熱而論痿獨曰生於大熱也玩於斯義亦可知陰陽虛實微甚之別矣夫中風未有不由於陰虛者但有陰虛而陽氣內陷有陰虛而陽氣外散有專真氣內空有兼痰涎內實故前證偏於厥多厥多者陽氣怯而陷故內攻有力何者痰血有以滯之也其後恆積為內熱後證偏於痿多痿多者陽氣悍而散故癱緩無力何者津血不足以維之也其後或轉為內寒有病而即死者有病而遷延歲月者入臟與入絡之辨也又虛脫與實閉之分也至於其脈大率左沉弦而右洪緩何者陽氣內陷而結陰津內竭而枯也有兩手沉細弦徑者純於陽虛也有沉而洪散重按指下一片模糊者純於陰虛也又有浮弦細徑者浮薄而散者有汗即死無汗可治有三部繼續不勻漉漉如珠者有兩關孤硬而尺浮空者此皆元氣已脫也有三部洪弦滑實粗硬如索沖指而起者是陰竭而痰涎內實也身靜即死四肢躁擾有力如狂宜大承氣加人參地黃急下之有浮候弦細中沉緩滑兼洪重按始空者此陽微虛而內有濕熱之痰中風極善之脈也又有下焦陽氣虛寒中焦肝胃燥熱寒格其熱上衝於心其脈浮空或洪大而按之弦細呆長也夫中風大病也前人議論歧出莫衷一是故於此三致意焉東垣言虛其時有內實者何也河間言火其時有無火者何也丹溪言痰其時有無痰者何也惟探其本於津枯血滯明其機於陽氣內陷與陽氣外散辨其證於痰之有無外感之輕重究其變於化寒化熱而大義賅於此矣厥逆奔豚腳氣攻心內經曰厥逆者寒濕之起也千金方及董及之謂此即腳氣似矣腳氣有風濕寒濕之不同風濕多挾熱也又有奔豚亦下焦寒濕證皆邪氣自下部鼓肝腎之虛陽上衝於心使真氣離根而上浮最為危急之候其故由於風寒濕邪自足心湧泉穴竄入或自腰臍竄入其緩者菀為濕熱化內風而上衝其急者是風勝也不待化熱而即上衝久延不愈遂結為腎積之奔豚所謂豬癲風也是膀胱氣逆也又有一種本無外邪肝腎內冷陰風鼓動水邪上掩心肝生陽迫悶卒厥神昏不醒舌強不語口眼喎僻四肢瘛瘲拘急者亦奔豚之類急證也宜溫宣重鎮如黑錫丹之類主之其輕者擬方如下熟附片煅龍骨各四錢烏藥九節菖蒲各三錢桂枝牛膝各二錢木瓜吳萸各一錢細辛沉香各六分此方宣通心肺清陽溫化肝腎伏陰即金匱要略首條所敘之證治也金匱曰見肝之病知肝傳脾即當實脾脾能傷腎腎氣微弱則水不行水不行則心火氣盛則傷肺肺被傷則金氣不行金氣不行則肝氣盛則肝自愈此治肝補脾之要妙也肝虛則用此法實則不在用之此謂肝之陰氣挾腎之水邪上勝脾陽治當健脾之陽制腎之水水退火升則肺金清肅之令不行而肝木生髮之令得矣此專指肝腎虛冷言故曰肝虛用此法也後人不識其義疑誤疑衍亦昧矣故中風有一種純寒無陽之證其根發於里即寒濕腳氣奔豚之類於東垣河間丹溪所稱痰火之中風渺不相涉歷來論中風者泥於三家不暇及此矣喻嘉言醫門法津中寒篇末發明許叔微椒附湯方證其義與此相發當詳玩之虛損奇證天下有奇證即在常病之中令人不可捉摸者族弟成室太早先吐血繼咳嗽二年始得診之脈數而澀以溫補脾腎兼理肺氣治之即愈半年回家又接考試病復發又半年始得診之身熱時時汗出咳嗽氣急自言少腹有氣上湧當其湧時鼻出不及從口衝出其勢洶湧不可吸止日夜數發逼迫難堪診脈浮弦而數此有風濕在表也先以芳香宣理脾肺佐以固腎一劑得冷汗續續半日諸證頓瘳繼以溫固肝腎之劑調理之氣病仍復時發發時或兼咳或不兼咳脈象必數疾而不洪大及愈即平調如常人但身體日漸疲軟中間疑其風邪從臍入疑其寒從足心入用藥溫補下元更佐以外治莫不暫效而旋發再用即無功所更奇者教令靜坐吸氣稍長用意深納旋即身大寒熱如瘧狀初尚以為藥力能振動陽氣而化瘧也及次日不寒熱矣身體輕爽倍常方大喜間不半月又沖發如故再教納氣又發寒熱如前殊莫解吸氣深納之何以遂致寒熱也小便赤澀大便艱祕口味初強漸弱自秋及冬經余手治皆用溫潤鎮固之法間或別延他醫指為陰虛稍用涼潤即水瀉而氣陷不續又疑有蟲藥中佐入百部雷丸又思寒邪深伏下焦宜用溫下以大黃牽牛入溫補劑中得下亦於病無增損也其後漸覺喉痛如破又如腫塞不能下食視之略無紅腫之事但小舌墜下脈象亦漸細澀少神知其腎氣不能上朝督脈蕭索無能為矣臘月回家遷延三月身痿不能起於床矣終莫得救挽之術也沖氣雖損病常證亦未有似此洶湧莫遏者詳述之以俟高明者之指示焉斂散升降四治說略凡風寒濕熱散漫於周身之腠理者無聚殲之術也則因其散而發之痰血水食結積於胃與二腸膀胱之內者已屬有形勢難消散則因其聚而泄之滲之邪在上脘慍慍欲吐是欲升不遂也則因而吐之邪在大腸裡急後重是欲下不暢也則因而利之此順乎病之勢而利導之之治也溫熱無形散處於腸胃膜絡之中既不外越又不內結則以酸斂入泄劑撮其邪而竭之瘀血有形結聚於腸胃膜絡之中其質凝滯不能撮而去也則以辛溫入攻血劑溫其血而化之腎氣不納根本浮動喘嘔暈眩酸鹹重鎮高者抑之中氣虛陷泄利無度呼吸不及固澀升補下者舉之此矯乎病之勢而挽回之之治也凡病誤降者欲救之不可急升也誤升者欲救之不可急降也誤寒者欲救之不可急以大熱也誤熱者欲救之不可急以大寒也寒熱猶或可急也升降斷不可急也嘗見先以承氣誤下中氣下陷急以參耆升之虛氣上越喘逼不能食而死矣此當健中澀下不可升提其上也新病兼補久病專攻凡病皆宜攻也而有時兼補者以其內虛也內虛之義有二一為內之正氣自虛也一為邪氣在表其表為實邪未入里其內尚虛也新病邪淺加補氣血藥於攻病劑中故病去而無餘患若久病正氣受傷邪已內陷一加補藥便與邪值而攻藥不能盡其所長矣故華元化張仲景孫真人書中治久病諸方反重用攻擊不佐以補者為邪氣在裡故也此法率以丸而不以湯者急藥緩服也待至攻去其邪里邪勢殺而後以補藥盡其余焰故效捷而亦無餘患也後人識力不及每謂風寒初起正氣未虧無庸兼補更有謂邪氣在表兼補即引邪入里者往往攻藥不得補藥之力邪氣糾纏不盡或攻傷正氣邪轉內陷者其弊由於不識古人急補之義也及治久病邪氣膠固反夾雜補藥更有專補不攻謂正氣充足病自漸瘳者殊不知邪氣盤踞於裡補藥性力皆走里而守中其氣正與邪氣相值不能與正氣相接也往往使邪氣根株愈牢堅不可拔遷延不救者其弊由於不識古人急攻之義也大凡攻補兼施者須詳虛處有邪無邪為第一要義虛處有邪則補虛之藥不免固邪矣此施治之最棘手者古人補母瀉子之法殆起於此如肺氣既虛而又有風熱或痰飲之實邪此宜補脾而攻肺不得補肺與攻肺並用也欲不可遏法宜疏肝健脾腎主志肝主怒脾主思凡肝熱鬱勃之人於欲事每迫不可遏必待一泄始得舒快此肝陽不得宣達下陷於腎是怒氣激其志氣使志不得靜也肝以疏泄為性既不得疏於上而陷於下遂不得不泄於下泄之不止腎精為肝風煽盡而氣脫矣治法酸涼辛涼清肝之燥疏肝之鬱而升發之使不下陷若不應者是脾虛不能升載肝氣也加健脾以托之若以苦寒清心心肝木火之邪一齊下溜搏於腎陰愈令勃勃欲出矣大抵兼升兼開兼滋兼斂而不可清降也此證男婦皆有若濕熱盛者可加苦寒鹹寒以堅之
