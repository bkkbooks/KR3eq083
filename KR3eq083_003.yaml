body:
  text: 卷二上形氣類三陰三陽名義一論六經五臟不能強合三陰三陽者天之六氣也而人身之血氣應焉然血氣之行於身也周流而無定而三陰三陽之在身也有一定之部分則何也人身三陰三陽之名因部位之分列而定名非由氣血之殊性以取義也素問之敘陰陽離合也曰聖人南面而立前曰廣明後曰太衝太衝之地名曰少陰少陰之上名曰太陽中身而上名曰廣明廣明之下名曰太陰太陰之前名曰陽明厥陰之表名曰少陽太陰之後名曰少陰少陰之前名曰厥陰由此觀之三陰三陽以人身之部位而定名也不昭昭乎部位既定由是經絡血氣之行於太陽之部者命曰太陽經行於少陽陽明之部者命曰少陽陽明經行於三陰之部者命曰太陰少陰厥陰經故膀胱為寒水之經水陰也而曰太陽以其行於太陽之部也而小腸之為太陽無論矣心為君火之經火陽也而曰少陰以其行於少陰之部也而腎之為少陰可知矣若血氣之行於經脈者則三陽之血氣亦運行於三陰三陰之血氣亦運行於三陽豈有陰陽截然畫界者哉是故經絡之三陰三陽以定人身前後左右表裡部分之名者也而血氣之陰陽仍各從其臟腑之本氣求之不得因其經之行於三陰遂謂其臟之本氣皆陰也因其經之行於三陽遂謂其腑之本氣皆陽也明乎此則金匱真言論所謂心為太陽肺為少陰腎為太陰肝為少陽脾胃為至陰之旨可以豁然矣經絡之三陰三陽以其所行之部分表裡言之也臟腑之陰陽以其臟腑之本氣剛柔清濁言之也明乎此則腎為少陰不必強合於君火小腸為太陽不必強合於寒水餘臟仿此與夫陽濁陰清陰濁陽清諸文之互異亦無不可以豁然矣故陰陽離合論曰今三陰三陽不應陰陽其故何也正疑十二經之三陰三陽不應臟腑之陰陽也能知心肝為陽肺腎為陰之為本義即知十二經之三陰三陽之為借名矣顧世人習於十二經之三陰三陽轉疑心肝為陽肺腎脾胃六腑為陰少見而可怪也豈非徇末而忘本也乎三陰三陽名義二直指本義起於分野而廣引以明之十二經之三陰三陽其於臟腑不能執而強合也前論詳之矣十二經之三陰三陽其稱名起於人身之分野而分野則何為有三陰三陽也曰象於天地之義也南面而立陽明在前陽之盛也非燥氣在前也太陽在後遠而外之也非寒氣在後也少陽在側前後之間也非火氣在側也三陰同法只因分野方位表裡以定名非因風寒燥火暑濕六氣以起義也故人身之三陰三陽者虛位也或曰三陰三陽為虛位而內經每言燥病即曰陽明寒病即曰太陽火病即曰少陽土病即曰太陰熱病即曰少陰風病即曰厥陰者何也曰此假其名也陽明即燥金病假名不必在身之前也金氣通於肺不專於胃與大腸之經矣厥陰即風木病假名不必在身之側也風氣通於肝不及於包絡之經矣太陽少陽太陰少陰俱同此義此氣病而假其名也亦有經病而假其名者胃經病曰足陽明大腸經病曰手陽明不必皆燥氣為病也腎經病曰足少陰心經病曰手少陰不必皆火氣為病也夫人之中於邪也中於面則於陽明中於項則下太陽中於頰則下少陽此所謂陽明太陽少陽者皆以分野言非以經絡言也非以六氣言也邪之中人也先中於皮毛分野之間而經絡脈管之中未能即病也脈管中血氣不盛則邪氣滲入脈中矣有滲入陽經者有滲入陰經者有邪已至於三陰之分野而猶未滲入脈管者經脈之氣通於臟腑其機至捷邪入經脈則其入於臟腑也不可御矣故陽經亦有里證若邪至三陰分野而未入脈管是即三陰表證猶可汗而愈也昔人疑傷寒論只言足經不及手經者論中所稱三陰三陽只是分野也足經分野大故見證多手經分野小故見證少若邪入於脈管之中則氣行有道脈絡相引手經亦自有手經之病矣故傷寒論有時及手經病證者皆里證也陶節庵曰足之六經蓋受傷之方分境界也張景岳曰足經脈長而遠自上及下遍絡四體故可按之以察周身之病手經脈短而近皆出入於足經之間故傷寒但言足經不及手經者傷寒表邪也欲求外證但當察之於周身而周身上下脈絡惟足六經盡之耳周身者軀殼也對臟腑言張石頑曰只傳足經者邪氣在身未入臟腑也若入臟腑則不得獨在足經矣嗚呼觀於諸家之論不亦可以恍然矣乎獨是邪在分野者概於皮膚分肉之謂也而病證竟分見某經劃然各有界畔者何謂也脹論曰五臟六腑各有界畔其病各有形狀曰邪之來也必有其道如中於項則下太陽太陽分野為邪所擁則此分野中正氣困矣正氣困則不能與脈中之氣升降遲速相應邪雖未入脈中而脈中之正氣已為所累矣故周身上下皆獨見太陽證也累之日久則裡氣亦虛邪乃乘虛而內侵矣總之邪在分野見證只在軀殼之外邪入經脈見證必及臟腑之中其有未入經脈而遽見里證者必是邪氣直中三焦也直中三焦則其入臟腑也亦易矣三焦者內之分野也三陰三陽者外之分野也分野者衛之部也經脈者榮之道也三陰三陽名義三論六經六氣不能強合又推論其餘意也至真要論曰以名命氣以合命處而言其病名謂四象之名即陰陽離合論所稱三陰三陽之名也氣風寒暑濕燥火之六氣也處人身十二經之部位也由此觀之以天地四方之象起三陰三陽之名因即以其名加之六氣因即以其名加之人身此不過藉以分析氣與處各有所屬俾得依類以言其病耳言者討論之謂也其不可以氣之名處之名即指為病之實也不昭昭乎不但此也以人身前後兩側之表裡分三陰三陽者是固常說熟於人中者也又有以人身之形層分三陰三陽者又有以人之身形分三陽三焦分三陰者且也少陽為一陽厥陰為一陰陽明為二陽少陰為二陰太陽為三陽太陰為三陰三陽為極表一陰為極里數由一而至三即由里而達表也而脈象之三陰三陽其表裡名義則又不同素問曰鼓一陽曰鉤鼓一陰曰毛夫鉤毛皆浮之象也而曰一陰一陽是以一為極外矣鼓者謂脈之來而應指也其脈來見於浮分而其氣屬陽者鉤之脈也脈來見於浮分而其氣屬陰者毛之脈也氣屬陽者來盛去衰也氣屬陰者來衰去盛所謂秋日下膚蟄蟲將去也由此推之脈見於中分其來盛者謂之二陽其去盛者謂之二陰可知矣脈見於沉分其來盛者謂之三陽其去盛者謂之三陰可知矣明於斯義則知一陽結謂之隔決非手足少陽也二陽結謂之消決非手足陽明也三陰三陽結謂之喉痹決非太陰太陽也故脈經引扁鵲言曰出者為陽入者為陰脈來一出一入為平再出一入為少陰三出一入為太陰四出一入為厥陰再入一出為少陽三入一出為陽明四入一出為太陽以出入之多少分陰陽之太少其義皎然而有徵矣其以出多為陰入多為陽者指病脈之反乎常數也夫三陰三陽之所屬眾矣引之可十推之可百引之可千推之可萬獨未聞有以脈之浮沉出入分屬三陰三陽者而求之經文確有此義故縱言及之以質之有道者明乎此則知三陰三陽之名隨處可稱而不可互相牽合者也黃坤載曰小腸屬太陽者火從水化也胃屬陽明者濕從燥化也腎屬少陰者寒從熱化也肺屬太陰者燥從濕化也少陽厥陰木火同化也是以六氣強合六經者謬矣張隱菴曰傷寒論治六氣之全書也是以六經牽合六氣也高骨大骨非一骨也生氣通天論曰因而強力腎氣乃傷高骨乃壞又曰味過於咸大骨氣勞短肌心氣抑王冰云高骨腰高之骨也喻嘉言云大骨即高骨常有高僧絕欲只因味過於咸以致精泄潰敗墮其前功竊以為二說皆非也高骨者陰上毛際之橫骨也非腰高之骨腰有何高骨耶強力者即強力入房交合太過也此骨為肝腎之經所繫交合太過不但內臟之氣傷而外經所繫之高骨亦壞每有多戰強泄者毛際橫骨隱作痠疼是其徵也洗冤錄辨俗言婦人貞潔從一者其陰骨潔白其淫而多夫者則全變成黑非也凡室女及婦人未生產者其骨皆白生育多者其骨皆黑無關貞淫也婦人生產多而骨壞不可知男子交合多而骨壞乎此骨為肝腎所繫大筋所結橫束下焦若壞則筋弛而無束五臟之氣膀胱之津液腎之精皆有下泄不禁之虞矣豈尚堪長壽乎大骨則舉人身脊骨臂骨肘骨胻骨而賅之也氣勞者咸走骨骨病無多食鹹鹹味入骨則津液凝澀骨失所養骨中之氣熱而燔矣故曰勞也凡人食鹹則渴血汁舉為所澀骨髓不得榮養其煩勞也不亦宜乎然則高骨也大骨也一乎二乎高骨壞者精不固傳為虛損大骨勞者骨內蒸發為癰疽痿痹甚則枯槁三焦水道膀胱津液論陳修園曰經云三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣此數語向來注家皆誤不知津液為汗之源膀胱氣化則能出汗故仲景發汗取之太陽水道為行水之道三焦得職則小水通調須知外出為膀胱之津液下出為三焦之水道也故凡淋瀝等證皆熱結膀胱所致而治者卻不重在膀胱而重在三焦按此說本於張隱菴乍讀似新奇可喜而實違經背理之甚者也夫下出為三焦之水道是矣外出為膀胱之津液則非也三焦者水所行之道非水所藏之府也汗與小便俱由三焦經過故汗多則小便少者水在三焦即為熱氣蒸動泄於膜外達於皮膚而不待傳入膀胱也非既入膀胱復外出而為汗也氣化則能出者膀胱無下口必借三焦之氣化有以轉動之使之俯仰而傾出也故曰能也其曰水曰津液云者水在三焦氣味清淡猶是本質發而為汗則味鹹傳為小便則氣臊是已受變於人氣矣故皆可以津液名之非汗為膀胱之津液小便為三焦之水也乃汗與小便皆三焦之水而外出下出者也發汗取之太陽者太陽主表以其經非其腑也飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於氣能生血血能藏氣前賢謂氣能生血血不能生氣固矣然血雖不能生氣氣必賴血以藏之所謂氣生血者即西醫所謂化學中事也人身有一種氣其性情功力能鼓動人身之血由一絲一縷化至十百千萬氣之力止而後血之數止焉常見人之少氣者及因病傷氣者面色絡色必淡未嘗有失血之症也以其氣力已怯不能鼓化血汁耳此一種氣即榮氣也發源於心取資於脾胃故曰心生血脾統血非心脾之體能生血統血也以其臟氣之化力能如此也所謂血藏氣者氣之性情慓悍滑疾行而不止散而不聚者也若無以藏之不竟行而竟散乎惟血之質為氣所戀因以血為氣之室而相裹結不散矣故人之暴脫血者必元氣浮動而暴喘久脫血者必陽氣浮越而發熱病後血少者時時欲喘欲嘔或稍勞動即兀兀欲嘔或身常發熱此皆血不足以維其氣以致氣不能安其宅也此其權主乎肝腎肝之味酸腎之味鹹酸鹹之性皆屬於斂血之所以能維氣者以其中有肝腎之斂性在也故曰肝藏血非肝之體能藏血也以其性之斂故也精由血化藏氣之力更強故又必腎能納氣而氣始常定也明乎此則知氣血相資之理而所以治之者思過半矣血虛者當益其氣氣暴者尤當滋其血也夫生血之氣榮氣也榮盛即血盛榮衰即血衰相依為命不可離者也藏於血之氣衛氣也宗氣也氣亢則血耗血少則氣散相輔而行不可偏者也榮氣主濕衛氣主熱宗氣主動榮氣不能自動必借宗氣之力以運之衛氣雖自有動力而宗氣若衰熱亦內陷故人有五心悗熱骨蒸煩熱者宗氣之力不能運熱於外也水停心下困倦濡泄者宗氣之力不能運濕於外也卷二下脈法類此卷是發脈簡補義未盡之餘義也單診總按不同脈有單診總按不同者或單診強總按弱也或單診弱總按強也或單診細總按大也或單診大總按細也凡單按弱總按強者此必其脈弦滑一指單按氣行自暢無所搏激三指總按則所按之部位大氣行不暢而搏激矣此脈本強而總按更強於單按也單按強總按弱者此必其脈氣本弱但食指較靈單按指下較顯名中二指較木總按即不顯其振指也此脈本弱而總按更弱於單按也單按細總按大者是其脈體弦細而兩旁有暈也總按指下部位大而暈亦鼓而應指矣單按大總按細者必其人血虛氣燥脈體細弱而兩旁之暈較盛也食指靈而暈能應指名中二指木而暈不能應指矣更有單按浮總按沉單按沉總按浮者其浮即暈也抑或脈體本弱輕按氣無所搏力不能鼓重按氣乃搏鼓也又有醫者操作用力指尖動脈盛大與所診之脈氣相擊而亦見盛大者又有醫者久行久立指頭氣滿皮膚膹起因與脈力相隔而不顯者此皆極瑣細之處前人所不屑言而所關正非淺鮮也大抵單診總按而指下顯判大小強弱之有餘不足者其有餘總屬假象在無病之人固為正氣衰微即有病之人亦正氣不能鼓載其邪使邪氣不能全露其形於指下而微露此幾希也當以正虛邪實例治之固不得重於用攻亦不得以為邪氣輕微專於用補也即如總按大單診細者其細多是指下梗梗如弦起伏不大其中氣之怯弱可知單診大總按細者其細多是指下駛疾累累似滑是氣力不足於上充而勉強上爭也其中氣之竭蹶更可知矣強弱亦如是也總是因稟賦薄弱或勞倦內傷或久病氣血困憊胸中窄狹動作乏力乃多見之是因虛生實清濁混處氣鬱不舒之象也浮沉起伏中途變易舊說脈之浮沉不同者不過浮大沉小浮小沉大浮滑沉澀浮澀沉滑云云耳未有於起伏之間察其中途變易者也近來診視曾見有兩種脈一種其氣之初起自沉分而至於中也滑而踴躍有勢及至中分忽然衰弱無力緩緩而上至於浮形如泥漿其返也亦自浮緩緩而下於中由中至沉滑而有勢輕按重按指下總是如此其證身體困倦終日昏迷似寐非寐心中驚惕惡聞人聲目畏光明面帶微熱四肢微冷不飢不欲食但口渴索飲不止此衛濕榮熱風燥在肺痰熱在胃也身中伏有濕邪而又吸受亢燥之新邪也以防風藁本通衛陽驅表濕紫菀白薇杏仁蔞皮宣泄肺中濁氣焦查竹茹煅石膏煅瓦楞子降滌胃中熱痰兼以白芍清肝天竹黃清心而神清氣爽身健胃開矣一種脈氣正與此相反其初起自沉而中也艱澀少力由中而浮也躁疾如躍其返也亦由浮而疾下於中由中而沉遲弱無勢輕按重按指下總是如此其人嗜好洋菸飲食不強陰痿不起此表分無病而里有痰飲又上虛熱下虛寒也治當疏中溫下此二脈者皆古書所未言也豈真古人未見此脈哉見之而詞不能達徒以浮滑沉澀浮數沉遲了之不知浮沉之間遲數不能有二滑澀各自不同與此之起伏中變者迥別也故凡著醫案於脈證曲折處必不憚反復摩繪方能開發後學脈不應病及脈平而死難經曰脈不應病是為死病也仲景曰邪不空見中必有奸設有不應知變所緣二者其義不同知變所緣者以其必有所挾之宿疾所伏之隱疾也其脈雖不應顯見之證而仍與隱伏之病相應也故曰中必有奸若難經直言死病者是其並無所挾無所伏而真不應者也何也凡病之應見於脈者為其邪在於經搏於正氣正氣失其常度脈遂失其常形也若臟氣潰敗陰陽失維升降出入之順逆遲速一隨邪氣之所為而正氣之力不能與之相搏而相激其脈往往通暢如常起伏如常不見邪氣格拒之象僅微覺指下呆長乏於神力而已此真氣已漓其人必困乏無力飲食少思有時又飢迫欲得食行動氣喘面色蒼黃或耳暴聾或目暴無所見又有老痰伏結以及痞塊僻在偏隅不當氣血沖道氣血與之相避不致相格而脈自長滑流行者此遷延不已之痼疾也故每見陰陽離脫之人腎水虛寒脾陽枯燥肝風內煽兩尺長緩起伏條暢此所謂緩臨水宮也指下頗似充足有餘而圓而無暈呆而不靈且或左或右或寸或關必有一部稍見沉弱不及此虛損久病及老年氣盡未死前數月必見之大率多起於冬至死於春分者以水枯不能涵木其始肝風內灼其繼肝氣外脫也前人謂緩臨水宮弦居土位同為敗脈據生平所診弦居土位猶有可以挽回緩入水宮未有能濟者豈非以緩為真陰真陽之渙散乎陰散故脈不能緊陽散故脈不能洪不緊不洪故似緩也難經又謂人病脈不病雖困無害此措詞軒輊失當脈不病者脈不敗也若病久且困不能飲食不能轉側雖神識清明言語不亂脈來勻滑長緩亦終於敗而已何者五臟清枯故神明不亂大氣孤行故脈不變血絡已竭故身不能動也故難經又謂寸口脈平而死者生氣獨絕於內也至於老痰痼疾不見於脈者以其不當氣血沖道也故有患積而情急欲死者正當沖道也有發之頻數者迫近沖道也有寬緩無事者遠於沖道也前人以此為氣血與之相習非也夫果氣血相習是陰陽失維正氣無權矣脈中有線有吉有凶慎柔謂虛損脈洪大按之中間尚有一條者可治空散無一條雖暫愈亦必死此所謂一條者即脈中之脊也非指下別有一條也吾嘗謂喘脈多是滿指虛動不見正形有根可治無根即死根即脈之脊也元廉夫謂散脈中有一線為肝邪脾敗之徵此所謂一線者乃弦勁挺於指下死硬無生氣也血死於里氣無所歸前人謂陽氣不到之處則脈為之弦此弦見於里足徵五臟真陽之已漓矣慎柔亦曰勞證寒熱作瀉脈數而按之洪緩著骨指下如絲此不可為也王漢皋謂痰飲凝結脈多於弦洪之中夾一細線隱指有力此細滑見於中沉之分乃胃陽之鬱而不宣也凡脈中有細線上弛如駛者皆內熱而有物以制之或熱痰之內結或熱血之內瘀也此三者形各不同吉凶相遠宜詳辨之熱血內瘀者防成內癰其證煩渴夜甚隱隱有腫脹作痛之處又兼小便赤澀也脈有數道脈簡補義論脈有如引數線以為痰病及將死氣盡血散之象詳矣頃讀倉公傳有曰切其脈得肺陰氣其來數道至而不一也色又乘之故知其當十日溲血死夫得肺陰氣謂得肺之真臟也內經曰所謂陰者真臟也肺脈短澀而散故曰其來散數道者即如引數線也至而不一是真澀也以溲血死是氣血不相維之過也其病由於墮馬僵石上而肺傷也仲景辨脈曰咳逆上氣其脈散者死謂其形損也拙注以形損為肺體傷損正與此義暗合以其臟體瘀敗真氣不榮故脈開散而不聚也以此推之凡喘咳病劇及一切癰疽跌僕失血諸證見此脈者若兼澀結至而不一即短期至矣蓋此脈重按其線仍攢聚指下者痰實也其線開散兩邊者氣散也舊說八怪脈中有所謂如解索者即此止脈形勢吉凶辨凡癥瘕積聚痰凝水溢胕腫痞滿喘促咳逆蓄血停食風熱癮疹寒濕筋骨疼痛心胃氣痛以及憂愁抑鬱大怒久思久坐夜深不寐與夫因病過服涼泄胃氣遏伏不通婦人月閉妊娠脈皆常有停止有停一二至者有停二三十至而復來者即仲景所謂厥脈也又小兒脈多雀鬥不勻此其多寡疏密之數舉不足為吉凶之據也詳考其辨蓋有四端一察其不停之至應指之有力無力起伏之有勢無勢也力與勢盛即為有神力與勢衰即為無神一察其停至之頃是在脈氣下伏之後其力不能外鼓而然者是為邪所遏陽不能噓也若在脈氣上來之後其力不能內返因從指下即散如弦之絕而不見其下去者是元根已離陰不能吸其餘氣遊弋經絡之中而將外脫也一察其停至之至是於脈氣下伏之後全不能起徑少一至是邪氣內結也若非全不能起已至中途不能上挺指下喘喘然搖擺而去者是中氣內陷不振而將下脫也稍遲即當變見蝦游魚翔之象矣一察其既停之後復來之至將起未起之際有努力上掙艱澀難起之意者即知其停是邪氣所阻也若起伏自然如常流利略無努掙艱澀之情是其停為元根已離其餘氣徘徊於三焦胸腹之空中進退無定而將上脫也稍遲即當變見雀啄屋漏之象矣更察其脈之形無論為緊斂為洪大但能通長勻厚應指有力高下停勻或來微衰而去盛者吉也若應指少力來盛去衰及寬大中挾一細線指下挺亙不移或上駛如馳如射又斷而累累如珠及指下如引數線不能斂聚者是中氣敗散為痰所隔而不合即所謂解索也故有偶停一二至而即決其必死者為其氣敗而不續也有久停二三十至而仍決其可治者為其氣閉而內伏也更察其證有病之人必痰塞氣逼不得宣暢神識昏迷譫妄躁擾狂越可駭者吉也若氣高不下時時眩目及神識清明而靜者凶也無病之人必胸膈不清肋脹腹痛氣悶不舒心中驚惕寐中肢掣夜夢紛紜及見惡物入暗洞者吉也若四肢無力稍動即喘氣高不能吸納胸中時時如飢而又不欲食二便清利頻數者凶也搖擺之脈有來去辨搖擺之脈脈簡補義論之詳矣夫邪痼於外其脈搖擺在於脈之起而來此不過邪氣痰血之阻滯正虛於內其脈搖擺在於脈之返而去是必元氣脫根內吸無力故氣不能深穩也此乃中氣虛怯之極或下寒內寒真陽無主或下熱內熱真陰無主其情似不欲內返而其勢衰弱又似迫欲下息故為之搖擺而下也如人之力弱舉重者方其舉時猶可撐持及其下時遂戰慄不支矣在內寒暴病尚可急救其久病及內熱而然者內竭已極復何能為此脈急病遠行入房寒邪直入命門者有之久病虛勞骨蒸及溫熱骨髓枯竭痙而齒齘口噤與腳氣衝心者有之張石頑論痰飲短氣分呼吸出入用腎氣丸苓桂朮甘湯其義甚精與此參看史記倉公傳有云脈實而大其來難者是蹶陰之動也所以然者為其氣滯於血中即來而搖擺也又云脈來數疾去難而不一者病主在心此即去而搖擺之脈也曰病在心者心主脈脈之不寧心氣之不能內寧也津氣消灼燥痰據於心絡以致怔忡譫語者所謂狂言失志者死也夫氣升出不利其來也搖降入不利其去也搖邪氣外束升出不利宜也至降入不利非邪踞於內即正竭於內也其危也何如乎躁脈有浮沉辨躁脈有浮沉兩種沉而來去如掣或兼細兼滑兼弦而無遠近盛衰之異者陽氣之虛而內陷是自郁也若為寒濕所遏者必兼緊數矣浮而來盛去衰來遠去近甫去即來未能極底如人之以手探湯而回者此內熱而中氣不安於內是陰氣不吸也兼洪緩者為風熱濕熱之有餘兼弱散者為陰虛骨蒸之不足凡患血燥脈多如此其證為懊憹煩躁夜不安眠大便秘結頭目昏眩呼吸短促多夢紛紜又骨性堅斂氣主內吸骨熱者脈來上促出多入少其證為骨中如堅肢軟欲痿頭顱脹疼筋脈抽掣心中驚惕是髓中有熱也若加浮散是髓枯也內經曰熱病髓熱者死此之謂也實洪實散虛洪虛散四脈辨脈簡補義論實散之脈近於洪而不數不盛其所以異同之故尚未揭出夫洪者或陰虛陽陷而陽盛於陰或陰本不虛而陽邪自盛此偏於陽盛一邊故其脈洪大而充實有力實散者或內濕菀久化燥或風邪內擾其陰此偏於陰虛一邊故其脈渙而平軟少力慎柔五書又謂虛損久病其脈中沉之分必見虛洪此又氣虛血少陰陽兩虧而中樞不運者也血少故不聚不堅氣虛故起伏甚小而無力是虛散之未甚者虛洪見於中沉升降無力陽氣弱而猶未離根虛散僅見於浮陰不維陽陽氣散而無根也故治洪脈重在泄火而兼養陰治實散重在養陰而兼理氣治虛洪補血益氣而劑取輕清治散脈益氣補血而劑取溫潤重濁收攝滋填矣此四脈者其辨只在陰陽虛實偏輕偏重一微一甚之間濡弱二脈辨脈簡補義謂濡弱二脈止以浮沉分名主病並無分別究竟非無分別也前人未經發明耳夫濡即軟也形不硬也弱無力也氣不強也故濡主濕邪弱主氣虛凡肢體困倦肌膚胕腫以及瘡瘍癬疥其脈多濡史載之所謂按如泥漿者濕兼熱也偏於邪實呼吸不足不能任勞以及盜汗自汗泄利注下其脈多弱氣衰不鼓也偏於正虛濕能滯氣形軟者應指多是無力虛能生寒力弱者其形不必皆軟故軟而不弱必濕中熱盛濁氣上逆也弱而不軟必虛中挾寒脈為寒急也其軟弱並見而軟甚於弱者濕邪深入肝脾而肺胃氣鬱也證見胸膈痞滿肢體酸痿弱甚於軟者心腎真陽內怯而脾肺氣虛也證見飲食不化腹痛時泄陰虛傷濕脈多沉軟氣虛傷風脈多浮弱風者溫而毗於燥者也若形軟無力指下如死曲蟮患風濕表證者可治為其氣血膹郁停滯也久病虛損必死為其氣血已呆而不靈指下之形乃陰濁之氣浮溢經絡而僅存未散也治濡脈者芳香為主甘溫佐之治弱脈者甘溫為主芳香佐之軟而不弱略加苦寒弱而不軟再入辛溫此大法也牢脈本義牢脈者沉陰無陽之脈也是寒濕深入肝脾肝脾之體其腠理為瘀血布滿而脹大也故其證氣呼不入稍動即喘兩脛無力腰強不便兩脅㽲脹皮膚微胕似腫最易出汗聲粗氣短喉中介介不清皆肝脾氣化內外隔絕所致以其本體內塞氣無所輸也近年迭診四人大率是憂思抑鬱之士也一以會試留京苦讀冬寒從兩足深入上攻立春之日忽覺兩腿無力行及數武即汗大出氣大喘延至長夏痿廢胕腫五液注下一以久居卑濕經營傷神春即時覺體倦食少夏遂全不思食體重面慘腰下無汗身冷不溫行動即喘肢軟腰痠不能久坐入冬痿廢次春不起一以經營勞力又傷房室寒濕內漬夏患咳嗽誤用清肺咳極血出入秋遂唾血沫色赤如朱遍身微胕似腫行動即喘汗出如注膚涼不溫醫仍作內熱治以清泄秋分不起一以被劾褫職先患遍身胕腫氣促喘急日夜危坐不能正臥醫治暫愈仍覺聲粗氣浮兩腿少力秋分復發無能為矣此四人者其脈皆沉大而硬以指極按至骨愈見力強沖指而起雖盡肘臂之力以按之不能斷也指下或弦緊不數或渾濁帶數或渾濁之中更帶滑駛指下如拖帶無數黏涎也兩寸皆短兩關先左強右弱後左右皆強或右強於左中間亦有時忽見和緩而未幾仍歸於牢且或更甚於前日也大便不硬而艱秘不下仲景所謂腹滿便堅寒從下上者也推其本原大率是體質強壯氣血本濁加以濕邪深漬原籍肝脾正氣以噓吸而疏發之而乃勞以房室抑以憂思久之肝脾正氣內陷不能疏發而寒濕遂乘虛滯入肝脾之體矣血遂凝於腠理不得出入而體為之脹滿腫大矣血凝而堅氣結而濁故脈為之沉伏堅大也何以知其為肝脾脹大也凡六腑五臟皆有脈以通行於身寒濕之邪由脈內傳於臟臟氣分布之細絡閉塞不得輸泄而氣專注於大脈矣肝脾主血其體堅實而澀最易凝結故鬥毆跌僕瘀血內蓄之人其脈多有沉弦而大重按不減者又瘧疾死者西醫謂肝脾脹大倍於常人千金翼方第二十六卷末有瘧證不能俯仰目如脫項似拔葉天士臨證指南亦謂瘧疾腰痛脹為肝病是中醫早有此說矣西醫謂此即瘧母殊未是每診久瘧敗證脅脹腰急其脈亦多是沉大而弦重按不減也且見是脈者多死於秋或死於春罕見死於正冬正夏者肝脾受克之期於病機尤宛然可徵者也當微見未甚之時急用芳香宣發之劑疏化寒濕舒肝醒脾佐以苦降淡滲使寒從下上者仍從下出加以行血通絡使腠理瘀痹者漸得開通或可挽回一二峻藥急服非平疲之法所能為力也弦脈反為吉象說舊皆以弦為百病之忌脈今伏思之亦有以弦為吉者此必其始脈來指下累累斷而不續得藥後脾脾氣續而脈形通連也其始寸不下關或尺不上寸或兩頭有脈關中不至其後三焦氣通而脈形挺長也其始潎潎浮泛空而無根其後腎氣歸元而脈形厚實也其始沉弱無力萎靡不振其後肝脾氣旺而脈勢強壯也其始渙散無邊模糊不清其後陰回氣聚而脈形堅斂也其始細數無神起伏不明其後陽回氣充而脈勢暢大能首尾齊起齊落也此皆以弦為敗脈之轉關以其氣由斷而續由屈而伸由空而實由散而聚由衰而振也其不謂之長而謂之弦者陰陽初復其氣只能充於脈管之中使脈形為之挺亙而有力尚未能洋溢脈管之外使脈勢條暢溫潤而有餘也仲景曰傷寒吐下後不大便五六日循衣妄撮譫語不識人微喘直視脈弦者生澀者死又曰汗多重發汗亡陽譫語脈短者死脈自和者不死又曰痙病脈伏堅發汗後其脈浛浛如蛇暴腹脹大者欲解慎柔曰虛損六脈和緩服四君保元熱退而脈漸弦反作瀉下血此陰火煎熬血結經絡者邪從下竅出也有作傷風狀者邪從上竅出也又曰緊數之脈表裡俱虛緊猶有胃氣數則無胃氣喻嘉言解仲景下利脈反弦發熱身汗者自愈謂久利邪氣深入陰分脈當沉弱微澀忽然而轉見弦是少陽生髮之氣發見生機宛然指下此皆以弦為吉之義也故久病之人其脈弦緊有力者是真氣內遏而有根也此尤當於尺部占之病勢困篤寸關或結或陷而尺中充長弦實起伏有力者根本未動也何者真氣不能充達於上即當蓄積於下也世只知尺脈忌弦而不知尺脈不當忌弦而忌緩忌滑也緩者呆軟無氣也滑者斷而不續也所謂忌弦者孤硬之謂也非長實之謂也浮脈反宜見於閉證說浮泛無根之脈氣之外越也卻宜於閉塞不通之證若多汗與滑泄者見之反為氣散氣脫而不治矣故傷風化熱久不得汗熱灼津干肌膚悗𤍜肺氣迫塞呼吸喘促其脈每趯趯於皮毛之間而不見起伏不分至數所謂汗出不徹陽氣怫鬱在表又所謂正氣卻結於臟故邪氣浮之與皮毛相得者也以酸甘入辛散劑中津液得回大氣得斂即汗出而脈盛矣何者氣必一吸而後能一噓也若夫溫熱之病汗出不止而浮滑數疾是真陰內脫也傷寒邪深脈微欲絕得藥後脈暴浮與下利甚而脈空豁是真陽內脫也困病日久屢次反復其脈漸見浮薄是陰陽並脫也大抵此脈久病沉困痿倦與外感新病得汗下後俱不宜見其久病間有因於燥痰痰結便秘氣浮而然者所謂滑而浮散攤緩風用清痰理氣脈轉沉弱無慮也若藥不應又常汗出必死新病有傷寒瘧疾斷谷數日胃氣空虛而然者督令進食脈即沉靜矣所謂漿粥入胃則虛者活也不能進食與食即注下者死蓋浮薄者津空也津空而氣結者生津空而氣散者死浮脈反不宜發散說凡脈空大無根按之即散此陰虛而元氣將潰也用酸甘之劑斂氣歸根脈漸堅斂而實即為轉關可望生機若斂而不實愈硬愈空又去生遠矣嘗見濕溫夾傷生冷先妄發汗繼過清滲三焦氣怯膀胱氣陷咳而氣上衝擊遍身大汗大便微溏小便短澀舌淡白無苔小腹脹硬如石兩脛胕腫脈來空大稍按即指下如窟動於兩邊應指即回一息十動以上急用酸溫棗仁龍骨山萸南燭首烏牛膝入附子木香遠志桃仁化積劑中先兩尺斂實繼兩關堅實舌苔漸見白厚轉黃而諸證見瘳此誤汗誤滲表裡俱傷真陽離根大氣外越若專用辛熱大汗而脫矣若用酸溫之後脈愈空愈硬而應指猶能有力者不得即委不治又當減酸俾將微汗虛甚者以甘溫佐之其汗必先戰也汗後脈必轉沉弱轉用酸溫調之補之大凡浮而無根之脈俱宜兼用酸斂其真陽離根脈見芤弦者每數至一息十動以上是元陽不安其宅也宜以酸入辛熱劑中其真陰離根虛勢遊弋脈見潎潎浮散者宜以酸入甘溫劑中至於溫暑熱傷氣分脈浮而洪數且散者喘促汗出宜以酸入甘寒劑中如生脈散之類得酸而脈斂者正氣有權也不斂而加數者真氣敗也此皆內虛脈浮者之治法也皆無與於表邪發散之例數脈反不宜用清散說虛寒而脈數者元氣不能安其宅如人之皇皇無所依也其形浮大而芤其情勢應指即回無充沛有餘之意夫元氣所以不安其宅者有風寒濕邪從足心從腰臍上衝直搗元穴有因病誤服清肺利水之劑使三焦膀胱真氣下泄太過發為上喘下癃之證是從下從里撤其元氣之根基也故氣浮於外潎潎而數宜用酸斂入辛溫劑中若因勞倦憂思傷其大氣以致內陷而沉細而數者是陽虛於表陰又虛於裡非如上文之陽傷於裡而越於表也不但不宜酸斂亦並不宜辛溫而宜用甘溫如東垣補中益氣仲景小建中之制內經所謂陰陽俱竭調以甘藥者也故脈之浮數者有陽傷於內自越於外者以酸溫斂陽有陰盛於內格陽於外者以辛溫消陰脈之沉數者有陰虛於內而陽內陷者以甘潤益陰甚者以鹹溫佐之有陽傷於表而自內陷者以甘溫助陽佐以氣之芳香者鼓舞之此四者皆內傷之數脈偏屬虛寒而無與實熱者也其治皆宜於補皆宜於溫而有辛甘酸之不同浮緩反不如弦澀說朱丹溪以弦澀二脈為難治而慎柔謂老人或久病人六脈俱浮緩二三年間當有大病或死何也脈浮無根乃陽氣發外而內盡陰火也用四君建中服之陽氣內收反見虛脈或弦或澀此正脈也照脈用藥脈氣待和病愈而壽亦永矣蓋浮緩者直長而軟如曲蟮之挺於指下起伏怠緩中途如欲止而不前者重按即空或分動於兩邊而成兩線矣此脈凡寒濕脫血血竭氣散將死之人多有之老年無病而見此者精華已竭也伏脈反因陽氣將伸說伏脈大旨簡摩補義言之悉矣陶節庵謂傷寒兩手脈乍伏者此將欲得汗也邪汗發之正汗勿發之其所以乍伏之故尚未指出夫欲汗而脈反乍伏者皆因邪氣滯入血脈正氣欲伸而血阻之不能驟伸以致折其方伸之銳氣而相格如此也或傷寒日久陰盛陽虛血脈凝泣得溫補之劑陽氣乍充鼓入血脈寒邪不得驟開故相搏而氣機乍窒也或溫病大熱津灼血燥得養陰之劑津液初回正氣鼓之以入血脈血燥不能驟濡氣機不能驟利故相迫而致閉也亦有內傷生冷外傷風寒胸口結痛呼吸喘促得溫化之劑脾陽乍動冷食初化而表邪未開以致格拒而氣乍窒者亦有燥屎內結表邪尚在得潤降之劑燥屎將下正氣運於內不及捍於表表邪乘機內移正氣又旋外復以致相激而氣乍窒者此皆氣急欲通而未得遽通所致若本有汗及下利不止而忽然無脈者真氣散氣脫也又有傷風日久或先經誤汗陰虛戴陽津空氣結氣搏於表其脈浮薄止趯趯於皮毛之間稍按即散得生津之劑陽氣乍交於陰其脈內斂何者凡氣必先一吸而後能一噓也此證若不先用生津以辛溫強汗之脈氣不得先伏而即出汗即刻氣喘而脫矣前伏為邪正之相搏此伏為陰陽之相交其得汗皆所謂戰汗之類邪正相搏者其躁擾往往甚厲吳又可謂之狂汗陰陽相交者正虛邪微但略見口噤肢厥而已陶節庵有正汗邪汗之辨邪汗即邪正相搏者也故曰發之謂助其正氣也代脈結脈反為陽氣將舒伏氣將發說止歇之脈有無關敗壞者以其氣結也亦有見於陽氣將舒之際者正伸而邪不肯伏所謂龍戰於野其血元黃也大旨與上篇伏脈之義相近但有脈已浮盛仍自參伍不調或夾一二至小弱無力或徑停止一二至又有過服寒降胃陽內陷右關獨沉或初來大漸漸小更來漸漸大即仲景所謂厥脈也其漸小之時有小至於無相間二三十至之久而始復漸出者此脈須與證相參有陰陽格拒之證且指下不散不斷尺中見弦有力有神即是陽氣初伸未暢進退交爭之象若尺中散斷無力氣脫何疑又嘗見痘疹瘟疫癰疸大證伏氣將發未發其脈每先於半月十日前忽見結澀疏密不一參伍不調此陰陽邪正已交爭於內也亦是氣機將欲發動之兆而吉凶未分大抵弦細而疾者多凶宜預為補氣益血洪緩而數者少凶宜預為生津活血也短脈余義脈簡補義敘短脈詳矣然猶有未暢也凡脈形短縮不能上寸者有氣虛與氣鬱之辨察其關之前半部緊而有力似欲上鼓而不得者是氣鬱也必有實邪察其風寒痰飲分表裡治之若軟散無力無上鼓之勢者是氣虛也其虛又有肺脾腎之辨脾肺氣虛者關後脈平腎氣虛者尺中必陷而起伏小也至於厥厥累累如豆如珠亦短脈也必形堅有力乃為陰陽邪正之相搏若漉漉欲脫駛而無力氣衰不續也關後尺中見之尤為氣脫無根之兆已死有脈復生無脈常有死後一日半日氣口脈猶動者此惟富貴人多有之其故由於平日頤養豐厚所謂取精多用物宏魂氣深固難散或病中多服人參攝其無根虛陽結於胸中不得遽散也故少年急病及強死之人有半日身溫者亦以生氣未盡也更有死後暫復回生者身涼無脈神氣清明言談娓娓曲盡情理反勝平日此遊魂為變亦惟少年屈死及志奢未遂者有之此皆無關於診治而不可不知其理胎怪脈鬼胎脈胎脈變幻最多脈經總以陰陽噓吸停勻為主乃近嘗診有細弱而兩旁渙散有暈一息五至以上來盛去衰僅以浮中之候重按即空細審舉按之間指下微見滑疾全似血虛氣燥之脈此血虛有熱之婦一二月之孕多見之若專據脈不知為孕也亦必以甘酸之劑養之方保不墮鬼胎脈曾診一人其尺部沉細而駛指下似滑短居關後不能上寸三部脈俱不揚起伏甚小診於八九月之期僅似初孕二三月者別無奇怪之處氣血不促之婦多有此脈當時殊不知為鬼胎也其後屢次腹痛欲產而腹漸消索矣亦無他病王漢皋謂有始孕不及十日半月其人狂厥欲死但時發時止發如病危止即如常即須防是有孕而未明言所以致此之故也歷驗所診始孕怪脈怪證甚夥其證或極寒內慄或極熱如焚或氣短欲絕或汗出不止或遍身發斑或腹痛如撮其脈或一部不見或一部堅搏或忽來忽止形如雀啄或時大時小早晚不定推原其故皆因受胎之頃或正值勞倦或正值醉飽正值飢渴或正值風涼正值暑熱或正值驚恐或正值憂慮或正值忿怒或素體血虛經後肝燥津液未回而即孕或睡未足而驚醒血未歸心此皆正氣未復而即受胎諸氣即挾之而入胎矣胞脈絡心其氣相感故見諸脈證也私胎多有此象以其神明不定也二三月後邪氣漸散正氣漸復即不見矣亦有必須以藥調之者否則有傷墮之虞也伏濕沖氣脈濕脈皆呆軟也挾寒兼斂挾熱兼散而濕之深伏血分及下焦者大率挾寒為多其脈專見於沉分若挾熱者必連及中浮也嘗診上感風寒痰多肺閉熱遏於胃素又肝燥上寒中熱肝胃火沖而肺不得宣以致氣逼欲喘舌苔薄黃而燥兩邊反厚然證甚於夜其脈右弦左弱中按皆弱而散沉按皆指下有線長而呆軟不動知其下焦小腸膀胱伏有寒濕也其氣衝喘逼固由肝火亦由寒濕自下格火上迫也脈簡補義謂濕據陰分其沉分必呆板不靈者即此法以芳香輕清宣上苦堅咸潤清中辛降淡滲搜下此三焦異氣並治之法也若上焦無外感即無須宣上而下焦辛降不妨稍從燥烈矣若下焦濕已化熱脈濁不清即無須搜下而苦堅可以兼治矣按金匱以桂苓味甘湯治沖氣加乾薑細辛即沖氣復動其為腎寒而肝燥有熱可知此宜得內經食而過之之義結氣伏熱脈辨結氣與伏熱在內者其脈皆沉滑也何以別之大抵氣脈必兼弦以其氣實於內也熱脈必兼洪以其熱鼓於內也亦有氣脈單沉弦而不滑者不兼熱也若熱盛即兼洪而兼伏熱矣熱脈單沉洪而不滑者以無郁也若郁甚即兼弦而兼結氣矣結氣之治辛平宣散不必降也伏熱之治苦寒消降必兼散之凡病日久大率皆有伏結三焦之氣不能專一故丹溪治病必兼郁法太素約旨彭用光書繁雜無緒茲撮其要撰為此篇以備診家一法男子左手為主以腎為己身之位按男女皆以左為主以腎為己身但女有夫位之異謂女以右為主者非左主貴右主富左主內右主外如性情為內官祿為外本身為內他人為外之類又浮主外沉主內兩寸主早年兩關主中年兩尺主末年心主性情邪正主智愚沉候主之主父母主官爵亦主科名浮候主之下並同肝主謀略主威權主忠詐主科名亦主官爵凡諸部所主事有相類者即須合參之腎主壽元主子孫主志氣堅定命門亦同脈來閃灼志即不定肺主節操主祖業凡在我上者如君相鑑賞貴人提拔之類升遷降調之事皆主之與肝脈合參脾主兄弟主妻妾主財祿主憂樂主勞逸憂脈沉陷勞脈洪濁命門主壽元主奴僕亦主子孫兩尺亦主祖業根基寸宜稍浮尺宜稍沉左宜清長勻滑忠正清貴右宜緩洪勻滑富貴寬和六部浮沉勻滑來去分明有力不澀不散不空不斷不緊不細為吉也澀者艱窘慳吝之象空散者虛浮放蕩無根之象斷者變幻無常短縮不足之象細者蕭條之象緊者堅僻孤露之象故澀細空散主貧賤無業富貴見之失官失財緊細主貧主孤主慳吝主奸詐斷主詐主夭洪濁奔湧左主性情乖張主勞碌主風波右主富不好禮主孤露無後亦主勞碌沉陷者氣不揚也主性情陰賊抑鬱憂思不解卒然見之必有喪失刑剋心肝弱陷肺脈洪濁庸懦貪汙心脈細短腎脈沉弱卑鄙無志甘為下流奴僕又宜此脈肝脾勻緩即忠其主左手清長而緊急不舒起伏不大主貴而不富刻薄躁急褊吝清長勻滑寬和慈惠富貴無憂緊細而滑機巧變詐左手洪緩主性情寬和家道豐裕洪濁主愚魯勞碌風波右手清長勻滑主富而好禮清堅而孤主貧主僧道骨肉無親右手洪濁主富而不貴洪緊主富而慳吝洪中見澀先富後貧心脈弦細肝脈沉陷脾脈弦緊主境遇蹇澀憂鬱不舒兼澀失官失財空散破家蕩產兩尺孤澀主無子喪子祖業蕭條沉滑相得子孫眾賢浮盛勻滑奴僕得助諸脈覺見如此者主一生之定局乍見如此者主暫時之禍福須看清中有濁滑中有澀散中有聚總以起伏上下有力有神察之其吉凶禍福微甚遲速以四時五行生剋決之女子心肺為夫在家主肺出嫁主心按肝亦主夫之顯晦得夫也女子肝脈長緩夫旺洪濁夫旺身勞肝脈弦緊心脈弦細性情陰險刻薄寡恩脾脈洪緩衣食豐盈心脈勻滑善於持家心肝脈清長而緩主夫榮貴堅長而孤主貞節細短沉陷主刑剋大抵男子脈宜充長而浮盛於沉也女子脈宜柔潤而沉盛於浮也性急人脈急性緩人脈緩肥人脈寬緩清細者正是福德瘦人脈寬大長秀者正是發達衰弱之脈來勢頗盛是為將進洪緩之脈來勢頗衰或兼微澀是為將退
